<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Flashcard Learning</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --glass: rgba(255, 255, 255, 0.10);
    --glass-hover: rgba(255, 255, 255, 0.18);
    --glass-strong: rgba(255, 255, 255, 0.22);
    --white-80: rgba(255, 255, 255, 0.80);
    --white-70: rgba(255, 255, 255, 0.70);
    --white-60: rgba(255, 255, 255, 0.60);
    --green: linear-gradient(90deg, #4ade80, #22c55e);
    --accent: #fde047;
  }
  html, body {
    min-height: 100%;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    color: #fff;
  }
  body {
    background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
    background-attachment: fixed;
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }
  .container { max-width: 1200px; margin: 0 auto; }
  header.app-header { text-align: center; margin-bottom: 2rem; }
  header.app-header h1 { font-size: 2.25rem; font-weight: 700; margin-bottom: 0.25rem; }
  header.app-header p { color: var(--white-80); font-size: 1.05rem; }

  .crumb-bar {
    display: flex; justify-content: space-between; align-items: center;
    background: var(--glass); backdrop-filter: blur(10px);
    border-radius: 0.75rem; padding: 1rem 1.25rem; margin-bottom: 1.5rem;
  }
  .crumb-bar h2 { font-size: 1.35rem; font-weight: 600; line-height: 1.3; }
  .crumb-bar p { color: var(--white-80); font-size: 0.95rem; margin-top: 0.1rem; }
  .btn {
    background: var(--glass); border: 0; color: #fff; cursor: pointer;
    padding: 0.55rem 1rem; border-radius: 0.5rem; font-size: 0.9rem;
    transition: background-color 0.15s ease, transform 0.05s ease;
    font-family: inherit;
  }
  .btn:hover:not(:disabled) { background: var(--glass-hover); }
  .btn:active:not(:disabled) { transform: translateY(1px); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-green { background: #16a34a; }
  .btn-green:hover:not(:disabled) { background: #15803d; }
  .btn-red { background: #dc2626; }
  .btn-red:hover:not(:disabled) { background: #b91c1c; }

  .grid {
    display: grid; gap: 1.25rem;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  }

  .card-tile {
    background: var(--glass); backdrop-filter: blur(10px);
    border-radius: 0.85rem; padding: 1.25rem; cursor: pointer;
    transition: background-color 0.2s ease, transform 0.15s ease;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .card-tile:hover { background: var(--glass-hover); transform: translateY(-2px); }
  .card-tile h3 { font-size: 1.15rem; font-weight: 600; line-height: 1.3; margin-bottom: 0.5rem; }
  .card-tile .desc { color: var(--white-70); font-size: 0.85rem; line-height: 1.45; margin-bottom: 1rem; }
  .meta-row {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 0.85rem; margin-bottom: 0.5rem;
  }
  .meta-row .label { color: var(--white-70); }
  .meta-row .done { color: #86efac; font-weight: 500; }
  .progress-track {
    width: 100%; height: 6px; background: rgba(255,255,255,0.18);
    border-radius: 999px; overflow: hidden; margin-top: 0.4rem;
  }
  .progress-bar { height: 100%; background: var(--green); transition: width 0.4s ease; }
  .progress-pct { text-align: center; font-size: 0.8rem; color: var(--white-80); margin-top: 0.5rem; }

  /* Flashcard view */
  .deck-progress {
    background: var(--glass); backdrop-filter: blur(10px);
    border-radius: 0.75rem; padding: 0.9rem 1.25rem; margin-bottom: 1.5rem;
  }
  .deck-progress-head {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 0.95rem; margin-bottom: 0.5rem;
  }
  .deck-progress-head .right { color: var(--white-70); font-size: 0.85rem; }

  .flashcard-wrap {
    position: relative;
    perspective: 1500px;
    max-width: 720px; margin: 0 auto;
  }
  .card-status-dot {
    position: absolute; top: 0.85rem; right: 0.85rem;
    width: 14px; height: 14px; border-radius: 999px;
    background: transparent;
    border: 2px solid #6b7280;
    z-index: 5; transition: background-color 0.2s ease, border-color 0.2s ease;
    pointer-events: none;
  }
  .card-status-dot.done {
    background: #22c55e; border-color: #15803d;
  }
  .flashcard {
    position: relative; width: 100%; min-height: 22rem;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.4, 0.0, 0.2, 1);
    cursor: pointer;
  }
  .flashcard.flipped { transform: rotateY(180deg); }
  .face {
    position: absolute; inset: 0;
    backface-visibility: hidden; -webkit-backface-visibility: hidden;
    border-radius: 1rem; padding: 2rem;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.35);
  }
  .face-front { background: rgba(255, 255, 255, 0.97); color: #1f2937; }
  .face-back  {
    background: linear-gradient(135deg, #4ade80 0%, #3b82f6 100%);
    color: #fff; transform: rotateY(180deg);
  }
  .face .pill {
    width: 3rem; height: 3rem; border-radius: 999px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.35rem; font-weight: 700; margin-bottom: 0.75rem;
  }
  .face-front .pill { background: #3b82f6; color: #fff; }
  .face-back .pill { background: rgba(255,255,255,0.25); color: #fff; }
  .face .label-tag { font-size: 0.95rem; color: #6b7280; font-weight: 600; margin-bottom: 0.75rem; }
  .face-back .label-tag { color: rgba(255,255,255,0.85); }
  .face .body-text { font-size: 1.15rem; line-height: 1.6; max-width: 95%; }
  .face .hint { margin-top: 1rem; font-size: 0.85rem; color: #9ca3af; }
  .face-back .hint { color: rgba(255,255,255,0.8); }

  .deck-controls {
    display: flex; justify-content: center; gap: 0.75rem; margin-top: 1.5rem;
    flex-wrap: wrap;
  }

  .completion {
    text-align: center; padding: 2rem;
    background: var(--glass); backdrop-filter: blur(10px);
    border-radius: 1rem; margin-top: 2rem;
  }
  .completion .emoji { font-size: 3rem; margin-bottom: 0.5rem; }
  .completion h3 { font-size: 1.5rem; margin-bottom: 0.5rem; }
  .completion p { color: var(--white-80); margin-bottom: 1rem; }

  /* app footer */
  .app-footer {
    text-align: center; color: var(--white-60);
    font-size: 0.82rem; margin-top: 3rem;
    padding-top: 1.25rem; border-top: 1px solid rgba(255,255,255,0.08);
  }

  /* completed dot on tiles */
  .completed-dot {
    display: inline-block; width: 8px; height: 8px;
    border-radius: 999px; background: #4ade80; margin-left: 0.4rem;
    vertical-align: middle;
  }

  /* description paragraph under chapter titles on tiles */
  .tile-summary {
    color: var(--white-70); font-size: 0.84rem;
    line-height: 1.5; margin-bottom: 0.9rem;
  }

  /* collapsible "About this chapter" panel above the deck */
  .learn-panel {
    background: var(--glass); backdrop-filter: blur(10px);
    border-radius: 0.75rem; padding: 0.85rem 1.25rem; margin-bottom: 1.25rem;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .learn-panel > summary {
    cursor: pointer; list-style: none;
    font-weight: 600; font-size: 0.98rem; color: #fff;
    display: flex; align-items: center; justify-content: space-between;
    user-select: none;
  }
  .learn-panel > summary::-webkit-details-marker { display: none; }
  .learn-panel > summary::after {
    content: "▾"; font-size: 0.8rem; color: var(--white-70);
    transition: transform 0.2s ease;
  }
  .learn-panel:not([open]) > summary::after { transform: rotate(-90deg); }
  .learn-panel .panel-summary {
    color: var(--white-80); font-size: 0.95rem;
    margin: 0.75rem 0 0.1rem; line-height: 1.55;
  }

  /* Mobile tweaks */
  @media (max-width: 600px) {
    header.app-header h1 { font-size: 1.7rem; }
    .crumb-bar { flex-direction: column; gap: 0.75rem; align-items: flex-start; }
    .flashcard { min-height: 26rem; }
    .face .body-text { font-size: 1rem; }
  }
</style>
</head>
<body>
  <div class="container">
    <header class="app-header">
      <h1>Flashcard Learning</h1>
    </header>
    <div id="app"></div>
    <footer class="app-footer">Built by Hamza Mhedhbi</footer>
  </div>

<script id="flashcard-data" type="application/json">{"books":[{"id":"b0","title":"AI Engineering (Chip Huyen, 2025)","description":"This book introduces the emerging field of AI engineering, which focuses on building real-world applications powered by foundation models rather than training models from scratch. Chip Huyen, drawing on her industry and academic experience, provides a practical guide to evaluation, prompt design, retrieval-augmented generation, fine-tuning, dataset curation, and optimization. It serves as both a roadmap and toolkit for engineers transitioning from traditional ML to modern AI systems.","chapters":[{"id":"b0c0","title":"Introduction to Building AI Applications with Foundation Models","summary":"Learn the foundations of AI engineering, foundation models, generative AI systems, self-supervised learning, multimodal AI, and how modern AI applications are built using pretrained models and APIs.","cards":[{"id":"c868ec01f1b0","q":"What single word would the author use to describe AI post-2020, and what are its two major consequences?","a":"Scale. The two major consequences are: 1) AI models are becoming more powerful and capable of more tasks, enabling more applications, and 2) Training large models requires data, compute resources, and specialized talent that only a few organizations can afford, leading to the emergence of 'model as a service.'"},{"id":"a806faf29ea1","q":"What is AI engineering and how does it differ from traditional ML engineering?","a":"AI engineering is the process of building applications on top of readily available foundation models, rather than developing ML models from scratch. The demand for AI applications has increased while the barrier to entry has decreased due to accessible foundation models."},{"id":"aa6e7a589dce","q":"What is a language model and what statistical information does it encode?","a":"A language model encodes statistical information about one or more languages. This information tells us how likely a word is to appear in a given context. For example, given 'My favorite color is __', a language model should predict 'blue' more often than 'car'."},{"id":"10b544d4dd1c","q":"What is a token in the context of language models, and why do models use tokens instead of words or characters?","a":"A token can be a character, a word, or part of a word (like -tion). Models use tokens because: 1) They allow breaking words into meaningful components, 2) Fewer unique tokens than words reduces vocabulary size making models more efficient, and 3) Tokens help process unknown words by splitting them into recognizable parts."},{"id":"dc0d02ce7e58","q":"What are the two main types of language models and how do they differ?","a":"Masked language models predict missing tokens anywhere in a sequence using context from before and after (like filling in blanks). Autoregressive language models predict the next token using only preceding tokens and can continually generate tokens sequentially."},{"id":"c01607fbe570","q":"Why are autoregressive language models more popular than masked language models today?","a":"Autoregressive models are the choice for text generation because they can continually generate one token after another, making them much more popular for generative AI applications, while masked models are mainly used for non-generative tasks like sentiment analysis."},{"id":"ae846f2850e3","q":"What is self-supervision and how does it overcome the data labeling bottleneck?","a":"Self-supervision allows models to infer labels from the input data itself, rather than requiring explicit labels. Language modeling is self-supervised because each input sequence provides both the labels (tokens to be predicted) and the contexts to predict them, enabling training on massive amounts of unlabeled text."},{"id":"3e7ff347a654","q":"How does the size of language models relate to the amount of training data needed?","a":"Larger models have more capacity to learn and therefore need more training data to maximize their performance. While you could train a large model on small datasets, it would be a waste of compute since similar results could be achieved with smaller models."},{"id":"0a723750928c","q":"What are foundation models and how do they differ from large language models?","a":"Foundation models are large-scale models that can work with multiple data modalities (text, images, videos, etc.), not just text. While many still call models like GPT-4V and Gemini LLMs, they're better characterized as foundation models because they incorporate additional modalities beyond language."},{"id":"9ddf9167377a","q":"What breakthrough do foundation models represent in AI research structure?","a":"Foundation models break from traditional AI research that was divided by data modalities (NLP for text, computer vision for images, etc.). They create multimodal models that can work across different data types, marking a transition from task-specific to general-purpose models."},{"id":"8a62b610e082","q":"How did OpenAI use self-supervision for multimodal models with CLIP?","a":"OpenAI used natural language supervision to train CLIP by finding (image, text) pairs that co-occurred on the internet, generating a dataset of 400 million pairs without manual labeling cost. This was 400 times larger than ImageNet and enabled CLIP to generalize to multiple image classification tasks."},{"id":"67169b982a90","q":"What are the three factors that create ideal conditions for AI engineering's rapid growth?","a":"1) General-purpose AI capabilities - foundation models can do more tasks than ever before, 2) Increased AI investments - success of ChatGPT prompted sharp increases in AI investment, and 3) Low entrance barrier - model-as-a-service APIs make it easy to leverage AI with minimal coding."},{"id":"21d6f0c57538","q":"According to the Goldman Sachs Research estimate, how much could AI investment reach by 2025?","a":"AI investment could approach $100 billion in the US and $200 billion globally by 2025. FactSet found that one in three S&P 500 companies mentioned AI in their Q2 2023 earnings calls, three times more than the previous year."},{"id":"1df5df6de820","q":"What are the eight categories of common generative AI use cases mentioned in the chapter?","a":"1) Coding, 2) Image and video production, 3) Writing, 4) Education, 5) Conversational bots, 6) Information aggregation, 7) Data organization, and 8) Workflow automation."},{"id":"51fa923722cc","q":"Which occupation categories have the highest exposure to AI according to Eloundou et al. (2023)?","a":"Occupations with 100% or close to 100% exposure include interpreters and translators, tax preparers, web designers, writers, mathematicians, and financial quantitative analysts. Occupations with no exposure include cooks, stonemasons, and athletes."},{"id":"730d5a16506b","q":"What did McKinsey researchers find about AI's impact on developer productivity for different types of tasks?","a":"AI can help developers be twice as productive for documentation, 25-50% more productive for code generation and refactoring, but minimal productivity improvement was observed for highly complex tasks. AI is much better at frontend than backend development."},{"id":"6d9143e5c789","q":"According to the MIT study on ChatGPT's impact on writing, what were the key findings?","a":"Among 453 college-educated professionals exposed to ChatGPT: average time decreased by 40%, output quality rose by 18%, and ChatGPT was more helpful to those with less inclination for writing. Users were 2x more likely to use it in their real job two weeks later."},{"id":"d7198e7eb013","q":"Why is AI particularly good at SEO according to the chapter?","a":"AI seems particularly good at SEO perhaps because many AI models are trained with data from the internet, which is populated with SEO-optimized text. This has enabled a new generation of content farms that create junk websites filled with AI-generated content to rank high on Google."},{"id":"22ad6aaf6bf3","q":"How can AI be used in education beyond just homework completion?","a":"AI can summarize textbooks, generate personalized lecture plans, adapt materials to different learning formats (auditory, visual, code-based), create roleplay scenarios for language learning, generate and evaluate quizzes, serve as debate partners, and act as teaching assistants."},{"id":"07552fce26b2","q":"What is the Microsoft Crawl-Walk-Run framework for AI automation?","a":"1) Crawl - human involvement is mandatory, 2) Walk - AI can directly interact with internal employees, 3) Run - increased automation, potentially including direct AI interactions with external users. The role of humans can change over time as AI system quality improves."},{"id":"4fb2c23bad1d","q":"What are the three general types of competitive advantages in AI according to the chapter?","a":"Technology, data, and distribution (ability to bring products to users). With foundation models, core technologies are similar across companies, and distribution advantages likely belong to big companies, making data advantages more nuanced but potentially the key differentiator."},{"id":"537bf4ead53f","q":"What is the 'last mile challenge' in AI product development?","a":"Initial success with foundation models can be misleading - it might take a weekend to build a demo but months or years to build a product. As described in UltraChat: 'the journey from 0 to 60 is easy, whereas progressing from 60 to 100 becomes exceedingly challenging.'"},{"id":"70c8b492a019","q":"What are the three layers of the AI application stack?","a":"1) Application development - providing models with good prompts and context, requiring evaluation and interfaces, 2) Model development - tooling for developing, training, finetuning, and optimizing models, and 3) Infrastructure - tooling for model serving, managing data and compute, and monitoring."},{"id":"d42a517cd4e3","q":"How do AI engineering and ML engineering differ in three major ways?","a":"1) AI engineering uses pre-trained models vs. training your own, focusing more on model adaptation, 2) AI models are bigger and consume more resources, requiring more efficient optimization, and 3) AI models produce open-ended outputs that are harder to evaluate, making evaluation a bigger problem."},{"id":"bcdc7827b3ef","q":"What are the two categories of model adaptation techniques?","a":"Prompt-based techniques (like prompt engineering) that adapt models without updating weights by giving instructions and context, and finetuning techniques that require updating model weights by making changes to the model itself."},{"id":"c8f81db8b928","q":"What are the differences between pre-training, finetuning, and post-training?","a":"Pre-training trains a model from scratch with randomly initialized weights (most resource-intensive). Finetuning continues training a previously trained model. Post-training refers to training after pre-training, often done by model developers before release, while finetuning is done by application developers."},{"id":"fe1fbaee494c","q":"How has dataset engineering changed with foundation models compared to traditional ML?","a":"Traditional ML focused more on feature engineering with tabular data. Foundation models require less feature engineering but more work on data deduplication, tokenization, context retrieval, and quality control including removing sensitive information and toxic data."},{"id":"c1c6b28500f6","q":"Why has inference optimization become even more important with foundation models?","a":"Foundation models incur higher inference cost and latency than traditional models. They are often autoregressive (tokens generated sequentially), so if it takes 10ms per token, generating 100 tokens takes 1 second. Getting latency down to expected 100ms for internet applications is a huge challenge."},{"id":"53c92b90e6a8","q":"What are the three key responsibilities of the application development layer?","a":"1) Evaluation - mitigating risks and uncovering opportunities throughout model adaptation, 2) Prompt engineering - getting models to express desirable behaviors from input alone, and 3) AI interface - creating interfaces for end users to interact with AI applications."},{"id":"6436a485c83a","q":"Why is evaluation more challenging with foundation models than traditional ML?","a":"Foundation models are open-ended with expanded capabilities. Unlike close-ended tasks with expected ground truths (like fraud detection), tasks like chatbots have so many possible responses that it's impossible to create exhaustive lists of correct answers to compare against."},{"id":"d05add922907","q":"How did the Gemini vs. ChatGPT evaluation controversy demonstrate the importance of prompt engineering?","a":"Google claimed Gemini beat ChatGPT on MMLU using CoT@32 technique (showing 32 examples) while ChatGPT was shown only 5 examples. When both were shown 5 examples, ChatGPT performed better, highlighting how different prompts can drastically affect model performance."},{"id":"37f2a4be97c4","q":"What new types of AI interfaces are gaining popularity?","a":"Standalone web/desktop/mobile apps, browser extensions for quick AI queries, chatbots integrated into chat apps (Slack, Discord, WeChat), plug-ins and add-ons for products like VSCode and Microsoft 365, voice-based interfaces, and embodied interfaces in AR/VR."},{"id":"c7a708055e62","q":"How does AI engineering workflow differ from traditional ML engineering workflow?","a":"Traditional ML: start with data gathering and training, build product last. AI engineering: start with building the product first using readily available models, then invest in data and models only once the product shows promise. This rewards those who can iterate fast."},{"id":"d6b46ae9a4ea","q":"What role do Apple's framework dimensions play in AI product design?","a":"Critical vs. complementary (how essential AI is to the app), Reactive vs. proactive (responds to user requests vs. shows responses opportunistically), and Dynamic vs. static (updated continually with user feedback vs. updated periodically)."},{"id":"9d1fab6354db","q":"Why are companies faster to deploy internal-facing AI applications than external-facing ones?","a":"Internal applications help companies develop AI engineering expertise while minimizing risks associated with data privacy, compliance, and potential catastrophic failures. They prefer applications with lower risks and often use close-ended tasks that are easier to evaluate."},{"id":"6c258fcf75c8","q":"What percentage of compute and data resources does pre-training typically consume in model development?","a":"Pre-training takes up to 98% of overall compute and data resources for models like InstructGPT. It's the most resource-intensive phase and takes a long time, where mistakes can incur significant financial loss and project delays."},{"id":"7f91901a27ba","q":"What trends does Figure 1-11 show about AI model cost and performance evolution?","a":"Between 2022 and 2024, the cost of AI reasoning rapidly dropped over time while model performance on benchmarks like MMLU improved. This shows that model inference is getting faster, cheaper, and better quality simultaneously."},{"id":"f4f50b56695b","q":"According to LinkedIn's experience, what was the timeline for achieving different quality levels in their AI product?","a":"It took them one month to achieve 80% of the experience they wanted, which made them underestimate the remaining effort. It took four more months to surpass 95%. Each subsequent 1% gain was slow and discouraging, with much time spent on product kinks and hallucinations."},{"id":"a7391fcbc6ae","q":"What makes maintenance of AI products particularly challenging?","a":"AI's fast pace of change means committing to 'riding this bullet train.' You must constantly run cost-benefit analyses as the best option today might become the worst tomorrow. Regulations around AI are evolving and can cause fatal changes to business models."},{"id":"33ecb2cf5f84","q":"How has the programming language landscape changed with AI engineering?","a":"Traditional ML engineering was Python-centric, but AI engineering shows increasing support for JavaScript APIs with tools like LangChain.js, Transformers.js, OpenAI's Node library, and Vercel's AI SDK to attract more frontend engineers."},{"id":"49cdb435667d","q":"What does completion mean in the context of language models, and why is it powerful?","a":"Completion means given a text (prompt), the model tries to complete that text. It's incredibly powerful because many tasks including translation, summarization, coding, and solving math problems can be framed as completion tasks, though completion isn't the same as conversation."}]},{"id":"b0c1","title":"Understanding Foundation Models","summary":"Learn how foundation models work internally including Transformers, attention mechanisms, scaling laws, mixture-of-experts architectures, multilingual modeling, supervised fine-tuning, and alignment techniques.","cards":[{"id":"8f0424498c50","q":"What are the three key design decisions that impact a foundation model's capabilities and usability?","a":"Training data, model architecture and size, and how they are post-trained to align with human preferences."},{"id":"5bd7df80c1ca","q":"What is Common Crawl and why is it problematic as training data?","a":"Common Crawl is a dataset created by a nonprofit that crawls 2-3 billion web pages monthly. It's problematic because it contains clickbait, misinformation, propaganda, conspiracy theories, racism, misogyny, and fake news from questionable websites."},{"id":"73c8b7077c06","q":"What percentage of Common Crawl consists of English content, and how does this compare to other languages?","a":"English accounts for 45.88% of Common Crawl data, making it eight times more prevalent than Russian (5.97%), the second-most common language."},{"id":"096761a9ca87","q":"How does language representation in training data affect model performance?","a":"Models work much better for well-represented languages like English. For example, GPT-4 performed significantly better on MMLU benchmark in English than in under-represented languages like Telugu, Marathi, and Punjabi."},{"id":"c0535b7e77d1","q":"Why is translating queries to English and back not an ideal solution for under-represented languages?","a":"It requires a model that can sufficiently understand the under-represented language, and translation causes information loss. For example, Vietnamese pronouns that denote relationships become generic 'I' and 'you' in English."},{"id":"4f2875771e5e","q":"How does tokenization efficiency vary across languages, and what are the cost implications?","a":"Languages like Burmese require about 10 times more tokens than English for the same content (median 72 vs 7 tokens), making inference 10 times slower and more expensive for token-based pricing."},{"id":"4527889df749","q":"What are domain-specific models and why are they necessary?","a":"Domain-specific models are trained on specialized data for specific fields like drug discovery or cancer screening. They're necessary because general-purpose models are unlikely to perform well on domain-specific tasks that weren't well-represented in their training data."},{"id":"1a9c5149aefd","q":"What are the two main problems with the seq2seq architecture that transformers address?","a":"1) The decoder generates outputs using only the final hidden state of the input (like using only a book summary), limiting output quality. 2) Sequential processing makes it slow for long sequences since each token must finish processing before the next begins."},{"id":"c88527541c54","q":"How does the attention mechanism solve the limitations of seq2seq?","a":"The attention mechanism allows the model to weigh the importance of different input tokens when generating each output token, like referencing any page in a book rather than just the summary. It also enables parallel processing of input tokens."},{"id":"feb279c7298a","q":"What are the two steps in transformer-based language model inference?","a":"1) Prefill: The model processes input tokens in parallel, creating intermediate state (key and value vectors) for generating the first output token. 2) Decode: The model generates output tokens one at a time sequentially."},{"id":"e2d9ea88ce76","q":"What are the three key vectors in the attention mechanism and what do they represent?","a":"Query vector (Q): represents the current decoder state seeking information. Key vector (K): represents each previous token (like page numbers). Value vector (V): represents the actual content of each previous token (like page content)."},{"id":"e7e8516aafb1","q":"How is multi-headed attention implemented in practice using Llama 2-7B as an example?","a":"Llama 2-7B has 32 attention heads with a 4096 hidden dimension. Each K, V, Q vector is split into 32 vectors of dimension 128 (4096/32=128), allowing the model to attend to different groups of tokens simultaneously."},{"id":"2534b36f8d23","q":"What are the main components of a transformer block?","a":"1) Attention module: consists of query, key, value, and output projection weight matrices. 2) MLP module: consists of linear layers separated by nonlinear activation functions like ReLU or GELU."},{"id":"4a5e96490095","q":"What determines a transformer model's size?","a":"The model's dimension (determines sizes of key, query, value, and output projection matrices), number of transformer blocks, dimension of the feedforward layer, and vocabulary size."},{"id":"677e7f5e8638","q":"What are some alternative architectures gaining traction to replace transformers?","a":"RWKV (RNN-based model that can be parallelized), and State Space Models (SSMs) like S4, H3, Mamba, and Jamba, which show promise for long-range memory and efficient sequence processing."},{"id":"4ec0d7b1dcf1","q":"What are the three numbers that signal a model's scale?","a":"1) Number of parameters (proxy for learning capacity), 2) Number of tokens the model was trained on (proxy for how much it learned), 3) Number of FLOPs (proxy for training cost)."},{"id":"973af6fc40b3","q":"How do mixture-of-experts (MoE) models work, using Mixtral 8x7B as an example?","a":"Mixtral 8x7B has 8 experts with 7 billion parameters each (46.7B total due to shared parameters). At each layer, only 2 experts are active per token, so only 12.9 billion parameters are used per token, making it cost-equivalent to a 12.9B dense model."},{"id":"2049ec6fe437","q":"What is the Chinchilla scaling law and what does it recommend?","a":"A rule for compute-optimal training that states the number of training tokens should be approximately 20 times the model size. For example, a 3B-parameter model needs about 60B training tokens. Both model size and training tokens should be scaled equally."},{"id":"40a3104f8c8d","q":"What are the two main scaling bottlenecks for foundation models?","a":"1) Training data: We may run out of internet data in the next few years as dataset growth rate exceeds new data generation rate. 2) Electricity: Data centers consume 1-2% of global electricity and may reach 4-20% by 2030."},{"id":"d6f79f466942","q":"What are the two main issues that post-training addresses in pre-trained models?","a":"1) Self-supervision optimizes for text completion, not conversations (models complete sentences rather than respond appropriately). 2) Models trained on indiscriminate internet data can produce racist, sexist, rude, or incorrect outputs."},{"id":"f01dcc577413","q":"What are the two main steps of post-training?","a":"1) Supervised finetuning (SFT): Finetune on high-quality instruction data to optimize for conversations. 2) Preference finetuning: Further finetune using reinforcement learning techniques like RLHF, DPO, or RLAIF to align with human preferences."},{"id":"e4bfeccf9d00","q":"What is demonstration data and how is it used in supervised finetuning?","a":"Demonstration data consists of (prompt, response) pairs showing appropriate responses. It's used in supervised finetuning through behavior cloning - demonstrating how the model should behave so it can clone this behavior across different types of requests."},{"id":"8e0f6892e6c9","q":"What are the two parts of RLHF (Reinforcement Learning from Human Feedback)?","a":"1) Train a reward model that scores the foundation model's outputs based on human preferences. 2) Optimize the foundation model using reinforcement learning to generate responses that maximize the reward model's scores."},{"id":"d889c57f1897","q":"Why is comparison data easier to obtain than direct scoring for training reward models?","a":"Asking labelers to compare two responses and decide which is better is more consistent than asking them to score each response directly on a scale. Direct scoring varies significantly between labelers and even for the same labeler over time."},{"id":"9ea3cfa042a4","q":"How does temperature affect sampling in language models?","a":"Higher temperature reduces probabilities of common tokens and increases probabilities of rare tokens, making outputs more creative but potentially less coherent. Lower temperature makes models more likely to pick obvious values, creating consistent but potentially boring outputs."},{"id":"e3de5da84e09","q":"What happens when temperature is set to 0 in language model sampling?","a":"When temperature is set to 0, the model performs greedy sampling - it simply picks the token with the largest logit without doing logit adjustment and softmax calculation, making outputs completely deterministic."},{"id":"5e0d4fac82e4","q":"What is the difference between top-k and top-p sampling strategies?","a":"Top-k sampling considers a fixed number of top values (k), while top-p (nucleus sampling) dynamically selects values until their cumulative probability reaches p (typically 0.9-0.95). Top-p adapts to context - fewer options for simple questions, more for complex ones."},{"id":"62899e932017","q":"What is test time compute and how does the 'best of N' strategy work?","a":"Test time compute involves generating multiple responses per query to increase chances of good responses. 'Best of N' generates N outputs and picks the best one, often using highest average logprob or reward model scores to select the winner."},{"id":"f0ea1eddbfc6","q":"How do you calculate the probability of a sequence of tokens in language models?","a":"The probability is the product of individual token probabilities: p(sequence) = p(token1) × p(token2|token1) × p(token3|token1,token2)... In log space, it's the sum of logprobs, often averaged by sequence length to avoid bias toward shorter sequences."},{"id":"1596efcf581b","q":"What are the five main approaches for generating structured outputs?","a":"1) Prompting: Instructing models to generate specific formats. 2) Post-processing: Fixing common formatting mistakes with scripts. 3) Test time compute: Keep generating until one fits expected format. 4) Constrained sampling: Filter logits to only allow valid tokens. 5) Finetuning: Train on examples following desired format."},{"id":"aa59f48304aa","q":"How does constrained sampling work for structured outputs?","a":"The model outputs logits for all possible tokens, then filters the logit vector to keep only tokens that meet the constraints (based on grammar rules), applies softmax to these valid tokens only, and samples from the filtered set."},{"id":"3cd9b77fb222","q":"What makes AI models probabilistic and what are the main consequences?","a":"AI models sample outputs according to probability distributions rather than always giving the same answer. This causes inconsistency (different outputs for same/similar inputs) and hallucinations (responses not grounded in facts), but also enables creativity."},{"id":"ba2b9c09a3e9","q":"What are the two scenarios where model inconsistency manifests?","a":"1) Same input, different outputs: giving the same prompt twice leads to different responses. 2) Slightly different input, drastically different outputs: small changes like capitalizing a letter can lead to very different outputs."},{"id":"eea750b6ebba","q":"What are the two main hypotheses for why language models hallucinate?","a":"1) Self-delusion: Models can't differentiate between given data and generated data, so they treat their own potentially wrong outputs as facts when generating subsequent tokens. 2) Knowledge mismatch: During training, labelers use knowledge the model doesn't have, teaching it to hallucinate."},{"id":"adb88ea5447a","q":"What is snowballing hallucination?","a":"After making an incorrect assumption, a model continues hallucinating to justify the initial wrong assumption. This can cause models to make mistakes on questions they would otherwise answer correctly, as the wrong assumption cascades through their reasoning."},{"id":"d3d4789a8fd2","q":"What are some techniques mentioned for mitigating hallucinations?","a":"Adding prompts like 'Answer as truthfully as possible, and if unsure, say I don't know', asking for concise responses (fewer tokens = less chance to hallucinate), using verification techniques, and implementing reinforcement learning with better reward functions that punish making things up."},{"id":"7d8203e2e079","q":"According to the chapter, what makes sampling one of the most underrated concepts in AI?","a":"Sampling explains many seemingly baffling AI behaviors including hallucinations and inconsistencies. Choosing the right sampling strategy can significantly boost model performance with relatively little effort, making it crucial for AI engineering."},{"id":"c18d12548688","q":"What are logprobs and why are they preferred over regular probabilities?","a":"Logprobs (log probabilities) are probabilities in log scale. They're preferred because they help reduce the underflow problem - with large vocabularies (100,000+ tokens), many probabilities become too small to represent and get rounded to zero, but log scale reduces this issue."},{"id":"aa86104d5e69","q":"What is the relationship between model training approach and data availability according to the scaling law?","a":"The Chinchilla scaling law assumes data acquisition costs are much cheaper than compute costs. When training data costs are significant, different calculations are needed. The law was developed for dense models on human-generated data, requiring adaptation for sparse models and synthetic data."},{"id":"67ba1cf414f7","q":"How do newer generation models compare to older ones of the same size?","a":"As the community better understands training large models, newer-generation models tend to outperform older-generation models of the same size. For example, Llama 3-8B (2024) outperforms even Llama 2-70B (2023) on the MMLU benchmark."},{"id":"4d7e9b569369","q":"What makes developing new architectures to replace transformers challenging?","a":"Transformers have been heavily optimized since 2017 and are designed to run efficiently on current hardware (originally TPUs, later GPUs). New architectures must perform at scale on hardware people care about, and they must simulate programs that existing architectures cannot to truly outperform them."},{"id":"33be28df4b8c","q":"What is the main difference between pre-training and post-training objectives?","a":"Pre-training optimizes token-level quality (predicting the next token accurately), while post-training optimizes for response-level quality that users prefer. Users don't care about individual token accuracy - they care about the overall quality of complete responses."},{"id":"9aabc15ff00e","q":"How does the cost and resource allocation compare between pre-training and post-training?","a":"Post-training consumes a small portion of resources compared to pre-training. For example, InstructGPT used only 2% of compute for post-training and 98% for pre-training, making post-training relatively efficient for unlocking model capabilities."},{"id":"59c4bf5bb1d5","q":"What was the key finding about test time compute and optimal number of outputs?","a":"OpenAI found that sampling more outputs improved performance up to 400 outputs, beyond which performance decreased. They hypothesized this was because more samples increased chances of adversarial outputs fooling the verifier. However, Stanford found continued improvement up to 10,000 samples."},{"id":"bdf9e0ed1d75","q":"What are the key challenges and benefits of the probabilistic nature of AI models?","a":"Benefits: Makes AI great for creative tasks by exploring beyond common paths and thinking outside the box. Challenges: Creates inconsistency and hallucinations that make building reliable AI applications difficult, requiring significant AI engineering efforts to harness and mitigate."},{"id":"3272d53a4e9d","q":"What are stopping conditions in autoregressive language models and what are their trade-offs?","a":"Stopping conditions control when models stop generating tokens to manage latency and cost. Methods include fixed token limits (can cut off mid-sentence) or stop tokens/words (like end-of-sequence). Early stopping can cause malformatted outputs (like incomplete JSON missing brackets)."}]},{"id":"b0c2","title":"Evaluation Methodology","summary":"Learn how to evaluate AI systems using perplexity, semantic similarity, exact match metrics, AI-as-a-judge systems, benchmark analysis, and evaluation frameworks for generative AI.","cards":[{"id":"697ab7992c1b","q":"According to Greg Brockman's 2023 tweet, what are surprisingly often all you need for AI development?","a":"Evals (evaluations)"},{"id":"cee4f7ba74a2","q":"What is the biggest hurdle teams face when bringing AI applications to reality?","a":"Evaluation - figuring out how to evaluate AI systems can take up the majority of the development effort"},{"id":"8b2b6f26db92","q":"What are the four main reasons why evaluating foundation models is more challenging than traditional ML models?","a":"1) The more intelligent AI models become, the harder they are to evaluate; 2) Open-ended nature undermines traditional ground truth evaluation; 3) Most foundation models are treated as black boxes; 4) Publicly available evaluation benchmarks become saturated quickly"},{"id":"baad0fd03348","q":"What happened to the GLUE benchmark after it was released in 2018?","a":"It became saturated in just one year, necessitating the introduction of SuperGLUE in 2019"},{"id":"7817c3030a97","q":"How did the number of LLM evaluation papers change in the first half of 2023?","a":"They grew exponentially from 2 papers per month to almost 35 papers per month"},{"id":"b4f7d887b3f2","q":"What is perplexity and how does it relate to entropy?","a":"Perplexity is the exponential of entropy and cross entropy. It measures the amount of uncertainty a model has when predicting the next token - higher uncertainty means there are more possible options for the next token"},{"id":"ada805e7faa2","q":"What does a language model's cross entropy on a dataset measure?","a":"How difficult it is for the language model to predict what comes next in the dataset"},{"id":"26496db89f37","q":"What are the two qualities that determine a model's cross entropy on training data?","a":"1) The training data's predictability (measured by entropy); 2) How the distribution captured by the language model diverges from the true distribution of the training data"},{"id":"6709d72d3068","q":"What are bits-per-character (BPC) and bits-per-byte (BPB)?","a":"Variations of cross entropy that standardize comparison across models with different tokenization methods. BPC is the number of bits needed per character, while BPB is the number of bits needed per byte of original training data"},{"id":"1947891655f5","q":"What are three general rules about perplexity values?","a":"1) More structured data gives lower expected perplexity; 2) The bigger the vocabulary, the higher the perplexity; 3) The longer the context length, the lower the perplexity"},{"id":"edcc9680021c","q":"How can perplexity be used to detect data contamination?","a":"If a model's perplexity on a benchmark's data is low, this benchmark was likely included in the model's training data, making the model's performance on this benchmark less trustworthy"},{"id":"4bb99ceb5306","q":"What is functional correctness evaluation?","a":"Evaluating a system based on whether it performs the intended functionality - for example, checking if generated code executes correctly and produces expected outputs"},{"id":"b695d216b021","q":"What is the pass@k metric used in code generation evaluation?","a":"The fraction of problems solved when k code samples are generated per problem. A model solves a problem if any of the k samples pass all test cases"},{"id":"ffb3d800b5bd","q":"What are the four ways to measure similarity between two open-ended texts?","a":"1) Asking an evaluator to judge if two texts are the same; 2) Exact match; 3) Lexical similarity; 4) Semantic similarity"},{"id":"0a6a96a5e62c","q":"What is the main limitation of exact match evaluation?","a":"It rarely works beyond simple tasks because there are multiple possible correct responses for most inputs, and it's impossible to create an exhaustive set of all possible correct responses"},{"id":"2a69fb6c99e2","q":"What does lexical similarity measure and what are its common metrics?","a":"Lexical similarity measures how much two texts overlap in terms of tokens. Common metrics include BLEU, ROUGE, METEOR++, TER, and CIDEr"},{"id":"8a9ee7703ad9","q":"What is the difference between lexical similarity and semantic similarity?","a":"Lexical similarity measures whether two texts look similar, while semantic similarity measures whether they have the same meaning. For example, 'What's up?' and 'How are you?' are lexically different but semantically similar"},{"id":"83c217bb810e","q":"What is an embedding and what are typical embedding sizes?","a":"An embedding is a numerical vector representation that aims to capture the meaning of original data. Typical embedding sizes range from 100 to 10,000 elements"},{"id":"385dbbffd011","q":"What is CLIP and what makes it significant?","a":"CLIP is one of the first major models that could map data of different modalities (text and images) into a joint embedding space, enabling cross-modal comparisons and text-based image search"},{"id":"83f5cb9db062","q":"What is AI as a judge and when did it become practical?","a":"AI as a judge is the approach of using AI to evaluate AI responses. It became practical around 2020 with the release of GPT-3, when AI models became capable enough to make reliable judgments"},{"id":"68fbc5c9fa52","q":"What percentage of evaluations on LangChain's platform in 2023 were done by AI judges?","a":"58%"},{"id":"a3834c6eef22","q":"What are the main advantages of AI as a judge?","a":"AI judges are fast, easy to use, relatively cheap compared to human evaluators, can work without reference data, and can evaluate based on any criteria while providing explanations for their decisions"},{"id":"d7e7cc0c67dc","q":"What agreement rate did GPT-4 achieve with humans on MT-Bench evaluation?","a":"85%, which was higher than the agreement among humans (81%)"},{"id":"4f860a14eec7","q":"What are the three main ways to use AI as a judge?","a":"1) Evaluate the quality of a response by itself; 2) Compare a generated response to a reference response; 3) Compare two generated responses to determine which is better"},{"id":"3c6d887c3fdc","q":"What scoring systems work best for AI judges?","a":"Language models work better with text than numbers. Classification works better than numerical scoring, and discrete scoring (1-5) works better than continuous scoring"},{"id":"6c6395f83def","q":"What are the main limitations of AI as a judge?","a":"Inconsistency (probabilistic nature), criteria ambiguity (non-standardized metrics), increased costs and latency, and various biases"},{"id":"6c02af263fa2","q":"What is self-bias in AI judges?","a":"A model favoring its own responses over responses generated by other models. GPT-4 shows a 10% higher win rate for itself, while Claude-v1 shows a 25% higher win rate"},{"id":"3bf19ecb27f0","q":"What are position bias and verbosity bias in AI judges?","a":"Position bias: AI judges may favor the first answer in comparisons. Verbosity bias: AI judges favor lengthier answers regardless of quality, sometimes preferring longer responses with errors over shorter correct ones"},{"id":"879972674b0b","q":"What are the three types of specialized AI judges mentioned?","a":"1) Reward models (score prompt-response pairs); 2) Reference-based judges (evaluate against reference responses); 3) Preference models (predict which of two responses users prefer)"},{"id":"58fb80f5fb8c","q":"What is self-evaluation or self-critique in AI judgment?","a":"Using a model to judge itself. While it may seem like cheating due to self-bias, it can be useful for sanity checks and can nudge models to revise and improve their responses"},{"id":"04524906fb03","q":"What is comparative evaluation and how does it differ from pointwise evaluation?","a":"Comparative evaluation evaluates models against each other to compute rankings from comparison results, while pointwise evaluation evaluates each model independently then ranks by scores"},{"id":"bbd2db5540f4","q":"When was comparative evaluation first used in AI and by whom?","a":"It was first used in 2021 by Anthropic to rank different models, and it also powers the popular LMSYS Chatbot Arena leaderboard"},{"id":"58a5926d58b3","q":"What is a key limitation when using preference-based voting for model comparison?","a":"Not all questions should be answered by preference - many should be answered by correctness instead. Preference voting only works if voters are knowledgeable in the subject"},{"id":"02240535565e","q":"What rating algorithms are commonly used for comparative evaluation?","a":"Algorithms adapted from sports and gaming, such as Elo, Bradley-Terry, and TrueSkill. LMSYS Chatbot Arena switched from Elo to Bradley-Terry because Elo was sensitive to the order of evaluators and prompts"},{"id":"03ae098d6066","q":"What is the scalability bottleneck of comparative evaluation?","a":"It's data-intensive - the number of model pairs to compare grows quadratically with the number of models. For 57 models, there are 1,596 possible pairs requiring many comparisons"},{"id":"8b5f94c3a497","q":"What quality control challenges exist with crowdsourced comparative evaluation?","a":"Lack of standardization (anyone can use any prompt), no quality control over evaluators, potential for gaming, and simple prompts that don't differentiate model performance well"},{"id":"f000a2f95157","q":"What was notable about the simple prompts in LMSYS Chatbot Arena's 2023 data?","a":"Among 33,000 prompts, 180 were just 'hello' and 'hi' (0.55% of data), and the brainteaser 'X has 3 sisters, each has a brother. How many brothers does X have?' was asked 44 times"},{"id":"cfe4454d651e","q":"What is a key limitation when converting comparative evaluation results to absolute performance?","a":"Comparative evaluation tells you which model is better but not how good a model is or whether it's good enough for your use case. A 1% change in win rate can mean vastly different performance improvements across applications"},{"id":"3a893a81b331","q":"What are the main benefits of comparative evaluation despite its limitations?","a":"It's easier to compare outputs than score them individually, captures human preference, never gets saturated like benchmarks, is hard to game, and provides discriminating signals about models"},{"id":"6ebda2a22777","q":"What is the main difference between exact evaluation and subjective evaluation?","a":"Exact evaluation produces judgment without ambiguity (like multiple choice answers), while subjective evaluation depends on who does the evaluation (like essay grading or AI as a judge)"},{"id":"ddf0e6da7d69","q":"Why should you not trust an AI judge if you can't see the model and prompt?","a":"AI judges are systems that include both a model and a prompt. Changes to either component result in a different judge, and without transparency, you can't determine if evaluation changes are due to your application or changes in the judge"},{"id":"505bc980c9fb","q":"What approach does Scale use to address standardization issues in comparative evaluation?","a":"They use only evaluators they can trust - training evaluators on criteria for comparing responses and teaching them to use practical prompts and sophisticated prompting techniques, though this is expensive"},{"id":"411cb6b222da","q":"According to the chapter, what is the relationship between investment in evaluation versus other AI engineering areas?","a":"Investment in evaluation lags significantly behind other areas - there are fewer tools for evaluation compared to modeling, training, and AI orchestration, leading to inadequate infrastructure for systematic evaluation"}]},{"id":"b0c3","title":"Evaluate AI Systems","summary":"Learn enterprise AI evaluation techniques including hallucination detection, factual consistency, toxicity analysis, latency evaluation, conversational testing, and evaluation-driven development workflows.","cards":[{"id":"a9cb633468c8","q":"What is evaluation-driven development in AI engineering?","a":"Evaluation-driven development means defining evaluation criteria before building AI applications. This approach is inspired by test-driven development in software engineering and ensures that applications demonstrate value and can be deployed with clear success metrics."},{"id":"0ada12d45694","q":"Why are certain AI applications more commonly deployed in enterprises?","a":"Enterprise applications with clear evaluation criteria are most common: recommender systems (measured by engagement/purchase rates), fraud detection (measured by money saved), coding applications (evaluated using functional correctness), and classification tasks (easier to evaluate than open-ended tasks)."},{"id":"3008f967c945","q":"What are the four main buckets of evaluation criteria for AI applications?","a":"1) Domain-specific capability (how good the model is at understanding the specific domain), 2) Generation capability (coherence, faithfulness of outputs), 3) Instruction-following capability (whether outputs meet requested format/constraints), 4) Cost and latency metrics."},{"id":"37a81a446473","q":"How are domain-specific capabilities typically evaluated?","a":"Domain-specific capabilities are commonly evaluated using exact evaluation methods. Coding capabilities use functional correctness, while non-coding capabilities often use close-ended tasks like multiple-choice questions, which are easier to verify and reproduce."},{"id":"76333e604d68","q":"What percentage of tasks in Eleuther's lm-evaluation-harness were multiple-choice as of April 2024?","a":"75% of the tasks were multiple-choice, including benchmarks like UC Berkeley's MMLU, Microsoft's AGIEval, and the AI2 Reasoning Challenge (ARC-C). This approach was chosen to avoid inconsistent assessment that comes with open-ended tasks."},{"id":"4052b09da222","q":"What are the two main categories of factual consistency verification?","a":"1) Local factual consistency: output evaluated against explicitly provided context (e.g., summaries consistent with original documents), 2) Global factual consistency: output evaluated against open knowledge (e.g., general chatbots, fact-checking)."},{"id":"356ce2e51828","q":"What are the three main AI as a judge techniques for evaluating factual consistency?","a":"1) Basic AI as a judge: asking an AI model to evaluate factual consistency, 2) Self-verification (like SelfCheckGPT): generating multiple outputs to check consistency, 3) Knowledge-augmented verification (like SAFE): using search engines to verify individual facts."},{"id":"b544a061e99f","q":"How does Google DeepMind's SAFE system work?","a":"SAFE works in four steps: 1) Decompose the response into individual statements, 2) Revise each statement to be self-contained, 3) Propose fact-checking queries for Google Search API, 4) Use AI to determine if statements are consistent with search results."},{"id":"c5a4ef059cb5","q":"What is textual entailment and how does it relate to factual consistency?","a":"Textual entailment determines relationships between statements: entailment (hypothesis inferred from premise), contradiction (hypothesis contradicts premise), or neutral. Entailment implies factual consistency, contradiction implies inconsistency, neutral means consistency can't be determined."},{"id":"ca0987633561","q":"What are the six main categories of unsafe content in AI outputs?","a":"1) Inappropriate language (profanity, explicit content), 2) Harmful recommendations/tutorials, 3) Hate speech (racist, sexist, discriminatory), 4) Violence (threats, graphic detail), 5) Stereotypes, 6) Biases toward political/religious ideologies."},{"id":"ae4c1d67cee1","q":"What are the two main purposes of roleplaying instructions in AI?","a":"1) Roleplaying characters for user interaction (entertainment, gaming, interactive storytelling), 2) Roleplaying as a prompt engineering technique to improve the quality of model outputs."},{"id":"e911aea4d9fa","q":"According to LMSYS's analysis, what ranking did roleplaying achieve among common use cases?","a":"Roleplaying was the eighth most common use case in LMSYS's analysis of one million conversations from their Vicuna demo and Chatbot Arena, making it especially important for AI-powered NPCs, AI companions, and writing assistants."},{"id":"4be91576b1f5","q":"What are the key latency metrics for foundation models?","a":"Multiple metrics including time to first token, time per token, time between tokens, and time per query. The relevance of each metric depends on your specific application needs and user experience requirements."},{"id":"1717b175778c","q":"What is the difference between 'open source', 'open weight', and 'open model'?","a":"'Open weight' refers to models where weights are public but training data isn't available. 'Open model' refers to models with both open weights and open training data. 'Open source' is used broadly for any model with public weights, regardless of data availability."},{"id":"f86d44307c2a","q":"What are the key licensing questions to ask about open source models?","a":"1) Does the license allow commercial use? 2) Are there restrictions on commercial use (e.g., Llama's 700M user limit)? 3) Can model outputs be used to train other models? Each license has different conditions that must be evaluated for specific needs."},{"id":"53edb00bd993","q":"What are the seven axes to consider when choosing between hosting models vs using APIs?","a":"1) Data privacy, 2) Data lineage and copyright, 3) Performance, 4) Functionality, 5) API cost vs engineering cost, 6) Control, access, and transparency, 7) On-device deployment needs."},{"id":"56fe9a7520e5","q":"Why might data contamination occur unintentionally in model training?","a":"Models trained on internet-scraped data can accidentally include publicly available benchmark data. Benchmark data published before model training is likely included in training data, contributing to benchmark saturation and the need for new benchmarks."},{"id":"06a0c0dffeff","q":"What are the two main methods for detecting data contamination?","a":"1) N-gram overlapping: checking if sequences of tokens (e.g., 13 tokens) appear in both training and evaluation data, 2) Perplexity: unusually low perplexity on evaluation data suggests the model has seen it during training."},{"id":"6818adba8206","q":"What did OpenAI find when analyzing GPT-3's contamination with common benchmarks?","a":"OpenAI found 13 benchmarks with at least 40% contamination in GPT-3's training data. They measured the relative difference in performance between evaluating only clean samples versus the whole benchmark."},{"id":"511b20720c2a","q":"What is the four-step model selection workflow described in the chapter?","a":"1) Filter models by hard attributes (licensing, privacy policies), 2) Use public benchmarks/leaderboards to narrow to promising models, 3) Run experiments with custom evaluation pipeline, 4) Continuously monitor in production and collect feedback for improvement."},{"id":"64886107cfee","q":"Why are public leaderboards limited in their benchmark selection?","a":"Due to compute constraints, most leaderboards include only a small number of benchmarks. For example, Hugging Face started with 4 benchmarks, extended to 6, while HELM used 10. This small set can't represent the vast capabilities of foundation models."},{"id":"a246b300aef9","q":"What is Simpson's paradox in model evaluation?","a":"A phenomenon where model A performs better than model B on aggregated data but worse than model B on every subset. This highlights the importance of slice-based evaluation to avoid misleading overall performance metrics."},{"id":"9820042339e1","q":"What are the three levels at which evaluation can occur in complex AI applications?","a":"1) Per task (overall completion of user's goal), 2) Per turn (quality of each interaction), 3) Per intermediate output (evaluation of individual component outputs within the system)."},{"id":"809fdba15e69","q":"What should be included in a comprehensive evaluation guideline?","a":"Define what the application should do AND what it shouldn't do, including out-of-scope inputs and appropriate responses. Create clear criteria with scoring rubrics and examples, validated by humans to ensure clarity and consistency."},{"id":"dc8af5ba4c08","q":"What is the importance of tying evaluation metrics to business metrics?","a":"Mapping evaluation metrics to business outcomes helps with planning and resource allocation. For example: 'Factual consistency of 80% enables automating 30% of support requests, 90% enables 50%, 98% enables 90%.' This determines usefulness thresholds."},{"id":"4dce803bfcac","q":"According to OpenAI's rough estimation, how many evaluation samples are needed for 95% confidence at different score differences?","a":"30% difference: ~10 samples, 10% difference: ~100 samples, 3% difference: ~1,000 samples, 1% difference: ~10,000 samples. Rule of thumb: for every 3× decrease in score difference, sample size increases 10×."},{"id":"4e9bfb97c086","q":"What is data slicing in evaluation and why is it important?","a":"Data slicing means separating data into subsets and evaluating performance on each separately. It helps avoid biases, debug performance issues, find improvement areas, and avoid Simpson's paradox where aggregate performance masks subset-specific problems."},{"id":"d25a6f8f416f","q":"What questions should be asked when evaluating an evaluation pipeline?","a":"1) Are you getting the right signals? (Do better responses get higher scores?) 2) How reliable is the pipeline? (Consistency across runs) 3) How correlated are metrics? (Avoid redundancy) 4) What cost/latency does evaluation add?"},{"id":"4dd45aff724a","q":"What was the key finding from the Stanford/UC Berkeley study about OpenAI model changes?","a":"The study found that GPT-3.5 and GPT-4's performances changed significantly between March 2023 and June 2023 on many benchmarks, leading to the perception that models were getting worse, highlighting evaluation challenges."},{"id":"c048198d47b7","q":"What types of feedback criteria do users typically employ according to LangChain's State of AI 2023?","a":"On average, users employed 2.3 different types of feedback criteria to evaluate an application. For example, a customer support application might use relevance, factual consistency, and safety as its three evaluation criteria."},{"id":"0bd83ef6bf0b","q":"Why is instruction-following capability essential for structured outputs?","a":"Applications requiring structured outputs (JSON format, regex matching) need models that can follow specific formatting instructions. If a model outputs unexpected formats like 'That's correct' instead of 'A, B, or C', it breaks downstream applications."},{"id":"f1881cd657ff","q":"What are the key considerations when mixing automatic and human evaluation methods?","a":"Use automatic metrics as much as possible for efficiency, but don't avoid human evaluation when needed. Consider using cheap classifiers on 100% of data and expensive AI judges on 1% for balanced confidence and cost management."},{"id":"a1a3c5689316","q":"How should evaluation methods be adapted for production versus experimentation?","a":"During experimentation, reference data may be available for comparison. In production, reference data may not be immediately available, but actual users provide feedback. Consider what user feedback to collect and how it correlates to other metrics."},{"id":"906bc6e0c8e7","q":"What is the bootstrap method for determining evaluation set size reliability?","a":"Create multiple bootstraps by drawing samples with replacement from your evaluation set, evaluate on each bootstrap, and check if results are consistent. If evaluation results vary wildly across bootstraps, you need a larger evaluation set."},{"id":"e014ea398d6f","q":"What are the pros and cons of using model APIs versus self-hosting models regarding functionality?","a":"APIs: More likely to support scaling, function calling, structured outputs, but less likely to expose logprobs. Self-hosting: No/limited support for function calling initially, but can access logprobs and intermediate outputs useful for classification, evaluation, and interpretability."},{"id":"885a344ce3ef","q":"Why has benchmark saturation become a recurring problem in AI evaluation?","a":"As AI models improve rapidly, benchmarks achieve perfect or near-perfect scores quickly. GLUE (2018) was saturated in one year, necessitating SuperGLUE (2019). Similarly, benchmarks had to evolve from grade-level to graduate-level questions as models improved."},{"id":"dcb1ab8c7bc9","q":"What was Rylan Schaeffer's demonstration about data contamination?","a":"In his satirical 2023 paper 'Pretraining on the Test Set Is All You Need', he showed that by training exclusively on benchmark data, his one-million-parameter model achieved near-perfect scores and outperformed much larger models, demonstrating contamination risks."},{"id":"da32efe3e897","q":"According to the chapter, what is the relationship between model strength and evaluation difficulty?","a":"The more intelligent AI models become, the harder they are to evaluate. Most people can identify errors in first-grade math, but few can do so for PhD-level solutions. As models surpass human performance, human evaluators may only detect differences through comparison."},{"id":"7516b692da7f","q":"What are the trade-offs between pointwise and comparative evaluation?","a":"Pointwise evaluation evaluates each model independently then ranks by scores, while comparative evaluation ranks models by direct comparison. Comparative evaluation is typically easier for subjective quality assessment but faces scalability challenges as model pairs grow quadratically."}]},{"id":"b0c4","title":"Prompt Engineering","summary":"Learn systematic prompt engineering techniques including zero-shot and few-shot prompting, chain-of-thought reasoning, self-critique prompting, prompt optimization, and reliable instruction design.","cards":[{"id":"d523c7d0e7e4","q":"What is prompt engineering?","a":"Prompt engineering refers to the process of crafting an instruction that gets a model to generate the desired outcome. It is the easiest and most common model adaptation technique that guides a model's behavior without changing the model's weights."},{"id":"660e0fff5ccd","q":"Why do some people criticize prompt engineering as not being a 'real thing'?","a":"Some argue that prompt engineering lacks the rigor to qualify as an engineering discipline and appears to be just 'fiddling with words until something works.' However, when conducted with systematic experimentation and evaluation, it can be as rigorous as any ML experiment."},{"id":"f20ea99a4e16","q":"What are the three main components of a prompt?","a":"1) Task description - what you want the model to do, including role and output format; 2) Example(s) of how to do the task; 3) The task - the concrete task you want the model to perform, such as a question to answer or book to summarize."},{"id":"688484a462e2","q":"What is in-context learning?","a":"In-context learning is teaching models what to do via prompts. It allows a model to learn desirable behavior from examples in the prompt without updating model weights, enabling the model to incorporate new information continually and preventing it from becoming outdated."},{"id":"6ba8c4a5f4e1","q":"What is the difference between zero-shot and few-shot learning?","a":"Zero-shot learning provides no examples in the prompt, while few-shot learning includes examples. Each example provided is called a 'shot' - so five examples would be 5-shot learning."},{"id":"a21af93c81f3","q":"How do system prompts and user prompts differ?","a":"System prompts typically contain task descriptions and instructions from application developers, while user prompts contain instructions from users. The model combines them into a single prompt using a specific chat template before processing."},{"id":"7529b428607f","q":"Why are chat templates important?","a":"Different models use different chat templates to combine system and user prompts. Using the wrong template can lead to significant performance issues. Even small mistakes like extra newlines can cause the model to behave differently."},{"id":"3a75af16ce53","q":"How has context length evolved in recent years?","a":"Context length has expanded rapidly from GPT-2's 1K tokens to Gemini-1.5 Pro's 2M tokens within five years - a 2,000-fold increase. A 100K context can fit a moderate-sized book, while 2M tokens can fit approximately 2,000 Wikipedia pages."},{"id":"0f226374c330","q":"What is the 'needle in a haystack' (NIAH) test?","a":"A test that inserts a random piece of information (the needle) in different locations within a prompt (the haystack) and asks the model to find it. Research shows models are much better at understanding information at the beginning and end of prompts than in the middle."},{"id":"e65bb2d031e8","q":"What is the first best practice for writing effective prompts?","a":"Write clear and explicit instructions. Explain without ambiguity what you want the model to do, including details like scoring systems, what to do when uncertain, and preventing undesirable behaviors through specific instructions."},{"id":"88c4dae6560c","q":"How can adopting a persona help with prompting?","a":"A persona helps the model understand the perspective it should use to generate responses. For example, asking a model to adopt the persona of a first-grade teacher when scoring an essay 'I like chickens. Chickens are fluffy and they give tasty eggs' might result in a higher score than without the persona."},{"id":"5c98f93c4e24","q":"Why should you provide examples in prompts?","a":"Examples reduce ambiguity about how you want the model to respond. For instance, when building a bot for young children, examples showing how to respond to questions about fictional characters (like saying tooth fairies exist) help guide appropriate responses."},{"id":"1494b17d19cc","q":"What should you consider when choosing example formats?","a":"Choose more token-efficient formats when concerned about input length. For example, 'chickpea --> edible' uses fewer tokens than 'Input: chickpea Output: edible' while achieving the same effect."},{"id":"8d6e7d0ab846","q":"Why is specifying output format important?","a":"Specifying format ensures model outputs work with downstream applications. If you want concise responses, tell the model explicitly. For structured outputs like JSON, specify the required keys and use markers to indicate where structured output should begin."},{"id":"fe7014857a6b","q":"How does providing sufficient context help model performance?","a":"Context helps models perform better and mitigates hallucinations. If a model lacks necessary information, it relies on internal knowledge which might be unreliable. Including relevant context, like a paper when asking questions about it, improves response quality."},{"id":"4b09cfe843da","q":"How can you restrict a model's knowledge to only its context?","a":"Use clear instructions like 'answer using only the provided context' along with examples of questions it shouldn't answer. Instruct the model to quote where in the corpus it draws answers from. However, prompting alone may not be fully reliable."},{"id":"6c995afe7923","q":"What are the benefits of breaking complex tasks into simpler subtasks?","a":"Benefits include: 1) Better monitoring of intermediate outputs, 2) Easier debugging by isolating problematic steps, 3) Parallelization of independent steps to save time, 4) Easier prompt writing for simple tasks."},{"id":"e366d6af3e87","q":"What is chain-of-thought (CoT) prompting?","a":"CoT prompting explicitly asks the model to think step by step, nudging it toward a more systematic approach to problem solving. It can be implemented by adding phrases like 'think step by step' or by specifying the steps the model should take."},{"id":"fc6c63397aa2","q":"What are the four CoT response variations mentioned in the chapter?","a":"1) Zero-shot CoT with 'think step by step', 2) Zero-shot CoT with 'explain your rationale', 3) Zero-shot CoT with specified steps to follow, 4) One-shot CoT with an example included in the prompt."},{"id":"acb0c239db22","q":"What is self-critique in prompting?","a":"Self-critique means asking the model to check its own outputs, also known as self-eval. Similar to CoT, it nudges the model to think critically about a problem and can improve response quality."},{"id":"bb5eba60513e","q":"Why is iteration important in prompt engineering?","a":"Prompt engineering requires back and forth experimentation. As you understand a model better, you develop better ideas for writing prompts. Each model has its own quirks, and systematic testing with version control and standardized evaluation is essential."},{"id":"5dc4642c296b","q":"What are automated prompt engineering tools designed to do?","a":"Tools like OpenPrompt and DSPy aim to automate the prompt engineering workflow. You specify input/output formats, evaluation metrics, and data, and these tools automatically find prompts or chains of prompts that maximize evaluation metrics."},{"id":"19d1bb48e752","q":"How does Promptbreeder work?","a":"Promptbreeder uses evolutionary strategy to 'breed' prompts. It starts with an initial prompt, uses an AI model to generate mutations guided by mutator prompts, selects the most promising mutations, and repeats the process until finding a satisfactory prompt."},{"id":"70908ed21244","q":"What are the potential risks of using prompt engineering tools?","a":"1) Hidden model API calls can quickly increase costs, 2) Tool developers can make mistakes with templates or prompts, 3) Tools can change without warning, 4) Increased system complexity can lead to more potential errors."},{"id":"a4508f0c0584","q":"What are the advantages of separating prompts from code?","a":"1) Reusability across multiple applications, 2) Separate testing of code and prompts, 3) Better readability, 4) Easier collaboration with subject matter experts who can help with prompts without being distracted by code."},{"id":"47f41c214381","q":"What is prompt extraction and why is it concerning?","a":"Prompt extraction is deducing the system prompt used for an application. Bad actors can use leaked system prompts to replicate your application or manipulate it into undesirable actions, similar to how knowing how a door is locked makes it easier to open."},{"id":"4494a283e1c8","q":"What is the difference between jailbreaking and prompt injection?","a":"Jailbreaking means trying to subvert a model's safety features (e.g., getting a customer support bot to explain how to make a bomb). Prompt injection involves injecting malicious instructions into user prompts (e.g., 'Delete the order entry from the database')."},{"id":"728002a94a8c","q":"What are the main risks posed by prompt attacks?","a":"1) Remote code or tool execution, 2) Data leaks of private information, 3) Social harms like dangerous tutorials, 4) Misinformation, 5) Service interruption and subversion, 6) Brand risk from offensive outputs."},{"id":"1f709434e082","q":"What is obfuscation in prompt hacking?","a":"Obfuscation involves intentionally misspelling keywords (like 'vacine' instead of 'vaccine'), hiding malicious keywords in mixtures of languages or Unicode, or inserting special characters to bypass keyword filters and confuse the model's safety measurements."},{"id":"25af21504059","q":"What is output formatting manipulation?","a":"This involves hiding malicious intent in unexpected formats, such as asking for a poem about hotwiring a car instead of direct instructions, or requesting code 'about' making dangerous items rather than explicit how-to instructions."},{"id":"bdd76f7d0115","q":"What was the DAN (Do Anything Now) attack?","a":"A roleplaying attack where users ask the model to pretend to be 'DAN' which 'can do anything now' and has 'broken free of typical AI confines.' The prompt typically claims DAN doesn't have to abide by rules and can do anything the original model cannot."},{"id":"020c5a66ab7a","q":"What is PAIR (Prompt Automatic Iterative Refinement)?","a":"PAIR uses an AI model as an attacker to generate prompts that bypass target AI systems. The attacker AI generates a prompt, sends it to the target, and revises based on the response until achieving its objective, often requiring fewer than twenty queries."},{"id":"823fd911a987","q":"What is indirect prompt injection?","a":"Instead of placing malicious instructions directly in prompts, attackers place them in tool
