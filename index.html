e vs batch), 3) Whether they work by comparing data points or detecting patterns (instance-based vs model-based)."},{"id":"2bc70d709dd6","q":"What is supervised learning?","a":"Training where the algorithm is fed a training set that includes the desired solutions, called labels. Examples include classification (like spam detection) and regression (predicting numeric values)."},{"id":"fcb16c3a556e","q":"What is the difference between classification and regression?","a":"Classification predicts categories or classes (like spam/ham), while regression predicts numeric values (like car prices). The terms 'label' is more common for classification, 'target' for regression."},{"id":"b30bccd031e6","q":"What is unsupervised learning?","a":"Learning from unlabeled training data where the system tries to learn without a teacher. Examples include clustering, visualization, dimensionality reduction, and anomaly detection."},{"id":"dfdb18a98038","q":"What is clustering in machine learning?","a":"An unsupervised learning task that detects groups of similar instances. For example, identifying that 40% of blog visitors are teenagers who love comic books and visit after school."},{"id":"dbc2cd2de2d9","q":"What is dimensionality reduction and why is it useful?","a":"Simplifying data without losing too much information, often by merging correlated features. It makes algorithms run faster, uses less memory, and sometimes improves performance."},{"id":"80c64d45b8d9","q":"What is anomaly detection?","a":"Detecting unusual instances, like fraudulent credit card transactions or manufacturing defects. The system learns from mostly normal instances during training."},{"id":"ce0359588fc4","q":"What is the difference between anomaly detection and novelty detection?","a":"Anomaly detection works with training data that may contain some anomalies, while novelty detection requires a very clean training set and detects instances that look different from all training instances."},{"id":"31fa83f9d15d","q":"What is semi-supervised learning?","a":"Learning from partially labeled data - when you have plenty of unlabeled instances and few labeled ones. Unlabeled examples can help classify new instances more accurately."},{"id":"496cc500d9a1","q":"What is self-supervised learning?","a":"Generating a fully labeled dataset from an unlabeled one. For example, randomly masking parts of images and training a model to recover the original image, then fine-tuning for the actual task."},{"id":"fb1aab8b7d15","q":"What is reinforcement learning?","a":"Learning where an agent observes the environment, selects actions, and gets rewards/penalties. It learns the best strategy (policy) to maximize rewards over time, like AlphaGo learning to play Go."},{"id":"0293b44deedc","q":"What is batch learning?","a":"The system cannot learn incrementally - it must be trained using all available data offline. Once launched into production, it applies what it learned without further learning."},{"id":"955169900656","q":"What are the problems with batch learning?","a":"Models suffer from model rot/data drift as the world evolves. Retraining requires lots of time and computing resources, and may be impossible with huge datasets."},{"id":"f8896a9de7cd","q":"What is online learning?","a":"Training the system incrementally by feeding data sequentially, either individually or in mini-batches. Each step is fast and cheap, allowing learning on-the-fly as new data arrives."},{"id":"08da4dae0b61","q":"What is the learning rate in online learning?","a":"A parameter controlling how fast the system adapts to new data. High learning rate = rapid adaptation but quick forgetting of old data. Low learning rate = slower learning but less sensitivity to noise."},{"id":"ed2a28690708","q":"What is out-of-core learning?","a":"Using online learning algorithms to train models on huge datasets that cannot fit in memory. The algorithm loads part of the data, trains, and repeats until all data is processed."},{"id":"59815c5ce790","q":"What is instance-based learning?","a":"Learning examples by heart, then generalizing to new cases using a similarity measure to compare them to learned examples. The system flags emails similar to known spam emails."},{"id":"da02f2a05b9f","q":"What is model-based learning?","a":"Building a model from examples and using that model to make predictions. The model generalizes from training data to make predictions on new instances."},{"id":"96c4bfb9924c","q":"What are the steps in a typical machine learning project workflow?","a":"1) Study the data, 2) Select a model, 3) Train it on training data (learning algorithm finds parameters that minimize cost function), 4) Apply the model to make predictions (inference)."},{"id":"33a3ff305f15","q":"What is the difference between model parameters and hyperparameters?","a":"Model parameters (like θ0, θ1) are found by the learning algorithm during training. Hyperparameters are parameters of the learning algorithm itself, set before training and remaining constant during training."},{"id":"118949fd5657","q":"What does 'The Unreasonable Effectiveness of Data' refer to?","a":"A concept showing that for complex problems, having more data often matters more than having better algorithms. Very different ML algorithms perform similarly when given enough data."},{"id":"54afdf3b1cea","q":"What is nonrepresentative training data and why is it problematic?","a":"Training data that doesn't represent the cases you want to generalize to. This leads to models that make inaccurate predictions, especially for cases not well represented in training."},{"id":"cc117a8f1888","q":"What is sampling bias?","a":"When even large samples are nonrepresentative due to flawed sampling methods. Famous example: 1936 Literary Digest poll that wrongly predicted Landon would beat Roosevelt due to sampling wealthy people."},{"id":"c472849f8237","q":"What are examples of poor-quality data issues?","a":"Errors, outliers, noise from poor measurements. Solutions include discarding outliers, fixing errors manually, and deciding how to handle missing features (ignore, fill with median, train separate models)."},{"id":"1951db47bbea","q":"What is feature engineering?","a":"Coming up with a good set of features to train on. Includes feature selection (choosing useful features), feature extraction (combining features), and creating new features by gathering new data."},{"id":"d45f8a620608","q":"What is overfitting?","a":"When the model performs well on training data but doesn't generalize well. It happens when the model is too complex relative to the amount and noisiness of training data."},{"id":"e32d935abde5","q":"What are solutions to overfitting?","a":"1) Simplify the model (fewer parameters, fewer attributes, more constraints), 2) Gather more training data, 3) Reduce noise in training data (fix errors, remove outliers)."},{"id":"1d85fe0f05d1","q":"What is regularization?","a":"Constraining a model to make it simpler and reduce overfitting risk. For example, forcing a linear model to have a smaller slope reduces complexity and improves generalization."},{"id":"657b0b049152","q":"What is underfitting?","a":"When the model is too simple to learn the underlying structure of the data. Even training examples have inaccurate predictions because reality is more complex than the model."},{"id":"e5c9d599f4ba","q":"What are solutions to underfitting?","a":"1) Select a more powerful model with more parameters, 2) Feed better features to the learning algorithm (feature engineering), 3) Reduce model constraints (reduce regularization)."},{"id":"502acf926ec0","q":"Why do we split data into training and test sets?","a":"To estimate generalization error (out-of-sample error) by testing on data the model hasn't seen. If training error is low but test error is high, the model is overfitting."},{"id":"18841975c847","q":"What is the typical train/test split ratio?","a":"Commonly 80% training and 20% testing, but this depends on dataset size. With 10 million instances, holding out 1% (100,000 instances) may be sufficient for testing."},{"id":"faafebd7ce68","q":"What is holdout validation?","a":"Holding out part of the training set as a validation set to evaluate candidate models and select the best hyperparameters. The final model is trained on the full training set including validation data."},{"id":"d18be394011d","q":"What is the problem with repeatedly testing on the same test set?","a":"You adapt the model to perform well on that specific test set, making it unlikely to perform as well on new data. The model becomes overfitted to the test set."},{"id":"188746d10f22","q":"What is cross-validation?","a":"Using many small validation sets repeatedly. Each model is evaluated once per validation set after training on the rest of the data. Averaging evaluations gives more accurate performance measures."},{"id":"cfe6ce1497e8","q":"What is data mismatch and how do you handle it?","a":"When training data isn't perfectly representative of production data. Use a train-dev set to distinguish between overfitting and data mismatch problems. Validation and test sets should be representative of production data."},{"id":"09a1b5c08bad","q":"What is the No Free Lunch theorem?","a":"If you make no assumptions about the data, there's no reason to prefer one model over another. For some datasets linear models are best, for others neural networks. You must evaluate reasonable models based on reasonable assumptions."},{"id":"f80bf8b28f5b","q":"What are the four main challenges in machine learning mentioned?","a":"1) Insufficient quantity of training data, 2) Nonrepresentative training data, 3) Poor-quality data, 4) Irrelevant features. Additionally, overfitting and underfitting are algorithm-related challenges."}]},{"id":"b2c1","title":"End-to-End Machine Learning Project","summary":"Learn how to build machine learning projects from data collection and preprocessing to feature engineering, pipelines, evaluation, and hyperparameter tuning.","cards":[{"id":"a48d09205e35","q":"What are the 8 main steps of a machine learning project?","a":"1. Look at the big picture, 2. Get the data, 3. Explore and visualize the data to gain insights, 4. Prepare the data for machine learning algorithms, 5. Select a model and train it, 6. Fine-tune your model, 7. Present your solution, 8. Launch, monitor, and maintain your system."},{"id":"3ba710a0677b","q":"What is the California Housing Prices dataset and what does it contain?","a":"A dataset based on data from the 1990 California census containing metrics such as population, median income, and median housing price for each block group in California. Block groups are the smallest geographical unit for which the US Census Bureau publishes sample data (typically 600 to 3,000 people)."},{"id":"f9ca02986168","q":"What type of machine learning problem is the housing price prediction task?","a":"It's a supervised learning task (has labeled examples), a regression task (predicting a value), specifically a multiple regression problem (uses multiple features) and a univariate regression problem (predicts a single value per district). It uses batch learning since there's no continuous flow of data."},{"id":"984e946bd840","q":"What is RMSE and how is it calculated?","a":"Root Mean Square Error (RMSE) is a typical performance measure for regression problems. It gives an idea of how much error the system typically makes in its predictions, with higher weight given to large errors. Formula: RMSE(X,h) = √(1/m × Σ(h(x^(i)) - y^(i))^2)"},{"id":"6f21cb9b401b","q":"What is MAE and when might you prefer it over RMSE?","a":"Mean Absolute Error (MAE) is the average absolute deviation. Formula: MAE(X,h) = 1/m × Σ|h(x^(i)) - y^(i)|. You might prefer MAE when there are many outlier districts, as RMSE is more sensitive to outliers than MAE."},{"id":"6c8e7f0a1910","q":"Why is it important to create a test set early in the process?","a":"Your brain is prone to overfitting - if you look at the test set, you may stumble upon seemingly interesting patterns that lead you to select a particular model. When you estimate generalization error using the test set, your estimate will be too optimistic, and you'll launch a system that won't perform as well as expected. This is called data snooping bias."},{"id":"49cb0a0b143b","q":"What is stratified sampling and why is it important?","a":"Stratified sampling divides the population into homogeneous subgroups called strata, and samples the right number of instances from each stratum to guarantee the test set is representative of the overall population. This is important when you want to ensure your test set represents various categories (e.g., income levels) in the same proportions as the overall dataset."},{"id":"de7ae17c0510","q":"What insights can you gain from creating histograms of numerical attributes?","a":"Histograms reveal: 1) Scale differences between attributes (e.g., median income vs total rooms), 2) Capped attributes that may be problematic for your target, 3) Skewed distributions that may need transformation, 4) The general shape and spread of your data distributions."},{"id":"756219cd3bbf","q":"What does a correlation coefficient tell you and what are its limitations?","a":"The correlation coefficient ranges from -1 to 1. Close to 1 means strong positive correlation, close to -1 means strong negative correlation, close to 0 means no linear correlation. Limitation: it only measures linear correlations and may completely miss nonlinear relationships."},{"id":"c02939001788","q":"Why should you experiment with attribute combinations?","a":"Raw attributes may not be as useful as combinations. For example, total rooms isn't very useful without knowing the number of households - what you really want is rooms per household. The chapter shows that bedrooms_ratio, rooms_per_house, and people_per_house were more correlated with median house value than the original attributes."},{"id":"f231dab2c0d1","q":"What are the three options for handling missing features in machine learning?","a":"1. Get rid of the corresponding instances (districts), 2. Get rid of the whole attribute, 3. Set the missing values to some value (zero, mean, median, etc.) - this is called imputation. Option 3 is often preferred as it's the least destructive."},{"id":"7a8f37ae3def","q":"What is SimpleImputer and what are its advantages over manual imputation?","a":"SimpleImputer is a Scikit-Learn class that stores the computed median (or mean/most frequent) value of each feature, making it possible to impute missing values not only on the training set, but also on validation set, test set, and any new data fed to the model."},{"id":"2adf64de3c11","q":"What is the difference between ordinal encoding and one-hot encoding?","a":"Ordinal encoding converts categories to numbers (0,1,2,3...) but ML algorithms assume nearby values are more similar. One-hot encoding creates one binary attribute per category where only one attribute equals 1 (hot) while others are 0 (cold). One-hot encoding is better when categories don't have a natural order."},{"id":"b8a9cee4a33d","q":"What are the two common approaches to feature scaling?","a":"1. Min-max scaling (normalization): values are shifted and rescaled to range from 0 to 1 by subtracting min and dividing by (max-min). 2. Standardization: subtracts mean value then divides by standard deviation, resulting in zero mean and unit standard deviation. Standardization is less affected by outliers."},{"id":"bfc9e46c1b0d","q":"When should you transform features before scaling them?","a":"When features have heavy-tailed distributions, both min-max scaling and standardization will squash most values into a small range. First transform the feature to shrink the heavy tail (e.g., compute square root or logarithm for positive features with right-heavy tails) to make the distribution more symmetrical before scaling."},{"id":"bab28bfaba45","q":"What is the difference between FunctionTransformer and creating a custom transformer class?","a":"FunctionTransformer is for transformations that don't require training - you just provide a function that transforms NumPy arrays. For trainable transformers that need to learn parameters in fit() and use them in transform(), you need to create a custom class with fit(), transform(), and fit_transform() methods."},{"id":"26de15bf1943","q":"What are the main design principles of Scikit-Learn's API?","a":"Consistency (all objects share consistent interface), Nonproliferation of classes (uses NumPy arrays/SciPy matrices, not custom classes), Composition (reuses existing building blocks), Sensible defaults (reasonable default values for most parameters). Key concepts: Estimators (fit()), Transformers (transform()), Predictors (predict())."},{"id":"69b157af41aa","q":"What is a Pipeline and why is it useful?","a":"A Pipeline is a sequence of transformations followed by a final estimator. It's useful because: 1) You can reproduce transformations easily on any dataset, 2) You build a reusable library of transformation functions, 3) You can use it in live systems, 4) You can easily try various transformation combinations."},{"id":"71b5b2841fdd","q":"What is ColumnTransformer and when do you use it?","a":"ColumnTransformer applies different transformations to different columns (e.g., numerical vs categorical attributes). It takes a list of triplets (name, transformer, column list) and applies each transformer to its specified columns, then concatenates the results horizontally."},{"id":"90ff342b38d2","q":"What happened when you trained a LinearRegression model on the housing data?","a":"The linear regression model achieved an RMSE of about 68,628, which is not very satisfying since most district values range between $120,000 and $265,000. This is an example of underfitting - the model is not powerful enough to capture the underlying patterns in the data."},{"id":"a0a7aead23de","q":"What happened when you trained a DecisionTreeRegressor on the training set?","a":"The decision tree achieved 0.0 error on the training set, which indicates severe overfitting rather than a perfect model. The model memorized the training data but failed to generalize - this was confirmed by cross-validation showing RMSE around 66,868."},{"id":"8bb258d23c23","q":"What is k-fold cross-validation and why is it better than a single validation set?","a":"K-fold cross-validation randomly splits the training set into k nonoverlapping subsets (folds), then trains and evaluates the model k times, using a different fold for evaluation each time. It gives you not only performance estimate but also measure of precision (standard deviation). However, it costs k times more training time."},{"id":"c11f13667043","q":"How did RandomForestRegressor perform compared to other models?","a":"RandomForestRegressor achieved much better results with mean RMSE of about 47,019 (vs 66,868 for decision tree and 69,858 for linear regression). However, training set RMSE was about 17,474, indicating still quite a lot of overfitting, but much better than the decision tree."},{"id":"96d0aa7cbeac","q":"What is GridSearchCV and how does it work?","a":"GridSearchCV searches for the best combination of hyperparameter values automatically. You provide hyperparameters to experiment with and values to try, and it uses cross-validation to evaluate all possible combinations. It finds the best combination and can retrain on the whole training set with the best parameters."},{"id":"26a1c96a6300","q":"What are the advantages of RandomizedSearchCV over GridSearchCV?","a":"RandomizedSearchCV is better when the hyperparameter search space is large because: 1) It explores more values for continuous hyperparameters, 2) Adding irrelevant hyperparameters doesn't slow it down, 3) You can run for any number of iterations instead of being forced to try all combinations."},{"id":"873b0398dece","q":"How can you analyze the best models to gain insights?","a":"RandomForestRegressor provides feature_importances_ attribute showing relative importance of each attribute for making accurate predictions. You can sort these to see which features are most/least useful, potentially dropping less useful features to simplify the model."},{"id":"b8bdafba7340","q":"What was the final test set performance and what does the confidence interval tell you?","a":"The final RMSE on the test set was 41,424. The 95% confidence interval ranged from 39,275 to 43,467, giving an idea of how precise this estimate is. A fairly large interval indicates some uncertainty in the generalization error estimate."},{"id":"03b2450fe1c5","q":"What are the key steps for deploying a model to production?","a":"1) Save the model (using joblib), 2) Transfer to production environment, 3) Load the model and any custom classes/functions it depends on, 4) Use model.predict() on new data. You can deploy as a web service, cloud service (like Google Vertex AI), or integrate directly into applications."},{"id":"a2f2a4aa47b0","q":"Why is monitoring important after deployment?","a":"Model performance can drop quickly (component breaks) or slowly due to model rot (world changes while model stays the same). You need monitoring code to check live performance and trigger alerts. Performance can be monitored through downstream metrics or human analysis, depending on the application."},{"id":"5d9b6b28488c","q":"What should you automate in a production ML system?","a":"1) Collect fresh data regularly and label it, 2) Script to train model and fine-tune hyperparameters automatically, 3) Script to evaluate new vs previous model on updated test set and deploy if performance doesn't decrease, 4) Monitor input data quality, 5) Keep backups of models and datasets for rollback capability."},{"id":"1a45e9e09741","q":"What is the difference between min-max scaling and standardization in terms of outlier sensitivity?","a":"Min-max scaling is very sensitive to outliers - a single outlier can crush all other values into a tiny range. Standardization is much less affected by outliers because it uses mean and standard deviation rather than min/max values."},{"id":"f8f0e019d0d3","q":"What is data snooping bias?","a":"Data snooping bias occurs when you look at the test set during development and stumble upon seemingly interesting patterns that lead you to select a particular model. This makes your generalization error estimate too optimistic because the model was indirectly trained on the test set through your selection process."},{"id":"2ffd0fce0664","q":"What is model rot and how do you address it?","a":"Model rot (or data drift) occurs when a model's performance decays over time because the world continues to evolve while the model remains unchanged. Address it by regularly retraining the model on up-to-date data and monitoring live performance to detect when retraining is needed."},{"id":"95acb59f481c","q":"What are some key insights from exploring the California housing data?","a":"1) Median income is the strongest predictor of housing prices, 2) Housing prices are related to location (proximity to ocean) and population density, 3) Some attributes were capped which could be problematic, 4) Many attributes had different scales requiring scaling, 5) Creating ratio features (like bedrooms_ratio) improved correlation with target."},{"id":"c0d54b810133","q":"What is the purpose of the income category attribute created in the chapter?","a":"The income_cat attribute was created to enable stratified sampling, ensuring the test set is representative of various income categories in the whole dataset. It divided median income into 5 categories, with each category containing sufficient instances to avoid bias in the estimates."},{"id":"97b6e22cd009","q":"What does it mean when Scikit-Learn cross-validation uses 'neg_root_mean_squared_error'?","a":"Scikit-Learn's cross-validation features expect a utility function (greater is better) rather than a cost function (lower is better), so the scoring function returns the negative RMSE. You need to switch the sign of the output to get the actual RMSE scores."},{"id":"ebc31d742586","q":"How do you handle the case where categorical attributes have many possible categories?","a":"If a categorical attribute has many categories, one-hot encoding creates many input features which may slow training and degrade performance. Solutions include: 1) Replace with numerical features related to categories (e.g., distance to ocean instead of ocean_proximity), 2) Use encoders from category_encoders package, 3) For neural networks, use learnable embeddings."},{"id":"6cf3dfbbc7ae","q":"What is the ClusterSimilarity custom transformer and what does it do?","a":"ClusterSimilarity is a custom transformer that uses KMeans clustering in fit() to identify main clusters in training data, then in transform() uses rbf_kernel() to measure how similar each sample is to each cluster center. It adds features representing geographic similarity to cluster centers, which can be more useful than raw latitude/longitude."},{"id":"000125325a25","q":"What are ensemble methods and why do they work well?","a":"Ensemble methods combine multiple models that perform best. The group often performs better than the best individual model (like random forests perform better than individual decision trees), especially if individual models make very different types of errors. Example: combine k-nearest neighbors with random forest by predicting their mean."},{"id":"ac5761b6a2fd","q":"What preprocessing steps were included in the final comprehensive pipeline?","a":"1) Missing value imputation with median for numerical, most frequent for categorical, 2) One-hot encoding for categorical features, 3) Ratio features (bedrooms_ratio, rooms_per_house, people_per_house), 4) Cluster similarity features, 5) Log transformation for heavy-tailed features, 6) Standardization of all numerical features."},{"id":"5ac12db91483","q":"What are some important considerations for monitoring ML systems in production?","a":"1) Monitor live performance through downstream metrics or human evaluation, 2) Set up alerts for performance drops, 3) Monitor input data quality for drift, 4) Automate retraining on fresh data, 5) Keep backups of models and datasets, 6) Have rollback procedures ready, 7) Evaluate models on various subsets to ensure fairness across different groups."},{"id":"d216373422eb","q":"What is the main takeaway about the balance between algorithms and process in machine learning?","a":"Much of the work is in data preparation, building monitoring tools, setting up human evaluation pipelines, and automating regular model training. It's better to be comfortable with the overall process and know 3-4 algorithms well rather than spend all your time exploring advanced algorithms. The infrastructure and process are often more work than building and training the model."}]},{"id":"b2c2","title":"Classification","summary":"Learn supervised classification systems, confusion matrices, precision/recall, ROC curves, multiclass classification, and evaluation techniques.","cards":[{"id":"ba6f9ac249f2","q":"What is the MNIST dataset and why is it significant in machine learning?","a":"The MNIST dataset is a collection of 70,000 small images of digits handwritten by high school students and employees of the US Census Bureau. Each image is labeled with the digit it represents (0-9). It's often called the hello world of machine learning because it's commonly used as a benchmark when people develop new classification algorithms."},{"id":"498e167478b6","q":"What are the dimensions and characteristics of MNIST images?","a":"MNIST images are 28 × 28 pixels, resulting in 784 features per image. Each feature represents one pixel's intensity, ranging from 0 (white) to 255 (black). The dataset contains 70,000 images total."},{"id":"9385fdf64687","q":"How is the MNIST dataset typically split for training and testing?","a":"The MNIST dataset is already split into a training set (first 60,000 images) and a test set (last 10,000 images). The training set is already shuffled, which is important for cross-validation and preventing learning algorithms from performing poorly on similar consecutive instances."},{"id":"504aad8fae15","q":"What is a binary classifier and how does it work?","a":"A binary classifier distinguishes between just two classes. For example, a 5-detector that classifies images as either 5 or not 5. It creates target vectors where True represents the positive class and False represents the negative class."},{"id":"611a29d6753b","q":"What is the SGDClassifier and why is it suitable for large datasets?","a":"SGDClassifier is a stochastic gradient descent classifier that handles very large datasets efficiently. It deals with training instances independently, one at a time, making it well-suited for online learning. It's a good starting point for classification tasks."},{"id":"2a5b760e1b98","q":"Why is accuracy often not the preferred performance measure for classifiers?","a":"Accuracy can be misleading, especially with skewed datasets where some classes are much more frequent than others. For example, a dummy classifier that always predicts not 5 achieves over 90% accuracy on MNIST simply because only about 10% of images are 5s, but this classifier is not useful."},{"id":"bb9f9ccfa094","q":"What is a confusion matrix and what information does it provide?","a":"A confusion matrix counts the number of times instances of class A are classified as class B for all A/B pairs. Each row represents an actual class, while each column represents a predicted class. It shows true negatives, false positives, false negatives, and true positives."},{"id":"bae8f19c0d9b","q":"How do you interpret the values in a confusion matrix?","a":"Using a 2x2 matrix: True negatives (top-left) are correctly classified negative instances, false positives (top-right) are incorrectly classified as positive, false negatives (bottom-left) are incorrectly classified as negative, and true positives (bottom-right) are correctly classified positive instances."},{"id":"706401dd0fe8","q":"What is precision and how is it calculated?","a":"Precision is the accuracy of positive predictions, calculated as TP/(TP + FP), where TP is true positives and FP is false positives. It answers: Of all instances predicted as positive, how many were actually positive?"},{"id":"1425293dfea3","q":"What is recall and how is it calculated?","a":"Recall (also called sensitivity or true positive rate) is the ratio of positive instances correctly detected by the classifier, calculated as TP/(TP + FN), where FN is false negatives. It answers: Of all actual positive instances, how many were correctly identified?"},{"id":"5609880840c8","q":"What is the F1 score and why is it useful?","a":"The F1 score is the harmonic mean of precision and recall, calculated as 2 × (precision × recall)/(precision + recall). It's useful when you need a single metric to compare classifiers, as it only gives a high score when both precision and recall are high."},{"id":"86274d059af8","q":"What is the precision/recall trade-off?","a":"Increasing precision reduces recall, and vice versa. This occurs because classifiers use decision thresholds - raising the threshold increases precision (fewer false positives) but decreases recall (more false negatives), while lowering the threshold has the opposite effect."},{"id":"8437619e8aaa","q":"How does adjusting the decision threshold affect classifier predictions?","a":"Classifiers compute a score for each instance and assign it to the positive class if the score exceeds a threshold. Raising the threshold makes the classifier more selective (higher precision, lower recall), while lowering it makes it more inclusive (lower precision, higher recall)."},{"id":"ededacb24c4d","q":"What is the precision_recall_curve() function used for?","a":"The precision_recall_curve() function computes precision and recall for all possible thresholds. It helps visualize the precision/recall trade-off and allows you to select an appropriate threshold based on your requirements."},{"id":"99585147e555","q":"What is the ROC curve and what does it plot?","a":"The ROC (Receiver Operating Characteristic) curve plots the true positive rate (recall) against the false positive rate for various threshold values. The false positive rate is the ratio of negative instances incorrectly classified as positive, equal to 1 - specificity."},{"id":"40c860aaf471","q":"How do you interpret ROC AUC scores?","a":"ROC AUC (Area Under the Curve) measures the area under the ROC curve. A perfect classifier has ROC AUC = 1, while a purely random classifier has ROC AUC = 0.5. Higher values indicate better performance."},{"id":"b5d84d68cbd0","q":"When should you prefer the precision/recall curve over the ROC curve?","a":"Prefer the precision/recall curve when the positive class is rare or when you care more about false positives than false negatives. Otherwise, use the ROC curve. PR curves better highlight performance issues with imbalanced datasets."},{"id":"a26024877f56","q":"What is multiclass classification and how does it differ from binary classification?","a":"Multiclass classification (also called multinomial classification) distinguishes between more than two classes, while binary classification only handles two classes. Some algorithms handle multiclass natively, while others require special strategies."},{"id":"d8e74cc615f5","q":"What is the One-versus-the-Rest (OvR) strategy?","a":"OvR trains one binary classifier for each class (e.g., 0-detector, 1-detector, etc.). When classifying an image, it runs all classifiers and selects the class whose classifier outputs the highest score. Also called One-versus-All (OvA)."},{"id":"79e9e989b992","q":"What is the One-versus-One (OvO) strategy?","a":"OvO trains a binary classifier for every pair of classes. For N classes, you need N × (N-1)/2 classifiers. When classifying, you run the image through all classifiers and select the class that wins the most duels."},{"id":"a513ef70f6dc","q":"When is OvO preferred over OvR?","a":"OvO is preferred for algorithms that scale poorly with training set size (like SVMs) because it's faster to train many classifiers on small training sets than few classifiers on large sets. For most algorithms, OvR is preferred."},{"id":"076c131afd6b","q":"How does Scikit-Learn handle multiclass classification automatically?","a":"When you use a binary classification algorithm for a multiclass task, Scikit-Learn automatically runs OvR or OvO depending on the algorithm. For example, SVC uses OvO while SGDClassifier uses OvR."},{"id":"a6217e41da89","q":"What happens when you call decision_function() on a multiclass classifier?","a":"For multiclass classifiers, decision_function() returns multiple scores per instance. For OvO strategy, each class gets a score equal to the number of won duels (plus small adjustments for tie-breaking). For OvR, it returns one score per class."},{"id":"32d94f0f9234","q":"Why is scaling inputs important for classification performance?","a":"Scaling inputs can significantly improve performance. In the example, simply scaling the MNIST inputs increased SGDClassifier accuracy from about 85.8% to above 89.1%, demonstrating the importance of data preprocessing."},{"id":"7d07a12cc340","q":"What is error analysis and why is it important?","a":"Error analysis involves examining the types of errors a classifier makes to find ways to improve it. This includes analyzing confusion matrices, looking at individual error cases, and understanding patterns in misclassifications."},{"id":"8e44d3aec43a","q":"How do you normalize a confusion matrix and why would you do this?","a":"Normalize by dividing each value by the total number of images in the corresponding class (row normalization) or predicted class (column normalization). This helps compare error rates across classes and compensates for class imbalance."},{"id":"7c749e4477a3","q":"What insights can you gain from analyzing individual classification errors?","a":"Individual error analysis can reveal why classifiers fail. For example, examining misclassified 3s and 5s shows that linear models like SGDClassifier are sensitive to small pixel differences and may confuse digits that differ by only a few pixels."},{"id":"bdcda9c229ff","q":"What is data augmentation and how can it help with classification?","a":"Data augmentation involves creating slightly modified versions of training images (e.g., shifted or rotated) to expand the training set. This forces the model to learn tolerance to such variations, potentially reducing errors from image positioning or rotation."},{"id":"50db70d271f8","q":"What is multilabel classification?","a":"Multilabel classification is when a classifier outputs multiple classes for each instance. For example, a face recognition system might output [True, False, True] meaning it recognizes Alice and Charlie but not Bob in the same picture."},{"id":"e23fc6bfdcf4","q":"How do you create a multilabel classification dataset?","a":"Create multiple target labels for each instance. In the example, y_multilabel contains two labels per digit: whether it's large (7, 8, or 9) and whether it's odd, creating targets like [False, True] for digit 5."},{"id":"6bbf9b09a809","q":"How do you evaluate multilabel classifiers?","a":"One approach is to measure the F1 score for each individual label, then compute the average score. You can use average=macro for equal weighting or average=weighted to give more weight to labels with more instances."},{"id":"a83f43470606","q":"What is a ClassifierChain and when is it useful?","a":"ClassifierChain organizes models in a sequence where each model uses input features plus predictions from previous models in the chain. This helps capture dependencies between labels that single models might miss."},{"id":"147a841713bf","q":"What is multioutput classification?","a":"Multioutput classification is a generalization of multilabel classification where each label can be multiclass (having more than two possible values). For example, predicting pixel intensities (0-255) for each pixel in an image."},{"id":"0407dedccf51","q":"How does the noise removal example demonstrate multioutput classification?","a":"The system takes noisy digit images as input and outputs clean images. Each pixel is a label that can have multiple values (0-255 intensity), making it multioutput. The classifier predicts 784 labels (pixels) per image."},{"id":"35b755eee590","q":"What is the difference between classification and regression in multioutput systems?","a":"The line can be blurry - predicting pixel intensities could be considered regression rather than classification. Multioutput systems aren't limited to classification and can output both class labels and continuous values."},{"id":"f01ba63704c4","q":"Why should you always create a test set before inspecting data closely?","a":"You should set aside a test set before detailed data inspection to avoid data snooping bias. The test set should only be used at the very end when you have a classifier ready to launch, ensuring unbiased performance evaluation."},{"id":"e493527ea25d","q":"What is cross_val_predict() and how does it differ from cross_val_score()?","a":"cross_val_predict() performs k-fold cross-validation but returns predictions instead of evaluation scores. It provides clean out-of-sample predictions for each training instance, which can then be used to compute confusion matrices."},{"id":"9fa01ac9c0d8","q":"What does StratifiedKFold do in cross-validation?","a":"StratifiedKFold performs stratified sampling to create folds that contain a representative ratio of each class. This ensures that each fold is similar in class distribution, which is important for reliable cross-validation results."},{"id":"fd93b7a5b904","q":"How do predict_proba() and decision_function() differ?","a":"predict_proba() returns class probabilities for each instance (e.g., [0.11, 0.89] for negative/positive), while decision_function() returns decision scores. RandomForestClassifier has predict_proba() but not decision_function()."},{"id":"259964616bac","q":"What are the key steps in building a classification system?","a":"Key steps include: 1) Create and set aside test set, 2) Choose appropriate performance metrics, 3) Train classifiers using cross-validation, 4) Analyze errors and confusion matrices, 5) Fine-tune using techniques like scaling, 6) Evaluate on test set when ready to launch."}]},{"id":"b2c3","title":"Training Models","summary":"Learn linear regression, gradient descent, regularization, polynomial regression, optimization methods, and the mathematics behind machine learning training.","cards":[{"id":"48df88da1f30","q":"What is a closed-form equation and how does it apply to training linear regression models?","a":"A closed-form equation is only composed of a finite number of constants, variables, and standard operations (no infinite sums, limits, or integrals). For linear regression, the Normal equation provides a closed-form solution that directly computes the model parameters that best fit the training set by minimizing the cost function."},{"id":"1145fe070c1b","q":"What is the basic form of a linear regression model prediction?","a":"ŷ = θ₀ + θ₁x₁ + θ₂x₂ + ⋯ + θₙxₙ, where ŷ is the predicted value, n is the number of features, xᵢ is the i-th feature value, and θⱼ are the model parameters including the bias term θ₀ and feature weights."},{"id":"711ea6811d04","q":"How can the linear regression model be written in vectorized form?","a":"ŷ = hθ(x) = θ · x, where hθ is the hypothesis function, θ is the parameter vector containing bias and feature weights, x is the feature vector with x₀ = 1, and θ · x is the dot product."},{"id":"f4d035b3805c","q":"What is the MSE cost function for linear regression and why is it preferred over RMSE during training?","a":"MSE(X, hθ) = (1/m) Σᵢ₌₁ᵐ (θᵀxⁱ - yⁱ)². It's simpler to minimize MSE than RMSE during training because minimizing a positive function also minimizes its square root, leading to the same optimal parameters."},{"id":"385855c971b0","q":"What is the Normal equation and what does it compute?","a":"The Normal equation is θ̂ = (XᵀX)⁻¹Xᵀy. It directly computes the value of θ that minimizes the MSE cost function for linear regression, providing a closed-form solution without needing iterative optimization."},{"id":"9c522030fd17","q":"What is the computational complexity of the Normal equation and when does it become problematic?","a":"The Normal equation has complexity O(n²·⁴) to O(n³) for inverting the (n+1)×(n+1) matrix. It becomes very slow when the number of features grows large (e.g., 100,000+ features), but handles large training sets efficiently as it's O(m) with respect to instances."},{"id":"cb93464aca0c","q":"What is gradient descent and how does it work conceptually?","a":"Gradient descent is a generic optimization algorithm that finds optimal solutions by iteratively tweaking parameters to minimize a cost function. It measures the local gradient of the error function and moves in the direction of descending gradient until reaching a minimum."},{"id":"c44b0451a2f2","q":"What role does the learning rate hyperparameter play in gradient descent?","a":"The learning rate determines the size of steps in gradient descent. If too small, the algorithm takes many iterations to converge. If too large, it might overshoot and diverge, jumping across the valley and potentially getting further from the solution."},{"id":"f3680b643862","q":"Why is the MSE cost function for linear regression particularly suitable for gradient descent?","a":"The MSE cost function is convex (no local minima, just one global minimum) and continuous with slopes that never change abruptly. This guarantees that gradient descent will approach the global minimum if the learning rate isn't too high and you wait long enough."},{"id":"092cbec63205","q":"Why is feature scaling important for gradient descent?","a":"When features have very different scales, the cost function becomes an elongated bowl, causing gradient descent to take a long, inefficient path to the minimum. Scaling features to similar ranges (e.g., using StandardScaler) allows the algorithm to converge much faster."},{"id":"916c346839f3","q":"What is batch gradient descent and what are its characteristics?","a":"Batch gradient descent computes gradients using the full training set at each step. The gradient vector is ∇θMSE(θ) = (2/m)Xᵀ(Xθ - y). It's slow on large datasets but scales well with number of features and provides stable convergence."},{"id":"ff6b9afde2da","q":"What is stochastic gradient descent (SGD) and how does it differ from batch GD?","a":"SGD picks a random instance at each step and computes gradients based only on that single instance. It's much faster and can handle huge datasets since only one instance needs to be in memory, but the path is more erratic and it bounces around the minimum."},{"id":"1a0a00332ab4","q":"What is a learning schedule and why is it used with SGD?","a":"A learning schedule gradually reduces the learning rate during training. It starts with large steps (for quick progress and escaping local minima) then gets smaller, allowing the algorithm to settle at the global minimum. This is similar to simulated annealing."},{"id":"c76fe9e8657a","q":"What is mini-batch gradient descent and what are its advantages?","a":"Mini-batch GD computes gradients on small random sets of instances. It gets performance boosts from hardware optimization (especially GPUs), has less erratic progress than SGD, and walks closer to the minimum than SGD while being faster than batch GD."},{"id":"f95feed16b26","q":"What is polynomial regression and how is it implemented?","a":"Polynomial regression fits nonlinear data by adding powers of each feature as new features, then training a linear model on this extended set. For example, adding x₁² transforms the feature space to allow fitting quadratic relationships."},{"id":"9c8b324d1fd7","q":"How does PolynomialFeatures work and what is the combinatorial explosion problem?","a":"PolynomialFeatures(degree=d) transforms n features into (n+d)!/d!n! features, adding all combinations up to the given degree. This causes combinatorial explosion - the number of features grows very rapidly with degree and number of original features."},{"id":"c0eb7e74147c","q":"What are learning curves and how do they help detect overfitting and underfitting?","a":"Learning curves plot training and validation error as functions of training set size or iterations. If both errors are high and close, the model is underfitting. If there's a large gap with low training error but high validation error, the model is overfitting."},{"id":"98cdfb992339","q":"What is the bias/variance trade-off in machine learning?","a":"Generalization error = Bias + Variance + Irreducible error. Bias comes from wrong assumptions (high-bias models underfit). Variance comes from sensitivity to training data variations (high-variance models overfit). Increasing model complexity typically increases variance and reduces bias."},{"id":"26d888501111","q":"What is ridge regression and how does it work?","a":"Ridge regression adds a regularization term α/m Σᵢ₌₁ⁿ θᵢ² to the MSE cost function. This forces the algorithm to keep model weights small, reducing overfitting. The hyperparameter α controls regularization strength - larger α means more regularization."},{"id":"6e1302433bab","q":"What is the closed-form solution for ridge regression?","a":"θ̂ = (XᵀX + αA)⁻¹Xᵀy, where A is the (n+1)×(n+1) identity matrix with a 0 in the top-left cell (corresponding to the bias term, which isn't regularized)."},{"id":"2361988aeca9","q":"What is lasso regression and how does it differ from ridge regression?","a":"Lasso regression uses the ℓ1 norm of weights in its regularization term: J(θ) = MSE(θ) + 2α Σᵢ₌₁ⁿ |θᵢ|. Unlike ridge regression (ℓ2), lasso tends to eliminate weights of least important features (sets them to zero), automatically performing feature selection."},{"id":"e2089d048854","q":"Why does lasso regression eliminate features while ridge regression doesn't?","a":"The ℓ1 penalty in lasso creates 'gutters' along the axes in parameter space. Gradient descent naturally moves along these gutters, driving parameters to exactly zero. Ridge regression's ℓ2 penalty creates circular contours that shrink parameters toward zero but rarely eliminate them entirely."},{"id":"9fd51da9135c","q":"What is elastic net regression and when should it be preferred?","a":"Elastic net combines ridge and lasso: J(θ) = MSE(θ) + r·2α Σ|θᵢ| + (1-r)·α/m Σθᵢ². When r=0 it's ridge, when r=1 it's lasso. It's preferred over lasso when features > instances or when several features are strongly correlated."},{"id":"5432805d259c","q":"What is early stopping and how does it work as regularization?","a":"Early stopping monitors validation error during training and stops when it reaches a minimum (before it starts increasing again). It's a simple, efficient regularization technique that prevents overfitting without needing to modify the cost function."},{"id":"b590ba3b3244","q":"What is logistic regression and what does it estimate?","a":"Logistic regression estimates the probability that an instance belongs to a particular class. It computes a weighted sum like linear regression, but outputs the logistic (sigmoid) of the result: p = σ(θᵀx) = 1/(1 + exp(-θᵀx))."},{"id":"5a4a12a384e7","q":"What is the logistic function and what are its properties?","a":"The logistic function σ(t) = 1/(1 + exp(-t)) is S-shaped (sigmoid) and outputs values between 0 and 1. When t < 0, σ(t) < 0.5; when t ≥ 0, σ(t) ≥ 0.5. This makes it suitable for binary classification with a default 50% threshold."},{"id":"2b1874a96e74","q":"What is the cost function for logistic regression and why is it used?","a":"The cost function (log loss) is J(θ) = -(1/m) Σᵢ₌₁ᵐ [yⁱlog(pⁱ) + (1-yⁱ)log(1-pⁱ)]. It penalizes wrong predictions heavily: -log(t) grows very large as t approaches 0, so low probability estimates for positive instances (and vice versa) incur high cost."},{"id":"b3a3a4eb06e1","q":"What are the partial derivatives of the logistic regression cost function?","a":"∂J(θ)/∂θⱼ = (1/m) Σᵢ₌₁ᵐ (σ(θᵀxⁱ) - yⁱ)xⱼⁱ. This looks similar to linear regression - for each instance, it computes the prediction error and multiplies by the j-th feature value, then averages over all instances."},{"id":"09be85ef4202","q":"What is softmax regression and when is it used?","a":"Softmax regression (multinomial logistic regression) generalizes logistic regression to multiple classes directly. It computes a score for each class sₖ(x) = θₖᵀx, then applies the softmax function to estimate probabilities: pₖ = exp(sₖ(x))/Σⱼexp(sⱼ(x))."},{"id":"6d82253a05ed","q":"What is the softmax function and what does it compute?","a":"The softmax function computes pₖ = exp(sₖ(x))/Σⱼ₌₁ᴷ exp(sⱼ(x)), where K is the number of classes. It normalizes the exponentials of all class scores to create a probability distribution - all probabilities sum to 1."},{"id":"563192014052","q":"What is the cross entropy cost function for softmax regression?","a":"J(Θ) = -(1/m) Σᵢ₌₁ᵐ Σₖ₌₁ᴷ yₖⁱ log(pₖⁱ), where yₖⁱ is 1 if instance i belongs to class k, 0 otherwise. When K=2, this reduces to the logistic regression cost function."},{"id":"f9dcfeab9e93","q":"How do you implement polynomial regression with Scikit-Learn?","a":"Use PolynomialFeatures to transform features: poly_features = PolynomialFeatures(degree=2, include_bias=False); X_poly = poly_features.fit_transform(X). Then fit a LinearRegression model on the transformed features."},{"id":"ec73a78a9816","q":"What are the key differences between Normal equation, SVD, and gradient descent approaches?","a":"Normal equation: O(n³), no hyperparameters, no scaling required, doesn't work with large n. SVD: O(n²), more stable. Gradient descent: works with large n, requires hyperparameters and scaling, can be used for other models beyond linear regression."},{"id":"d505bb097fc7","q":"When should you use ridge, lasso, or elastic net regression?","a":"Ridge: good default choice, handles correlated features well. Lasso: when you suspect only a few features are useful (automatic feature selection). Elastic net: preferred over lasso when features > instances or when several features are strongly correlated."},{"id":"6a793819e1d5","q":"What is the decision boundary in logistic regression and what determines it?","a":"The decision boundary is where the model estimates 50% probability for each class. For logistic regression, it occurs when θᵀx = 0, which defines a linear boundary. The model predicts positive class when θᵀx > 0 and negative class when θᵀx < 0."},{"id":"2b3d9a58f96d","q":"How does Scikit-Learn handle regularization parameters in different models?","a":"Ridge/Lasso: use 'alpha' parameter for regularization strength. SGDRegressor: use 'penalty' parameter ('l1', 'l2') and 'alpha'. LogisticRegression: uses 'C' parameter, which is the inverse of regularization strength (higher C = less regularization)."},{"id":"e6f444fce5bd","q":"What is the relationship between logit, log-odds, and the logistic function?","a":"The logit function logit(p) = log(p/(1-p)) is the inverse of the logistic function. The score t in logistic regression is the logit of the estimated probability. Logit is also called log-odds since it's the log of the ratio between positive and negative class probabilities."},{"id":"8439a229a723","q":"What convergence guarantees does gradient descent have for different types of cost functions?","a":"For convex cost functions (like MSE for linear regression), gradient descent is guaranteed to find the global minimum. For non-convex functions, it may get stuck in local minima. The logistic regression cost function is also convex, ensuring global minimum convergence."},{"id":"7996941338ef","q":"How do you implement early stopping with SGD in practice?","a":"Monitor validation error at each epoch. Keep track of the best model so far. Stop training when validation error stops improving for a specified number of epochs. Use copy.deepcopy() to save the best model (copies both hyperparameters and learned parameters)."}]},{"id":"b2c4","title":"Support Vector Machines","summary":"Learn SVMs, margins, support vectors, kernel methods, nonlinear classification, and regression using support vector techniques.","cards":[{"id":"d1f4b8357aba","q":"What is a Support Vector Machine (SVM) and what types of tasks can it perform?","a":"A Support Vector Machine (SVM) is a powerful and versatile machine learning model capable of performing linear or nonlinear classification, regression, and even novelty detection. SVMs excel with small to medium-sized nonlinear datasets (hundreds to thousands of instances), especially for classification tasks, but don't scale well to very large datasets."},{"id":"4da7ad40438e","q":"What is the fundamental idea behind SVMs and what is large margin classification?","a":"The fundamental idea behind SVMs is to fit the widest possible street between classes. An SVM classifier finds the decision boundary that not only separates classes but also stays as far away from the closest training instances as possible. This is called large margin classification - the SVM tries to maximize the margin (width of the street) between classes."},{"id":"0ed4d5a2cadd","q":"What are support vectors in the context of SVMs?","a":"Support vectors are the training instances located on the edge of the margin (street). These instances fully determine the decision boundary - adding more training instances 'off the street' will not affect the decision boundary at all, as it is fully determined by these support vectors on the margin's edge."},{"id":"b28963b4644f","q":"Why is feature scaling important for SVMs?","a":"SVMs are sensitive to feature scales. When features have very different scales (e.g., vertical scale much larger than horizontal), the widest possible margin becomes distorted. Feature scaling (e.g., using StandardScaler) ensures the decision boundary is properly oriented and the algorithm performs optimally."},{"id":"938dd207320b","q":"What is the difference between hard margin and soft margin classification?","a":"Hard margin classification requires all instances to be off the street and on the correct side - it only works with linearly separable data and is sensitive to outliers. Soft margin classification is more flexible, allowing some margin violations to find a good balance between keeping the street large and limiting violations. This makes it work with non-linearly separable data."},{"id":"4f200ee11f45","q":"How does the hyperparameter C affect SVM behavior?","a":"The hyperparameter C controls the trade-off between margin width and margin violations. A low C value creates a wider street but allows more margin violations (more regularization, less risk of overfitting). A high C value creates fewer margin violations but a narrower street (less regularization, higher risk of overfitting)."},{"id":"e70c5940fbfd","q":"How do you implement a linear SVM classifier using Scikit-Learn?","a":"Use a pipeline with StandardScaler for feature scaling followed by LinearSVC: svm_clf = make_pipeline(StandardScaler(), LinearSVC(C=1, random_state=42)). The pipeline first scales features, then applies the linear SVM classifier with the specified C value for regularization."},{"id":"8d9abac29c00","q":"What is the difference between LinearSVC's decision_function() and predict_proba() methods?","a":"LinearSVC has decision_function() which returns signed distances from the decision boundary, but it doesn't have predict_proba() to estimate class probabilities. To get probabilities, you need to use SVC class with probability=True, which fits an extra model using 5-fold cross-validation, significantly slowing training."},{"id":"477f13db5196","q":"How can you make SVMs work with nonlinear datasets?","a":"Add more features such as polynomial features to make the dataset linearly separable in the higher-dimensional space. For example, adding x₂ = (x₁)² as a second feature can make a 1D non-linearly separable dataset linearly separable in 2D space."},{"id":"a7650f4687d5","q":"What is the polynomial kernel and how does it work?","a":"The polynomial kernel allows SVMs to get the same result as adding polynomial features without actually computing them, avoiding the combinatorial explosion of features. It's implemented in SVC as: SVC(kernel='poly', degree=3, coef0=1, C=5). The degree controls polynomial degree, and coef0 controls influence of high-degree vs low-degree terms."},{"id":"d198a92ffd88","q":"What are similarity features and how do they work with landmarks?","a":"Similarity features measure how much each instance resembles particular landmarks using a similarity function (like Gaussian RBF). For example, with landmarks at x₁=-2 and x₁=1, an instance at x₁=-1 gets features x₂=exp(-0.3×1²)≈0.74 and x₃=exp(-0.3×2²)≈0.30, transforming the dataset to make it linearly separable."},{"id":"5c7d2f85e518","q":"What is the Gaussian RBF kernel and how do its hyperparameters affect the model?","a":"The Gaussian RBF kernel applies the kernel trick to similarity features. Increasing gamma (γ) makes the bell curve narrower, creating more irregular decision boundaries (higher variance, potential overfitting). Decreasing γ makes the curve wider, creating smoother boundaries (acts like regularization). It's used as: SVC(kernel='rbf', gamma=5, C=0.001)."},{"id":"60ca128f65a0","q":"How do you choose between different SVM classes in Scikit-Learn?","a":"LinearSVC: fastest for linear SVMs, no kernel trick, O(m×n) complexity. SVC: supports kernel trick, slower O(m²×n) to O(m³×n), best for small/medium nonlinear datasets. SGDClassifier: O(m×n) complexity, supports out-of-core learning, good for very large datasets. Always try linear first, then RBF kernel if dataset isn't too large."},{"id":"847653c077d8","q":"How do SVMs work for regression tasks?","a":"SVM regression reverses the objective: instead of fitting the largest possible street between classes while limiting margin violations, it tries to fit as many instances as possible ON the street while limiting margin violations (instances off the street). The street width is controlled by hyperparameter ε (epsilon)."},{"id":"40482dd7a14e","q":"What does ε-insensitive mean in SVM regression?","a":"ε-insensitive means the model ignores errors smaller than ε. Adding training instances within the margin (street) won't affect predictions. Reducing ε increases the number of support vectors, which regularizes the model. The model only cares about instances outside the ε-tube around the prediction line."},{"id":"0dae0a7a32b4","q":"How do you implement linear and nonlinear SVM regression?","a":"Linear: LinearSVR(epsilon=0.5) with StandardScaler. Nonlinear: SVR(kernel='poly', degree=2, C=0.01, epsilon=0.1) for polynomial kernel. SVR supports kernel trick like SVC, while LinearSVR scales linearly with training set size like LinearSVC."},{"id":"c63f8f0a79d3","q":"How does a linear SVM classifier make predictions mathematically?","a":"A linear SVM computes the decision function w⊺x + b, where w is the feature weights vector and b is the bias term. If the result is positive, the predicted class is positive (1); otherwise it's negative (0). This is similar to logistic regression but uses different training objectives."},{"id":"ccf0190978a5","q":"What is the relationship between margin width and the weight vector w?","a":"To maximize the margin width, we need to minimize the weight vector w. The margin boundaries are defined where w⊺x + b = ±1. Smaller weights create wider margins. The bias term b shifts the margin without affecting its width. This leads to the optimization objective of minimizing ½w⊺w."},{"id":"f61645efa5d7","q":"What is the hard margin linear SVM optimization problem?","a":"Minimize ½w⊺w subject to t⁽ⁱ⁾(w⊺x⁽ⁱ⁾ + b) ≥ 1 for all instances i, where t⁽ⁱ⁾ = -1 for negative class and t⁽ⁱ⁾ = 1 for positive class. This ensures all instances are on the correct side of the margin while maximizing the margin width."},{"id":"2abf4c0addf3","q":"What is the soft margin linear SVM optimization problem?","a":"Minimize ½w⊺w + C∑ζᵢ subject to t⁽ⁱ⁾(w⊺x⁽ⁱ⁾ + b) ≥ 1 - ζᵢ and ζᵢ ≥ 0, where ζᵢ are slack variables measuring margin violations. The C hyperparameter balances margin maximization against violation minimization."},{"id":"c2eb06a14af8","q":"What are hinge loss and squared hinge loss?","a":"Hinge loss is 0 when instance is correctly classified with sufficient margin, otherwise grows linearly with distance from margin. Squared hinge loss grows quadratically, making it more sensitive to outliers but faster to converge with clean data. LinearSVC uses squared hinge by default, SGDClassifier uses hinge loss."},{"id":"70d5f3d62934","q":"What is the dual problem in SVM optimization?","a":"The dual problem is an alternative formulation that gives the same solution as the primal problem. For SVMs, the dual problem: minimizes ½∑∑αᵢαⱼtᵢtⱼx⁽ⁱ⁾⊺x⁽ⁱ⁾ - ∑αᵢ subject to αᵢ ≥ 0 and ∑αᵢtᵢ = 0. The dual is faster when instances < features and enables the kernel trick."},{"id":"1630200e4588","q":"How do you convert from dual solution to primal solution?","a":"From dual solution α, compute: w = ∑αᵢtᵢx⁽ⁱ⁾ and b = (1/nₛ)∑(tᵢ - w⊺x⁽ⁱ⁾) where the sum is over support vectors (αᵢ > 0) and nₛ is the number of support vectors. Only support vectors contribute to the final model."},{"id":"41b25162b284","q":"What is the kernel trick and why is it important?","a":"The kernel trick allows computing dot products in transformed feature space without explicitly computing the transformation. For example, the second-degree polynomial kernel K(a,b) = (a⊺b)² gives the same result as transforming to polynomial features and computing dot products, but much more efficiently."},{"id":"f4efbacd503c","q":"What is the second-degree polynomial mapping and its kernel trick?","a":"The mapping φ(x) = [x₁², √2x₁x₂, x₂²] transforms 2D to 3D. The kernel trick shows φ(a)⊺φ(b) = (a⊺b)², so we can replace dot products of transformed vectors with the square of original dot products, avoiding explicit transformation while getting the same result."},{"id":"971df7858d8d","q":"What are the common kernel functions used in SVMs?","a":"Linear: K(a,b) = a⊺b; Polynomial: K(a,b) = (γa⊺b + r)^d; Gaussian RBF: K(a,b) = exp(-γ‖a-b‖²); Sigmoid: K(a,b) = tanh(γa⊺b + r). Each kernel implicitly maps data to different feature spaces without computing the transformation."},{"id":"29881639a40b","q":"What is Mercer's theorem and its significance for kernels?","a":"Mercer's theorem states that if a function K(a,b) satisfies certain conditions (continuous, symmetric, positive semidefinite), then there exists a transformation φ such that K(a,b) = φ(a)⊺φ(b). This guarantees we can use K as a kernel even without knowing φ explicitly."},{"id":"8683a1bb3395","q":"How do you make predictions with a kernelized SVM?","a":"The prediction function becomes: h(xⁿ) = ∑αᵢtᵢK(x⁽ⁱ⁾, xⁿ) + b, where the sum is only over support vectors (αᵢ > 0). This avoids computing w explicitly and only requires kernel evaluations between the new instance and support vectors."},{"id":"5ad56aaea533","q":"What is the computational complexity comparison between SVM classes?","a":"LinearSVC: O(m×n), scales linearly, no kernel trick. SVC: O(m²×n) to O(m³×n), supports kernels, slow for large datasets. SGDClassifier: O(m×n), supports out-of-core learning, very scalable. LinearSVC fastest for linear problems, SVC best for small nonlinear problems, SGDClassifier for large datasets."},{"id":"3b20bca4091c","q":"When should you use different SVM implementations?","a":"Use LinearSVC for linear problems, especially with many features or large datasets. Use SVC with RBF kernel for small/medium nonlinear problems. Use SGDClassifier for very large datasets or out-of-core learning. Always try linear kernel first, then RBF if dataset isn't too large."},{"id":"b18f3b0d969c","q":"How does SVM regression differ from classification in terms of support vectors?","a":"In SVM regression, support vectors are instances that lie on the margin boundaries (at distance ε from the prediction line) or are margin violations (outside the ε-tube). Instances inside the ε-tube don't affect the model. Reducing ε increases support vectors, adding regularization."},{"id":"d95fdd6470ab","q":"What are the key hyperparameters for polynomial kernel SVMs?","a":"degree: controls polynomial degree (higher = more complex, potential overfitting). coef0: controls influence of high-degree vs low-degree terms. C: regularization parameter (lower = more regularization). gamma: coefficient in polynomial kernel formula (affects curve shape)."},{"id":"a1ca341ff316","q":"What are the key hyperparameters for RBF kernel SVMs?","a":"gamma (γ): controls bell curve width - higher γ creates narrower curves and more irregular boundaries (overfitting risk), lower γ creates wider curves and smoother boundaries (regularization effect). C: controls regularization - higher C allows fewer margin violations."},{"id":"913287bf2bfc","q":"How do you diagnose and fix overfitting/underfitting in RBF SVMs?","a":"If overfitting: decrease γ (wider bell curves, smoother boundaries) or decrease C (more regularization). If underfitting: increase γ (narrower bell curves, more flexible boundaries) or increase C (less regularization). γ acts like a regularization parameter similar to C."},{"id":"7066419b2be9","q":"What is the bias term calculation using the kernel trick?","a":"b = (1/nₛ)∑[tᵢ - ∑αⱼtⱼK(x⁽ⁱ⁾, x⁽ʲ⁾)] where the outer sum is over support vectors and inner sum is over all support vectors. This avoids computing w explicitly by using kernel evaluations between support vectors."},{"id":"cb0054c20ad1","q":"What are some specialized kernels mentioned in the chapter?","a":"String kernels for text documents or DNA sequences (using string subsequence kernel or Levenshtein distance-based kernels). These are specialized for specific data structures. The sigmoid kernel is mentioned as not fully satisfying Mercer's conditions but working well in practice."},{"id":"967a94e41f6e","q":"What is the practical rule of thumb for kernel selection?","a":"Always try linear kernel first (LinearSVC is much faster than SVC with linear kernel). If dataset isn't too large, try Gaussian RBF kernel which often works well. If you have spare time and computing power, experiment with other kernels. Consider specialized kernels if available for your data structure."},{"id":"732fb865053e","q":"How does the kernel trick enable infinite-dimensional feature spaces?","a":"The Gaussian RBF kernel maps instances to infinite-dimensional space, but the kernel trick lets us work in this space without computing the infinite-dimensional transformation. We only need kernel evaluations K(a,b) = exp(-γ‖a-b‖²), making the impossible computationally feasible."},{"id":"e7af459edae6","q":"What are the limitations of SVMs for large datasets?","a":"SVC has O(m²×n) to O(m³×n) complexity, becoming very slow with hundreds of thousands of instances. For large nonlinear problems, consider random forests or neural networks instead. LinearSVC and SGDClassifier scale better with O(m×n) complexity for linear problems."},{"id":"8d8e43cfc2e3","q":"What makes the dual formulation particularly useful for SVMs?","a":"The dual formulation is faster when instances < features, but more importantly, it makes the kernel trick possible while the primal formulation does not. The dual problem involves dot products between instances, which can be replaced with kernel functions for nonlinear transformations."}]},{"id":"b2c5","title":"Decision Trees","summary":"Learn how decision trees work using entropy, Gini impurity, CART algorithms, pruning, regression trees, and interpretable AI methods.","cards":[{"id":"f4f4f239463b","q":"What are decision trees capable of performing?","a":"Decision trees are versatile machine learning algorithms that can perform both classification and regression tasks, and even multioutput tasks."},{"id":"b7e79752dc0c","q":"What are decision trees the fundamental components of?","a":"Decision trees are the fundamental components of random forests, which are among the most powerful machine learning algorithms available today."},{"id":"d31fb48dc6da","q":"In the iris dataset example, what two features are used to train the DecisionTreeClassifier?","a":"Petal length (cm) and petal width (cm) are used as the two features."},{"id":"5731bff91a72","q":"How do you visualize a trained decision tree in scikit-learn?","a":"Use the export_graphviz() function to output a graph definition file, then use graphviz.Source.from_file() to load and display the file in a Jupyter notebook."},{"id":"60a4cef7dcfe","q":"How does a decision tree make predictions for classification?","a":"Start at the root node and follow decision paths based on feature values. At each node, check if the feature value satisfies the condition. Continue until reaching a leaf node, which provides the predicted class."},{"id":"2e016074a5b0","q":"What does a node's 'samples' attribute tell you?","a":"A node's samples attribute counts how many training instances it applies to."},{"id":"b21a9a68d50f","q":"What does a node's 'value' attribute represent?","a":"A node's value attribute tells you how many training instances of each class this node applies to."},{"id":"0e06ba380573","q":"What does a node's 'gini' attribute measure?","a":"A node's gini attribute measures its Gini impurity. A node is 'pure' (gini=0) if all training instances it applies to belong to the same class."},{"id":"4e1395300d2c","q":"What is the formula for Gini impurity?","a":"Gi = 1 - Σ(pi,k)² where Gi is the Gini impurity of the ith node and pi,k is the ratio of class k instances among the training instances in the ith node."},{"id":"aaf3fe3df0af","q":"What type of trees does the CART algorithm produce?","a":"The CART algorithm produces only binary trees, meaning trees where split nodes always have exactly two children (questions only have yes/no answers)."},{"id":"e3da9ee4ad04","q":"What is a key advantage of decision trees regarding data preparation?","a":"Decision trees require very little data preparation. They don't require feature scaling or centering at all."},{"id":"3bd08d736a92","q":"What is the difference between white box and black box models?","a":"White box models (like decision trees) are intuitive and their decisions are easy to interpret. Black box models (like random forests and neural networks) make great predictions but it's usually hard to explain in simple terms why the predictions were made."},{"id":"1ac24cc2e35a","q":"How does a decision tree estimate class probabilities?","a":"A decision tree traverses to find the leaf node for an instance, then returns the ratio of training instances of class k in that node as the probability for class k."},{"id":"58db1cb15694","q":"What algorithm does scikit-learn use to train decision trees?","a":"Scikit-learn uses the Classification and Regression Tree (CART) algorithm to train decision trees."},{"id":"1bbd5f091658","q":"How does the CART algorithm choose splits?","a":"It searches for the pair (k, tk) that produces the purest subsets, weighted by their size, using a cost function that minimizes impurity."},{"id":"f37fc05a300d","q":"What is the CART cost function for classification?","a":"J(k,tk) = (mleft/m)Gleft + (mright/m)Gright, where G measures impurity and m represents the number of instances in each subset."},{"id":"46810232ca2c","q":"Why is the CART algorithm called a greedy algorithm?","a":"It greedily searches for an optimum split at the top level, then repeats the process at each subsequent level. It does not check whether the split will lead to the lowest possible impurity several levels down."},{"id":"28fc099d9b19","q":"What is the computational complexity of making predictions with decision trees?","a":"Making predictions requires O(log₂(m)) time, where m is the number of training instances, because you traverse from root to leaf through roughly log₂(m) nodes."},{"id":"e6bc9a59b26b","q":"What is the training complexity of decision trees?","a":"The training complexity is O(n × m log₂(m)), where n is the number of features and m is the number of instances, because it compares all features on all samples at each node."},{"id":"186053bbd680","q":"What are the two main impurity measures used in decision trees?","a":"Gini impurity (the default) and entropy. Both lead to similar trees, but Gini is slightly faster to compute."},{"id":"25131b7d5de9","q":"What is the formula for entropy?","a":"Hi = -Σ pi,k log₂(pi,k) for all k where pi,k ≠ 0, measuring the average information content where entropy is zero when all instances belong to one class."},{"id":"e5bad8825615","q":"What is the difference between parametric and nonparametric models?","a":"Parametric models have a predetermined number of parameters, limiting their degrees of freedom. Nonparametric models (like decision trees) have a number of parameters not determined prior to training, so they can stick closely to the data."},{"id":"f9ef89873f49","q":"What is the main regularization hyperparameter for decision trees in scikit-learn?","a":"max_depth controls the maximum depth of the decision tree. The default value is None (unlimited), and reducing it will regularize the model."},{"id":"0e7161b9dfdb","q":"What does the max_features hyperparameter control?","a":"max_features controls the maximum number of features that are evaluated for splitting at each node."},{"id":"570ead4900d5","q":"What does min_samples_split control?","a":"min_samples_split sets the minimum number of samples a node must have before it can be split."},{"id":"17afa2d1f662","q":"What does min_samples_leaf control?","a":"min_samples_leaf sets the minimum number of samples a leaf node must have to be created."},{"id":"12d6f1068915","q":"How does regularization affect decision tree hyperparameters?","a":"Increasing min_* hyperparameters or reducing max_* hyperparameters will regularize the model and reduce overfitting."},{"id":"2b46eb513964","q":"What is pruning in decision trees?","a":"Pruning is a technique where unnecessary nodes are deleted after training. A node is considered unnecessary if the purity improvement it provides is not statistically significant, often tested using chi-squared tests."},{"id":"6d7d1221d625","q":"How do decision trees work for regression tasks?","a":"For regression, instead of predicting a class in each node, the tree predicts a value. The prediction is the average target value of the training instances in that leaf node."},{"id":"4466115e9d7e","q":"What cost function does CART use for regression?","a":"J(k,tk) = (mleft/m)MSEleft + (mright/m)MSEright, where MSEnode = Σ(ŷnode - yi)²/mnode and ŷnode is the average target value in the node."},{"id":"96b71f00fed0","q":"What is a major limitation of decision trees regarding data orientation?","a":"Decision trees love orthogonal decision boundaries (all splits are perpendicular to an axis), which makes them sensitive to the data's orientation. Rotation of the dataset can make the decision boundary unnecessarily convoluted."},{"id":"8e9d5bc0e1b8","q":"How can you address the axis orientation sensitivity issue?","a":"Scale the data, then apply a Principal Component Analysis (PCA) transformation, which rotates the data to reduce correlation between features."},{"id":"ef524c69bcf1","q":"What is the main issue with decision trees in terms of variance?","a":"Decision trees have quite a high variance: small changes to hyperparameters or data may produce very different models. Even retraining on the same data can produce different models due to the stochastic nature of the algorithm."},{"id":"5c4f00da7497","q":"How can the high variance problem of decision trees be addressed?","a":"By averaging predictions over many trees, it's possible to reduce variance significantly. Such an ensemble of trees is called a random forest."},{"id":"d1312e30b92f","q":"What is the approximate depth of a decision tree trained without restrictions on one million instances?","a":"Approximately log₂(1,000,000) ≈ 20 levels deep, since decision trees are generally approximately balanced."},{"id":"93368b167e6c","q":"Is a node's Gini impurity generally lower or higher than its parent's?","a":"It is generally lower or equal, but not always. The CART algorithm splits nodes to reduce weighted average impurity, but individual child nodes may have higher impurity than their parent."},{"id":"bc7794568b73","q":"If a decision tree is overfitting, should you decrease max_depth?","a":"Yes, decreasing max_depth is a good idea as it will regularize the model and reduce overfitting."},{"id":"9a272fd8b9e9","q":"If a decision tree is underfitting, should you try scaling input features?","a":"No, scaling input features will not help with underfitting in decision trees since they are not sensitive to feature scaling. Instead, you should reduce regularization constraints."},{"id":"eda8e41d653e","q":"How does training time scale with the number of instances for decision trees?","a":"Training complexity is O(n × m log₂(m)). If training takes 1 hour for 1 million instances, it would take roughly 10 × log₂(10)/log₂(1) ≈ 33 hours for 10 million instances."},{"id":"071cfa84f63a","q":"How does training time change when you double the number of features?","a":"Training time roughly doubles because the complexity is O(n × m log₂(m)), so doubling n (features) doubles the training time."},{"id":"4b2adc0a438d","q":"What is the key difference between decision tree classification and regression?","a":"In classification, each leaf node predicts a class based on majorit
