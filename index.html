egularization losses."},{"id":"c86a3efac79c","q":"What is a TensorFlow Function and how do you create one?","a":"A TF function is a graph-based version of a Python function that runs much faster. Create using @tf.function decorator or tf.function(). TensorFlow analyzes the function, generates an optimized computation graph, and executes it efficiently."},{"id":"1150380fef50","q":"What happens when you call tf.function on a Python function?","a":"TensorFlow uses AutoGraph to analyze source code and replace control flow with TensorFlow operations, then traces the function with symbolic tensors to generate a computation graph. The graph is optimized and cached for reuse."},{"id":"076c9a1f7725","q":"What is AutoGraph in TensorFlow?","a":"AutoGraph analyzes Python function source code to capture control flow statements (for, while, if, break, continue, return) and replaces them with appropriate TensorFlow operations like tf.while_loop() and tf.cond()."},{"id":"19282aad5a47","q":"How does TensorFlow handle polymorphism in TF functions?","a":"TF functions generate new graphs for each unique set of input shapes and data types, caching them for reuse. Tensor arguments: new graph per shape/dtype. Python numerical values: new graph per distinct value (use sparingly)."},{"id":"bb6d974d34d0","q":"What are the main rules for writing TF functions?","a":"Use TensorFlow operations not external libraries (NumPy, etc.), external calls only run during tracing, avoid side effects in non-TF code, other called functions should follow same rules, create variables only on first call."},{"id":"bc0b58aa71c7","q":"When should you use Python values vs tensors as TF function arguments?","a":"Use Python values only for arguments with few unique values (hyperparameters like number of neurons). Each distinct Python value generates a new graph, potentially slowing down programs and using excessive RAM. Use tensors for varying data."},{"id":"df35544a4d9b","q":"What is the difference between eager execution and graph mode?","a":"Eager execution (default in TF 2): operations perform computations immediately. Graph mode: operations add nodes to computation graph without performing computations, enabling optimization and faster execution when graph is run."},{"id":"fdf7223488a8","q":"How can you boost performance with TF functions?","a":"Use @tf.function to convert Python functions to optimized graphs. Set jit_compile=True for XLA compilation that fuses operations and uses less RAM. Keras automatically converts custom functions to TF functions."},{"id":"1c7920988aba","q":"What is XLA and how do you use it?","a":"XLA (Accelerated Linear Algebra) compiles computation graphs into optimized kernels, often fusing multiple operations. Use by setting jit_compile=True in tf.function() or when calling model.compile(). Results in faster execution and dramatically less RAM usage."},{"id":"8d83c2d06708","q":"How do you handle numerical stability issues in custom functions?","a":"Add small values to avoid division by zero (e.g., tf.sqrt(x + 1e-6)). Rewrite functions for stability (e.g., log(1 + exp(z)) becomes log(1 + exp(-|z|)) + max(z, 0)). Use @tf.custom_gradient for custom gradient functions."},{"id":"2fdf6e02d6a8","q":"When and how do you use @tf.custom_gradient?","a":"Use when a numerically stable function has unstable gradients. Decorator returns both function result and a gradient function. The gradient function receives backpropagated gradients and returns gradients multiplied by local gradients (chain rule)."},{"id":"1f0996f0a20e","q":"What are the key steps in implementing a custom training loop?","a":"1) Define hyperparameters, optimizer, loss function, metrics 2) Create nested loops for epochs/batches 3) Sample batches 4) Use GradientTape for forward pass and loss computation 5) Compute gradients 6) Apply gradients 7) Update metrics 8) Reset states"},{"id":"c920c757a5c7","q":"How do you handle regularization losses in custom training loops?","a":"Compute total loss as main loss plus model.losses: loss = tf.add_n([main_loss] + model.losses). The model.losses contains regularization losses from layers. Use tf.reduce_mean() for main loss if needed."},{"id":"40c484e70f07","q":"What should you be careful about when calling models in training loops?","a":"Always set training=True when calling the model during training, especially for models with BatchNormalization or Dropout. For custom models, ensure the training argument is propagated to constituent layers."},{"id":"358b7fd45e21","q":"How do you apply constraints in custom training loops?","a":"After apply_gradients(), iterate through model.variables and apply constraints: if variable.constraint is not None: variable.assign(variable.constraint(variable)). This handles kernel_constraint and bias_constraint."},{"id":"457db6520fce","q":"What are the advantages and disadvantages of custom training loops?","a":"Advantages: Full control over training process, can implement complex training strategies. Disadvantages: More code, more error-prone, harder to maintain. Use fit() method unless you specifically need the extra flexibility."},{"id":"ef550557566d","q":"How does TensorFlow generate computation graphs from Python functions?","a":"Two steps: 1) AutoGraph analyzes source code and replaces control flow with TF operations 2) Tracing calls the upgraded function with symbolic tensors in graph mode, where operations add nodes to graph instead of computing."},{"id":"cba45b658f92","q":"What are some limitations when using external libraries in TF functions?","a":"External library calls (NumPy, standard library) only run during tracing, not in the graph. Side effects only occur during tracing. Random numbers generated only once during tracing. Use tf.py_function() to wrap arbitrary code but it hurts performance and portability."},{"id":"25419282e58d","q":"How should you handle loops in TF functions?","a":"TensorFlow only captures loops over tensors or tf.data.Dataset. Use 'for i in tf.range(x)' not 'for i in range(x)' if you want the loop in the graph. Otherwise it runs only during tracing (useful for building graph structure)."},{"id":"e9c66b4d437a","q":"What are the key TensorFlow data structures beyond regular tensors?","a":"Sparse tensors (tf.SparseTensor) for mostly-zero tensors, Tensor arrays (tf.TensorArray) for lists of same-shape tensors, Ragged tensors (tf.RaggedTensor) for varying sizes, String tensors (tf.string), Sets, and Queues (FIFO, Priority, etc.)."},{"id":"7ffdbce8f856","q":"What is the recommended approach for most deep learning use cases?","a":"95% of use cases only require Keras and tf.data APIs. Use custom components (losses, metrics, layers, models) when needed, but prefer high-level APIs. Write custom training loops only when you need flexibility that fit() method cannot provide."}]},{"id":"b2c12","title":"Loading and Preprocessing Data with TensorFlow","summary":"Learn scalable TensorFlow data pipelines using tf.data, TFRecord, preprocessing layers, batching, shuffling, and efficient dataset systems.","cards":[{"id":"443d5ff3db17","q":"What is the tf.data API and what are its main capabilities?","a":"The tf.data API is TensorFlow's data loading and preprocessing system that can load and preprocess data extremely efficiently, read from multiple files in parallel using multithreading and queuing, shuffle and batch samples, and do all of this on the fly while GPUs/TPUs are training the current batch."},{"id":"6ef474e45721","q":"What file formats can the tf.data API read from?","a":"The tf.data API can read from text files (such as CSV files), binary files with fixed-size records, binary files using TensorFlow's TFRecord format (which supports records of varying sizes), and SQL databases."},{"id":"4bf1964a9f85","q":"What is TFRecord and what makes it special?","a":"TFRecord is a flexible and efficient binary format that usually contains protocol buffers. It's TensorFlow's preferred format for storing large amounts of data and reading it efficiently."},{"id":"a6c71384e260","q":"How do you create a basic dataset from tensor data using tf.data?","a":"Use tf.data.Dataset.from_tensor_slices() to create a dataset from a tensor. For example: dataset = tf.data.Dataset.from_tensor_slices(X) where X is any data tensor."},{"id":"ee633908f53b","q":"What is an important characteristic of the tf.data API regarding data access?","a":"The tf.data API is a streaming API - you can efficiently iterate through a dataset's items, but the API is not designed for indexing or slicing."},{"id":"07b64b3556be","q":"What happens when you apply the repeat() method to a dataset?","a":"The repeat() method returns a new dataset that repeats the items of the original dataset. If called with no arguments, it will repeat the dataset forever. With an argument, it repeats that many times."},{"id":"f3237eb0992f","q":"How does the batch() method work and what happens with the final batch?","a":"The batch() method groups items into batches of the specified size. The final batch may be smaller if there aren't enough items left. You can set drop_remainder=True to drop the final batch if it's smaller than the specified size."},{"id":"cec5a98bb613","q":"Do dataset transformation methods modify the original dataset?","a":"No, dataset methods do not modify datasets - they create new ones. You must keep a reference to the new datasets (e.g., with dataset = ...) or else nothing will happen."},{"id":"5726d56b2ecb","q":"What is the map() method used for in tf.data?","a":"The map() method is used to transform dataset items by applying a function to each item. It's commonly used for preprocessing data, and you can set num_parallel_calls to use multiple threads for intensive computations."},{"id":"e968ef4675dd","q":"How does the shuffle() method work in tf.data?","a":"The shuffle() method creates a dataset that fills a buffer with items from the source dataset, then randomly pulls items from this buffer while replacing them with fresh items from the source. You must specify the buffer size, which should be large enough for effective shuffling."},{"id":"1abea5fd00fe","q":"What happens when you call repeat() on a shuffled dataset?","a":"By default, repeat() on a shuffled dataset generates a new random order at every iteration. You can set reshuffle_each_iteration=False to reuse the same order at each iteration."},{"id":"7f82bbf58857","q":"How do you read from multiple CSV files efficiently using tf.data?","a":"Use tf.data.Dataset.list_files() to create a dataset of filepaths, then use interleave() with TextLineDataset to read from multiple files simultaneously and interleave their lines."},{"id":"751bb8b36038","q":"What does the interleave() method do?","a":"The interleave() method reads from multiple files simultaneously by cycling through them, reading one line at a time from each until all datasets are out of items. You can set num_parallel_calls for actual parallel reading."},{"id":"bd1248456b26","q":"What are the key components needed for parsing CSV data with tf.data?","a":"You need tf.io.decode_csv() to parse lines, a record_defaults array specifying default values and types for each column, and tf.stack() to convert the parsed scalars into tensors."},{"id":"a3dfac13000d","q":"What is prefetching and why is it important?","a":"Prefetching allows the dataset to prepare the next batch while the training algorithm works on the current batch. Using prefetch(1) can dramatically improve performance by keeping the GPU almost 100% utilized."},{"id":"9feeb773092c","q":"When should you use the cache() method and where should it be placed in the pipeline?","a":"Use cache() when the dataset is small enough to fit in memory. Place it after loading and preprocessing but before shuffling, repeating, batching, and prefetching. This ensures each instance is only read and preprocessed once."},{"id":"8e4eafd70c53","q":"What is the TFRecord format structure?","a":"TFRecord is a simple binary format containing a sequence of binary records of varying sizes. Each record has a length, a CRC checksum for the length, the actual data, and a CRC checksum for the data."},{"id":"a36fa147ae86","q":"How do you create a TFRecord file?","a":"Use tf.io.TFRecordWriter: with tf.io.TFRecordWriter(\"my_data.tfrecord\") as f: f.write(b\"record data\")"},{"id":"3069c3edbdc9","q":"How do you read from TFRecord files?","a":"Use tf.data.TFRecordDataset: dataset = tf.data.TFRecordDataset(filepaths). You can read multiple files in parallel by setting num_parallel_reads."},{"id":"5e1a4fc0e69f","q":"What are protocol buffers (protobufs)?","a":"Protocol buffers are a portable, extensible, and efficient binary format developed at Google. They are defined using a simple language and are widely used, particularly in TFRecord files."},{"id":"7b00526fd4b1","q":"What is the structure of TensorFlow's Example protobuf?","a":"An Example contains a Features object, which contains a dictionary mapping feature names to Feature values. Each Feature can be a BytesList, FloatList, or Int64List."},{"id":"36debdbb7541","q":"How do you parse serialized Example protobufs?","a":"Use tf.io.parse_single_example() for single examples or tf.io.parse_example() for batches. You need to provide a feature description dictionary specifying each feature's shape, type, and default value."},{"id":"8a25c1883404","q":"What's the difference between FixedLenFeature and VarLenFeature descriptors?","a":"FixedLenFeature is for features with fixed length and returns regular tensors. VarLenFeature is for variable-length features and returns sparse tensors that can be converted to dense tensors if needed."},{"id":"c937444a331e","q":"When would you use SequenceExample instead of Example protobuf?","a":"Use SequenceExample for handling lists of lists, such as documents with lists of sentences where each sentence is a list of words, plus contextual data like author and title."},{"id":"20cc6172e1ee","q":"What are the three main approaches for preprocessing data in TensorFlow?","a":"1) Preprocess ahead of time using tools like NumPy/Pandas, 2) Preprocess on the fly with tf.data using map(), 3) Include preprocessing layers directly inside your model."},{"id":"40daa1d12e67","q":"What are the advantages of including preprocessing layers in your model?","a":"The model can ingest raw data directly in production, eliminating risk of training/serving skew. You don't need to reimplement preprocessing in different languages, and there's no mismatch between training and production preprocessing."},{"id":"f784f55ba15b","q":"How does the Normalization layer work?","a":"The Normalization layer standardizes input features. You can either specify mean and variance when creating it, or use the adapt() method to let it measure these statistics from the training data."},{"id":"1dbb139731be","q":"What are two ways to use the Normalization layer efficiently?","a":"1) Include it in the model for convenience but slightly slower training, 2) Use it standalone to preprocess data once before training, then wrap it with the trained model for production deployment."},{"id":"ba44aa216fc1","q":"What does the Discretization layer do?","a":"The Discretization layer transforms numerical features into categorical features by mapping value ranges (bins) to categories. This is useful for multimodal distributions or highly nonlinear relationships with the target."},{"id":"408ca6d1552d","q":"How can you specify bin boundaries for the Discretization layer?","a":"You can either provide bin_boundaries explicitly when creating the layer, or set num_bins and use adapt() to let the layer find appropriate boundaries based on value percentiles."},{"id":"2b0b008a0ba3","q":"What does the CategoryEncoding layer do?","a":"The CategoryEncoding layer performs one-hot encoding of categorical features. For multiple features, it does multi-hot encoding by default, or count encoding if you set output_mode=\"count\"."},{"id":"ecdd4b1f0f01","q":"How does the StringLookup layer work?","a":"StringLookup maps string categories to integers, with unknown categories mapped to 0 and known categories numbered from 1 (most frequent to least frequent). Set output_mode=\"one_hot\" for direct one-hot encoding."},{"id":"ff047ecbd308","q":"What are out-of-vocabulary (OOV) buckets in StringLookup?","a":"OOV buckets are used when num_oov_indices > 1. Unknown categories get mapped pseudorandomly to different OOV buckets using a hash function, allowing the model to distinguish some rare categories despite hash collisions."},{"id":"adbc3e8821c2","q":"What is the hashing trick and when is it used?","a":"The hashing trick maps categories pseudorandomly to buckets using a hash function modulo the number of buckets. The Hashing layer implements this and doesn't need adaptation, but hash collisions can make categories indistinguishable."},{"id":"8c11c2f5cdaa","q":"What are embeddings and how are they different from one-hot encoding?","a":"Embeddings are dense representations of high-dimensional data like categories. Instead of sparse 50,000-dimensional one-hot vectors, embeddings might be 100-dimensional dense vectors that are trainable and improve during training."},{"id":"be8861540bab","q":"How do embeddings learn useful representations?","a":"Embeddings are initialized randomly and trained by gradient descent. Similar categories tend to move closer together in the embedding space while dissimilar ones move apart, creating useful representations for the task."},{"id":"0d861a25b654","q":"What made word embeddings particularly successful?","a":"In 2013, Tomáš Mikolov and Google researchers developed efficient techniques to learn word embeddings by training neural networks to predict nearby words, achieving remarkable semantic relationships and analogies."},{"id":"7230d71adb4c","q":"How does the Embedding layer work in Keras?","a":"The Embedding layer wraps an embedding matrix with one row per category and one column per embedding dimension. It looks up and returns the row corresponding to each category ID. It's initialized randomly and trained with the model."},{"id":"2f6dffde0966","q":"What is a typical range for embedding dimensions?","a":"Embeddings typically have 10 to 300 dimensions, depending on the task, vocabulary size, and training set size. This hyperparameter needs to be tuned for optimal performance."},{"id":"5c75d3459e18","q":"How does the TextVectorization layer preprocess text?","a":"TextVectorization converts text to lowercase, removes punctuation, splits on whitespace, sorts words by frequency to create vocabulary, encodes unknown words as 1s, and pads shorter sentences with 0s."},{"id":"fd3e2bdfc2c3","q":"What are the different output modes for TextVectorization?","a":"Modes include: default (integer encoding), \"multi_hot\" (binary occurrence), \"count\" (word counts), and \"tf_idf\" (term frequency × inverse document frequency weighting)."},{"id":"3f9853ee40c3","q":"How does TF-IDF weighting work in TextVectorization?","a":"TF-IDF multiplies each word count by log(1 + d/(f+1)), where d is total documents and f is documents containing the word. This downweights frequent words and upweights rare, informative words."},{"id":"232f6db49982","q":"What are TensorFlow Hub modules?","a":"TF Hub modules are pretrained model components for text, image, audio, etc. They contain both preprocessing code and pretrained weights, can be directly included in Keras models, and typically require no additional training."},{"id":"4fbfa113b72d","q":"What are the three main image preprocessing layers in Keras?","a":"1) Resizing - resizes images to desired dimensions, 2) Rescaling - rescales pixel values (e.g., 0-255 to -1 to 1), 3) CenterCrop - crops images to keep only center patches of specified size."},{"id":"cc816b6e45fb","q":"What are data augmentation layers and when are they active?","a":"Data augmentation layers like RandomCrop, RandomFlip, RandomRotation, etc., are only active during training and randomly transform input images to artificially increase training set size and improve performance."},{"id":"8f1062e618a4","q":"What is TensorFlow Datasets (TFDS) and what does it provide?","a":"TFDS is a project that makes it easy to load common datasets from small ones like MNIST to huge ones like ImageNet. It includes image, text, audio, video, and time series datasets with descriptions and exploration tools."},{"id":"6314a07bdd92","q":"How do you load and use a dataset with TFDS?","a":"Import tensorflow_datasets as tfds, then call tfds.load(name=\"dataset_name\"). Set as_supervised=True for labeled datasets to get (features, labels) tuples. Use the split argument to divide data (e.g., \"train[:90%]\")."},{"id":"5362390268ad","q":"What is the relationship between one-hot encoding + Dense layer vs Embedding layer?","a":"One-hot encoding followed by a Dense layer (no activation, no biases) is equivalent to an Embedding layer, but Embedding is much more efficient as it avoids multiplications by zero and uses fewer computations."}]},{"id":"b2c13","title":"Deep Computer Vision Using Convolutional Neural Networks","summary":"Learn CNNs, convolution operations, pooling, feature maps, ResNet, transfer learning, and deep learning for computer vision.","cards":[{"id":"2a655bb1e124","q":"What inspired the development of Convolutional Neural Networks (CNNs)?","a":"CNNs emerged from the study of the brain's visual cortex, particularly research by David H. Hubel and Torsten Wiesel in the 1950s and 1960s who discovered that many neurons in the visual cortex have small local receptive fields and respond to specific patterns like horizontal or vertical lines."},{"id":"e00abf643774","q":"Why can't we simply use fully connected layers for image recognition tasks?","a":"For larger images, fully connected layers require a huge number of parameters. For example, a 100×100 pixel image with 1,000 neurons in the first layer would need 10 million connections just for the first layer. CNNs solve this using partially connected layers and weight sharing."},{"id":"c6fe997f4622","q":"What are the key characteristics of convolutional layers?","a":"Neurons in convolutional layers are not connected to every pixel, but only to pixels in their receptive fields. They use filters (kernels) that slide across the input, and neurons in the same feature map share the same parameters, dramatically reducing the number of parameters."},{"id":"c850dddc51d2","q":"What is zero padding and why is it used?","a":"Zero padding involves adding zeros around the input image. It's used so that a layer can have the same height and width as the previous layer, preventing the gradual shrinking of feature maps through the network."},{"id":"493b030fc05b","q":"What is stride in convolutional layers?","a":"Stride is the horizontal or vertical step size from one receptive field to the next. A stride of 2 means the receptive fields are spaced 2 pixels apart, which dramatically reduces the computational complexity and output size."},{"id":"e4f72cd7bbab","q":"What are filters (kernels) in CNNs and what do they detect?","a":"Filters are small matrices (like 7×7) that represent a neuron's weights. For example, a vertical line filter detects vertical edges, while a horizontal line filter detects horizontal edges. During training, the CNN automatically learns useful filters for its task."},{"id":"2e2fe853533b","q":"How do feature maps work in CNNs?","a":"A feature map is the output when all neurons in a layer use the same filter. It highlights areas in the input that activate the filter the most. Multiple filters create multiple feature maps, allowing detection of different features simultaneously."},{"id":"867536281abf","q":"Why is weight sharing important in CNNs?","a":"Weight sharing dramatically reduces the number of parameters and allows the CNN to recognize patterns anywhere in the input. Once a CNN learns to recognize a pattern in one location, it can recognize it in any other location."},{"id":"bf1d911bd248","q":"What are the two padding options in Keras Conv2D layers?","a":"\"valid\" padding means no padding at all - neurons' receptive fields must lie strictly within the input. \"same\" padding adds enough zeros so output feature maps have the same size as inputs (when stride=1)."},{"id":"21cbbae942ca","q":"What is the purpose of pooling layers?","a":"Pooling layers subsample the input to reduce computational load, memory usage, and number of parameters. They help limit overfitting and can introduce some translation invariance by aggregating nearby values."},{"id":"d99e9e245db2","q":"How does max pooling work?","a":"Max pooling takes the maximum value from each receptive field. For example, with a 2×2 kernel and stride 2, it outputs the highest value from each 2×2 region, reducing the output size to half the input size in each dimension."},{"id":"265f497a901b","q":"What are the advantages and disadvantages of max pooling?","a":"Advantages: reduces computation, provides translation invariance, preserves strongest features. Disadvantages: very destructive (a 2×2 kernel drops 75% of input values), may hurt tasks requiring spatial precision like semantic segmentation."},{"id":"ab2fe1d48be2","q":"What is a typical CNN architecture structure?","a":"A typical CNN stacks convolutional layers (each followed by ReLU), then a pooling layer, then more convolutional layers, another pooling layer, and so on. At the top, fully connected layers process the features, ending with a softmax output layer."},{"id":"09d4077661cf","q":"What was significant about LeNet-5?","a":"LeNet-5, created by Yann LeCun in 1998, was widely used for handwritten digit recognition on MNIST. It established the basic CNN architecture pattern of alternating convolutional and pooling layers followed by fully connected layers."},{"id":"d476474adc36","q":"What made AlexNet revolutionary in 2012?","a":"AlexNet won the ILSVRC challenge with a 17% error rate vs 26% for the runner-up. It was much larger and deeper than LeNet-5, first to stack convolutional layers directly, used ReLU activation, dropout regularization, and data augmentation."},{"id":"eaad1a98d4f9","q":"What is data augmentation and why is it useful?","a":"Data augmentation artificially increases training set size by generating realistic variants of each training instance (shifting, rotating, resizing, flipping, changing lighting). It reduces overfitting and forces the model to be more tolerant to variations."},{"id":"4079390e4137","q":"What are inception modules in GoogLeNet?","a":"Inception modules apply multiple convolutional layers with different kernel sizes (1×1, 3×3, 5×5) in parallel to the same input, then concatenate the outputs. This captures patterns at different scales while using parameters efficiently."},{"id":"d8174440608a","q":"What is the purpose of 1×1 convolutional layers?","a":"1×1 layers serve three purposes: 1) capture patterns across channels, 2) act as bottleneck layers to reduce dimensionality and computational cost, 3) when paired with larger kernels, act like multi-layer networks sliding across the image."},{"id":"fd249a15f557","q":"What problem do skip connections in ResNet solve?","a":"Skip connections help train very deep networks by allowing the signal to flow directly across layers. They force the network to learn residual functions f(x) = h(x) - x rather than h(x), which speeds training and helps with vanishing gradients."},{"id":"c58656940906","q":"How do skip connections help with the vanishing gradient problem?","a":"Skip connections allow gradients to flow directly through the network without being repeatedly multiplied by small weights. Even if several layers haven't started learning, the network can still make progress through the skip connections."},{"id":"6819adc6a347","q":"What are depthwise separable convolutions in Xception?","a":"Depthwise separable convolutions separate spatial and cross-channel pattern detection. First, one spatial filter is applied per input channel, then 1×1 convolutions look for cross-channel patterns. This uses fewer parameters and often performs better."},{"id":"976014de9a3e","q":"How do SE blocks in SENet work?","a":"SE (Squeeze-and-Excitation) blocks analyze feature maps using global average pooling, compress to a low-dimensional representation via a bottleneck, then output recalibration weights. These weights rescale feature maps based on learned feature importance."},{"id":"8d745a85350d","q":"What is compound scaling in EfficientNet?","a":"Compound scaling simultaneously increases depth (layers), width (filters), and resolution (input size) using the formula αᵠ, βᵠ, γᵠ where ϕ represents compute budget and α, β, γ are architecture-specific scaling factors with α + β² + γ² ≈ 2."},{"id":"11f9547ca096","q":"How do you convert a dense layer to a convolutional layer?","a":"Use a convolutional layer where: number of filters equals number of dense units, filter size equals input feature map size, and use \"valid\" padding. This produces the same computations but can handle variable input sizes."},{"id":"89eb52ab0528","q":"What are Fully Convolutional Networks (FCNs)?","a":"FCNs replace dense layers with convolutional layers, allowing the network to process images of any size. They're used for tasks like object detection where you need to slide a classifier across the entire image efficiently."},{"id":"d2dccd11f9f3","q":"How does the YOLO object detection approach work?","a":"YOLO divides images into a grid and predicts bounding boxes and class probabilities for each cell. It outputs multiple bounding boxes per cell with objectness scores and uses a single forward pass, making it very fast."},{"id":"f42b3d9d52c0","q":"What is non-max suppression in object detection?","a":"Non-max suppression removes redundant bounding boxes by: 1) removing boxes with low objectness scores, 2) finding the box with highest score, 3) removing overlapping boxes (high IoU), 4) repeating until no more boxes remain."},{"id":"4f68f015b9b8","q":"What is the Intersection over Union (IoU) metric?","a":"IoU measures bounding box accuracy as the area of overlap between predicted and target boxes divided by the area of their union. It's commonly used to evaluate object detection and localization performance."},{"id":"74f3f47b5f4f","q":"What is semantic segmentation?","a":"Semantic segmentation classifies each pixel in an image according to the object class it belongs to. The challenge is that CNNs lose spatial resolution through pooling and striding, making pixel-level classification difficult."},{"id":"d07326376964","q":"What are transposed convolutional layers used for?","a":"Transposed convolutional layers upsample feature maps by stretching inputs (inserting zeros) then applying convolution. They're trainable alternatives to simple interpolation and are commonly used for semantic segmentation upsampling."},{"id":"3e3bb654b0e4","q":"How do skip connections help in semantic segmentation?","a":"Skip connections from lower layers help recover spatial resolution lost in pooling layers. For example, you can upsample by 2×, add a lower layer's output, upsample by 2× again, add another lower layer, then upsample by 8× for total 32× upsampling."},{"id":"287393ac865c","q":"What is transfer learning in CNNs?","a":"Transfer learning reuses lower layers of a pretrained model (like one trained on ImageNet) for new tasks. You typically freeze the pretrained weights initially, train the new top layers, then optionally unfreeze and fine-tune some lower layers with a lower learning rate."},{"id":"633b10da5d94","q":"What is the typical transfer learning process?","a":"1) Load pretrained model without top layers, 2) Add new layers for your task, 3) Freeze pretrained layers, 4) Train new layers, 5) Optionally unfreeze some pretrained layers, 6) Fine-tune with lower learning rate."},{"id":"93eeef97f10e","q":"What is classification vs localization?","a":"Classification identifies what objects are in an image. Localization adds bounding box coordinates (center x,y and height,width) as regression outputs. This requires dual-task learning with classification and regression losses."},{"id":"8b9ee28ee4a3","q":"What is object tracking and how does DeepSORT work?","a":"Object tracking follows objects across video frames. DeepSORT combines Kalman filters (predict movement), deep learning (measure appearance similarity), and the Hungarian algorithm (optimally assign detections to tracked objects)."},{"id":"b5d03905bf64","q":"What is mean Average Precision (mAP)?","a":"mAP computes average precision for each class (area under precision-recall curve), then averages across classes. For object detection, predictions are only considered correct if IoU > threshold (e.g., mAP@0.5) and class is correct."},{"id":"d5e8e1fd4272","q":"What is instance segmentation?","a":"Instance segmentation combines object detection with semantic segmentation - it identifies individual object instances and provides pixel-level masks for each. Unlike semantic segmentation, it distinguishes between different objects of the same class."},{"id":"a8aa8546dd01","q":"What are the key memory challenges in CNN training?","a":"CNNs require huge amounts of RAM, especially during training when all intermediate values must be preserved for backpropagation. For example, a single convolutional layer might need 12MB per instance, or 1.2GB for a batch of 100."},{"id":"1532db403412","q":"What are some solutions when CNNs run out of GPU memory?","a":"Reduce mini-batch size, use stride to reduce dimensionality, remove layers, use 16-bit instead of 32-bit floats, or distribute the CNN across multiple devices."},{"id":"2bfb420b0e2a","q":"What is global average pooling and when is it used?","a":"Global average pooling computes the mean of each entire feature map, outputting one number per feature map. It's very destructive but useful before output layers as it eliminates spatial information while dramatically reducing parameters."},{"id":"688aaa841923","q":"What is depthwise max pooling?","a":"Depthwise max pooling pools along the channel dimension instead of spatial dimensions. It can help CNNs learn invariance to features like rotation by learning multiple filters for the same pattern and taking the maximum response."},{"id":"b401e93b2d66","q":"How do modern CNN architectures differ from early ones?","a":"Modern CNNs are deeper, use smaller kernels (3×3 instead of large ones), employ skip connections, use batch normalization, have more efficient architectures like depthwise separable convolutions, and often include attention mechanisms."}]},{"id":"b2c14","title":"Processing Sequences Using RNNs and CNNs","summary":"Learn RNNs, LSTMs, GRUs, sequence modeling, time series forecasting, and temporal deep learning architectures.","cards":[{"id":"b4bee07520dc","q":"What is the main capability that RNNs bring to neural networks?","a":"RNNs can predict the future and analyze time series data such as daily active users, temperature, power consumption, and trajectories. They can work on sequences of arbitrary lengths rather than fixed-sized inputs, making them useful for natural language processing applications."},{"id":"0363a8cea804","q":"What are the two main difficulties that RNNs face?","a":"1) Unstable gradients (which can be alleviated using techniques like recurrent dropout and recurrent layer normalization), and 2) Very limited short-term memory (which can be extended using LSTM and GRU cells)."},{"id":"94058af50386","q":"How does a simple recurrent neuron work?","a":"At each time step t, the recurrent neuron receives inputs x(t) and its own output from the previous time step ŷ(t-1). At the first time step, the previous output is set to 0. The neuron processes these inputs and produces an output that becomes input for the next time step."},{"id":"27efedc0b69a","q":"What does 'unrolling the network through time' mean?","a":"It means representing the same recurrent neuron once per time step to visualize how the network processes a sequence. This shows the temporal flow of information through the network."},{"id":"eb5452cf983d","q":"What is the mathematical equation for the output of a recurrent layer?","a":"ŷ(t) = φ(Wx^T x(t) + Wŷ^T ŷ(t-1) + b), where φ is the activation function, Wx and Wŷ are weight matrices for inputs and previous outputs respectively, and b is the bias vector."},{"id":"93bc3b369d56","q":"What is a memory cell in the context of RNNs?","a":"A memory cell is a part of a neural network that preserves some state across time steps. A single recurrent neuron or layer of recurrent neurons is a basic cell, capable of learning short patterns (typically about 10 steps long)."},{"id":"4354247de18f","q":"What are the four main types of RNN architectures mentioned?","a":"1) Sequence-to-sequence (e.g., time series forecasting), 2) Sequence-to-vector (e.g., sentiment analysis), 3) Vector-to-sequence (e.g., image captioning), and 4) Encoder-decoder (e.g., machine translation)."},{"id":"4de41adc998f","q":"What is backpropagation through time (BPTT)?","a":"BPTT is the training strategy for RNNs where the network is unrolled through time and regular backpropagation is applied. There's a forward pass through the unrolled network, then gradients are propagated backward through the unrolled network."},{"id":"dcba8adc1e9e","q":"What preprocessing steps were taken for the Chicago ridership dataset?","a":"The data was loaded, column names were shortened, rows were sorted by date, the redundant total column was removed, duplicate rows were dropped, and the data was scaled down by a factor of one million to ensure values are near the 0-1 range."},{"id":"79eda7b6e9ff","q":"What is weekly seasonality and how does it appear in the Chicago ridership data?","a":"Weekly seasonality is a pattern that clearly repeats every week. In the Chicago ridership data, it's so strong that forecasting tomorrow's ridership by copying values from a week earlier yields reasonably good results."},{"id":"674b5a23f8ce","q":"What is naive forecasting?","a":"Naive forecasting means simply copying a past value to make a forecast. Generally it means copying the latest known value, but in cases with strong seasonality (like the ridership data), copying the value from the previous week works better."},{"id":"9e7160b5e0f1","q":"What is autocorrelation in time series?","a":"When a time series is correlated with a lagged version of itself, we say that the time series is autocorrelated. This means past values are predictive of future values."},{"id":"d8f2acde392b","q":"What are differencing and its purposes?","a":"Differencing involves plotting the difference between values at time t and time t-k (e.g., t-7 for weekly patterns). It's used to remove trend and seasonality from a time series, making it easier to study a stationary time series."},{"id":"4cf5c299baf2","q":"What is a stationary time series?","a":"A stationary time series is one whose statistical properties remain constant over time, without any seasonality or trends. Differencing is commonly used to make time series more stationary."},{"id":"526d6a6169cc","q":"How does the ARMA model make forecasts?","a":"ARMA computes forecasts using a weighted sum of lagged values (autoregressive component) and corrects these forecasts by adding a moving average computed using a weighted sum of the last few forecast errors (moving average component)."},{"id":"56f88851aaf4","q":"What are the three variants in the ARMA model family?","a":"1) ARMA: basic autoregressive moving average, 2) ARIMA: adds differencing (d rounds) to make time series more stationary, 3) SARIMA: additionally models seasonal components using the same ARIMA approach."},{"id":"033243d08447","q":"What are the seven hyperparameters of the SARIMA model?","a":"p, d, q (same as ARIMA), plus P, D, Q (for seasonal pattern modeling), and s (the period of the seasonal pattern). P, D, Q work like p, d, q but for time series at t-s, t-2s, t-3s, etc."},{"id":"3ed6a0265716","q":"How does tf.keras.utils.timeseries_dataset_from_array() work?","a":"It takes a time series as input and builds a tf.data.Dataset containing all windows of desired length along with their corresponding targets. It's useful for preparing training data for sequence models."},{"id":"ee4c23f40ecd","q":"Why must training windows be shuffled for RNN training?","a":"Gradient descent expects instances in the training set to be independent and identically distributed (IID). Shuffling the training windows (but not their contents) helps meet this requirement."},{"id":"d864d6144cc4","q":"What input shape do recurrent layers in Keras expect?","a":"Recurrent layers expect 3D inputs of shape [batch size, time steps, dimensionality], where dimensionality is 1 for univariate time series and more for multivariate time series."},{"id":"6d721587293e","q":"Why did the simple RNN with one neuron perform poorly?","a":"1) It only had a single recurrent neuron with extremely limited memory (just its previous output), and only 3 parameters total. 2) The time series contained values from 0 to 1.4, but the default tanh activation function can only output values between -1 and +1."},{"id":"2d258a86bba5","q":"How can you fix the issues with a simple RNN?","a":"Create a model with a larger recurrent layer (e.g., 32 neurons) and add a dense output layer with no activation function. This provides more memory capacity and removes output range constraints."},{"id":"d2f55f54e406","q":"What is the key requirement for stacking recurrent layers in a deep RNN?","a":"Set return_sequences=True for all recurrent layers except the last one (if you only care about the last output). This ensures each layer outputs a 3D array containing outputs for all time steps rather than just the last time step."},{"id":"9c564439dc53","q":"How can you create a multivariate time series model?","a":"Change the input shape to accommodate multiple features per time step (e.g., [None, 5] for 5 features). The model can use multiple related time series as input to forecast one or more target series."},{"id":"1ddf88ad6353","q":"What are two approaches for forecasting several time steps ahead?","a":"1) Iterative: predict one step, add it to inputs, predict next step, repeat (errors accumulate). 2) Direct: train the model to predict multiple future values in one shot (output layer has multiple units for multiple forecasts)."},{"id":"deeb03b1664f","q":"How does a sequence-to-sequence model work for multi-step forecasting?","a":"Instead of forecasting only at the last time step, it forecasts at each time step. This provides more error gradients throughout the model, stabilizing and speeding up training. Set return_sequences=True in the recurrent layer."},{"id":"f46c785dffc8","q":"What causes the unstable gradients problem in RNNs?","a":"When training RNNs on long sequences, the unrolled network becomes very deep. The same weights used at every time step can cause outputs to explode if gradient descent increases outputs slightly at early time steps, which then amplifies through subsequent time steps."},{"id":"d9f224b9373c","q":"Why might nonsaturating activation functions (like ReLU) worsen RNN instability?","a":"If weights are updated to slightly increase outputs at the first time step, the same weights used at subsequent time steps can cause outputs to explode throughout the sequence, and nonsaturating functions don't prevent this explosion."},{"id":"27781ad23e9c","q":"How does layer normalization differ from batch normalization for RNNs?","a":"Layer normalization normalizes across the features dimension instead of the batch dimension. It can compute statistics on-the-fly at each time step independently for each instance, behaves the same during training and testing, and works better with RNNs than batch normalization."},{"id":"4c114edff5bd","q":"How do you create a custom memory cell in Keras?","a":"Define a custom cell class that inherits from tf.keras.layers.Layer. The call() method takes two arguments: inputs at current time step and hidden states from previous time step. Must have state_size and output_size attributes."},{"id":"bf8f35abdbfe","q":"What is the short-term memory problem in RNNs?","a":"Due to transformations that data goes through when traversing an RNN, some information is lost at each time step. After a while, the RNN's state contains virtually no trace of the first inputs, like Dory the fish trying to translate a long sentence."},{"id":"6e668e2b7229","q":"How does an LSTM cell address the short-term memory problem?","a":"LSTM splits state into short-term h(t) and long-term c(t) states. The network learns what to store in long-term state, what to throw away, and what to read from it using forget gates, input gates, and output gates."},{"id":"38952350699c","q":"What are the four fully connected layers in an LSTM cell?","a":"1) Main layer g(t): analyzes current inputs and previous state, 2) Forget gate f(t): controls what to erase from long-term state, 3) Input gate i(t): controls what parts of g(t) to add to long-term state, 4) Output gate o(t): controls what to read and output."},{"id":"9e75e0ab08ab","q":"How does the long-term state flow through an LSTM cell?","a":"The long-term state c(t-1) goes through a forget gate (dropping memories), then adds new memories via addition operation (selected by input gate), producing c(t). This state is copied, passed through tanh, and filtered by output gate to produce short-term state h(t)."},{"id":"77fd1a6b2db3","q":"What are the main simplifications of a GRU cell compared to LSTM?","a":"1) Both state vectors are merged into single vector h(t), 2) Single gate controller z(t) controls both forget and input gates, 3) No output gate - full state vector is output at every time step, 4) New gate controller r(t) controls which part of previous state is shown to main layer."},{"id":"70cf19a5f08f","q":"How do 1D convolutional layers help with long sequences?","a":"1D convolutional layers slide kernels across sequences, detecting short sequential patterns. They can shorten sequences (with stride > 1), potentially helping RNN layers detect longer patterns. Can be mixed with recurrent layers or used alone."},{"id":"48384b30b592","q":"What is the WaveNet architecture?","a":"WaveNet stacks 1D convolutional layers with doubling dilation rates at every layer. First layer sees 2 time steps, next sees 4, then 8, etc. Lower layers learn short-term patterns while higher layers learn long-term patterns, enabling efficient processing of extremely large sequences."},{"id":"9d7fe538bf56","q":"What is causal padding in convolutional layers?","a":"Causal padding is like 'same' padding but zeros are appended only at the start of the input sequence, not both sides. This ensures the convolutional layer doesn't peek into the future when making predictions."},{"id":"97aec3086d61","q":"What are some techniques for monitoring RNN training and preventing issues?","a":"Monitor gradient sizes using tools like TensorBoard, use gradient clipping if training is unstable, apply dropout and recurrent_dropout, use layer normalization, and consider MC dropout for uncertainty estimation in forecasts."},{"id":"e48025036ec7","q":"Why might models trained on historical data fail in production?","a":"Models will only work well if patterns learned from the past continue in the future. Events like the Covid-19 pandemic can dramatically change patterns (like public transportation usage), making historical models ineffective. Always verify models work on recent data before deployment."},{"id":"72c85280d484","q":"What are the key advantages of LSTM and GRU cells over simple RNNs?","a":"LSTM and GRU cells perform much better than basic cells, with training converging faster and ability to detect longer-term patterns. They can tackle much longer sequences than simple RNNs, though still have limited memory for sequences of 100+ time steps."},{"id":"fc9445d63641","q":"When should you use different RNN architectures (SimpleRNN vs LSTM vs GRU vs 1D Conv)?","a":"SimpleRNN for basic tasks with short sequences, LSTM/GRU for longer sequences requiring memory of long-term patterns, 1D convolutional layers for very long sequences or when you want to process sequences without recurrence, and combinations for optimal performance depending on the specific task and data."}]},{"id":"b2c15","title":"Natural Language Processing with RNNs and Attention","summary":"Learn tokenization, embeddings, attention mechanisms, sequence-to-sequence systems, Transformers, and NLP generation architectures.","cards":[{"id":"d89677a4dbaf","q":"What is the ultimate goal of NLP research, and why did Alan Turing choose a linguistic task for his famous test?","a":"The ultimate goal of NLP research is to build machines that can master written and spoken language. Turing chose a linguistic task because mastering language is arguably Homo sapiens's greatest cognitive ability, making it a meaningful test of machine intelligence."},{"id":"7f07c2bd844a","q":"What is a char-RNN and what makes it impressive for language modeling?","a":"A char-RNN is a recurrent neural network trained to predict the next character in a sentence. It's impressive because by learning this simple task, it automatically learns words, grammar, proper punctuation, and more complex language patterns without explicit instruction."},{"id":"ae85b4a1b01b","q":"How do you prepare a dataset for training a char-RNN using TensorFlow?","a":"Use tf.keras.layers.TextVectorization with split='character' to encode text character-by-character. Create windows where each input sequence is paired with the same sequence shifted by one character as the target. Use functions like to_dataset() to convert the long sequence into input/target window pairs."},{"id":"9ef2bf987309","q":"What is the purpose of the Embedding layer in a char-RNN model?","a":"The Embedding layer converts character IDs into dense vector representations (embeddings). It takes 2D input of shape [batch size, window length] and outputs 3D tensors of shape [batch size, window length, embedding size], providing learnable representations for each character."},{"id":"bfd91e2abf49","q":"What is greedy decoding and why might it be problematic for text generation?","a":"Greedy decoding always selects the character with the highest predicted probability. This often leads to repetitive text because the model gets stuck in loops, always choosing the same most likely next character."},{"id":"89af01f8f91e","q":"How does temperature control text generation diversity?","a":"Temperature controls diversity by dividing logits before applying softmax. Low temperature (close to 0) favors high-probability characters for precise text. High temperature gives all characters more equal probability for creative, diverse text."},{"id":"2f3b9fe4a30c","q":"What is a stateful RNN and how does it differ from a stateless RNN?","a":"A stateful RNN preserves its hidden state between training batches, allowing it to learn long-term patterns despite short backpropagation sequences. A stateless RNN starts with zero hidden states at each batch. Stateful RNNs require sequential, non-overlapping input sequences."},{"id":"f1a9d2d18635","q":"What is the 'sentiment neuron' discovery and why is it significant?","a":"Researchers found that a char-RNN trained only to predict the next character spontaneously developed a neuron that acted as an excellent sentiment classifier. This showed that language models can learn higher-level tasks without explicit labels, foreshadowing unsupervised pretraining in NLP."},{"id":"cb10c2de0194","q":"What is masking in RNNs and why is it necessary for variable-length sequences?","a":"Masking tells RNN layers to ignore padding tokens in variable-length sequences. Without masking, RNNs forget sequence content when processing many padding tokens. Set mask_zero=True in Embedding layers to automatically propagate masks through the network."},{"id":"ed8ed73ae860","q":"What are the main tokenization challenges for different languages mentioned in the text?","a":"Chinese doesn't use spaces between words, Vietnamese uses spaces within words, German attaches multiple words without spaces, and even English has ambiguous cases like 'San Francisco' or '#ILoveDeepLearning' that shouldn't be split."},{"id":"f62036d283fd","q":"What is Byte Pair Encoding (BPE) and how does it work?","a":"BPE is a subword tokenization technique that starts by splitting text into individual characters, then repeatedly merges the most frequent adjacent character pairs until reaching the desired vocabulary size. This allows models to handle rare words by understanding subword components."},{"id":"71db8288529c","q":"What is teacher forcing in sequence-to-sequence models?","a":"Teacher forcing feeds the decoder the correct target word from the previous time step during training, rather than its own prediction. This significantly speeds up training and improves performance by providing ground truth context."},{"id":"c7b34142b10d","q":"What are the four main RNN architectures for different input/output patterns?","a":"1) Sequence-to-sequence (e.g., time series forecasting), 2) Sequence-to-vector (e.g., sentiment analysis), 3) Vector-to-sequence (e.g., image captioning), and 4) Encoder-decoder (e.g., machine translation)."},{"id":"1e3049430e3c","q":"What is a bidirectional RNN and when should you use it?","a":"A bidirectional RNN processes sequences in both forward and backward directions, then combines outputs. Use it for tasks like text classification or in encoders where you can look at future context, but not in decoders which must remain causal."},{"id":"36dd13d00cc9","q":"What is beam search and how does it improve sequence generation?","a":"Beam search keeps track of the k most promising partial sequences (beam width k) and extends them at each step, keeping only the top k overall. This allows the model to reconsider earlier decisions and often produces better translations than greedy decoding."},{"id":"a0fd681c0d71","q":"What problem do attention mechanisms solve in encoder-decoder models?","a":"Attention mechanisms solve the bottleneck problem where all encoder information must pass through a single final hidden state. They allow the decoder to directly access all encoder outputs, creating shorter paths from input words to their translations."},{"id":"d4e39ad23831","q":"How does Bahdanau attention work?","a":"Bahdanau attention concatenates each encoder output with the decoder's previous hidden state, passes this through a dense layer to compute alignment scores, applies softmax to get attention weights, then computes a weighted sum of encoder outputs for the decoder."},{"id":"266a509fdca4","q":"What is the key difference between Bahdanau and Luong attention?","a":"Luong attention uses dot products to compute similarity scores between decoder hidden states and encoder outputs, making it more efficient. Bahdanau attention concatenates the vectors and uses a feedforward network to compute alignment scores."},{"id":"08d3e036a6d1","q":"What is the core innovation of the Transformer architecture?","a":"Transformers use only attention mechanisms without any recurrent or convolutional layers. This eliminates vanishing gradient problems, enables better parallelization, can be trained in fewer steps, and better captures long-range patterns than RNNs."},{"id":"7fd9258ff687","q":"What are positional encodings and why are they necessary in Transformers?","a":"Positional encodings are vectors added to word embeddings to give the model information about word positions, since Transformers ignore sequential order. They can be learned embeddings or fixed sine/cosine functions that encode both absolute and relative positions."},{"id":"569f516eb9f5","q":"What is the purpose of multi-head attention?","a":"Multi-head attention applies multiple attention mechanisms in parallel, each focusing on different aspects of the input (e.g., one head for verbs, another for tense). This allows the model to attend to different types of information simultaneously before combining the results."},{"id":"ef9f80d12f84","q":"How does masked multi-head attention work in the decoder?","a":"Masked multi-head attention prevents the decoder from attending to future tokens by applying a causal mask. When processing token i, it can only attend to tokens 1 through i, ensuring the model remains causal during training."},{"id":"ff484a77ba29","q":"What are the two main pretraining tasks in BERT?","a":"1) Masked Language Model (MLM): 15% of words are masked and the model predicts them. 2) Next Sentence Prediction (NSP): The model predicts whether two sentences are consecutive (though NSP was later found less important and dropped in many models)."},{"id":"a9148c01db71","q":"What is the key architectural difference between GPT and BERT?","a":"GPT uses only masked multi-head attention layers (like the transformer decoder) and is autoregressive, predicting the next token. BERT uses non-masked multi-head attention (like the transformer encoder) and is bidirectional, able to see context from both directions."},{"id":"3f58a53f37cc","q":"What is distillation in the context of language models?","a":"Distillation transfers knowledge from a large 'teacher' model to a smaller 'student' model by training the student to match the teacher's predicted probabilities. This often works better than training the student from scratch and produces more efficient models."},{"id":"2e0f7acdb9bb","q":"What is chain-of-thought prompting?","a":"Chain-of-thought prompting includes step-by-step reasoning in example answers, encouraging models to show their work. Instead of just 'A: 11', examples show 'A: Roger started with 5 balls. 2 cans of 3 each is 6 balls. 5 + 6 = 11.' This improves accuracy and interpretability."},{"id":"f54f98438233","q":"How do Vision Transformers (ViTs) process images?","a":"ViTs split images into 16x16 pixel patches, flatten each patch into a 768-dimensional vector (16×16×3), pass through a linear layer, add positional embeddings, then process the sequence of patch embeddings like word tokens in a standard transformer."},{"id":"29fa1095fcc8","q":"What is an inductive bias and how do CNNs and Transformers differ in this regard?","a":"Inductive bias is an implicit assumption made by a model's architecture. CNNs assume patterns learned in one location are useful elsewhere (translation invariance). Transformers have fewer inductive biases, so they need more training data but can be more flexible."},{"id":"e20385cc03f3","q":"What problem does the Perceiver architecture solve?","a":"The Perceiver solves the quadratic computational complexity of self-attention by using cross-attention with a fixed-size latent representation as queries and the full input as keys/values. This makes complexity linear in input size rather than quadratic."},{"id":"f5c38ce036e5","q":"What is DINO and how does it achieve self-supervised learning?","a":"DINO is a vision transformer trained using self-distillation where a student network learns to match a teacher network's predictions on differently augmented versions of the same image. The teacher's weights are an exponential moving average of the student's weights."},{"id":"997ebd663010","q":"How does the Hugging Face pipeline API work?","a":"The pipeline API provides a simple interface: specify a task like 'sentiment-analysis' and it downloads a default pretrained model. You can also specify custom models. It handles tokenization, inference, and post-processing automatically."},{"id":"4aad77cc68b2","q":"What are some sources of bias in AI models mentioned in the text?","a":"Bias comes from training data (e.g., negative sentences about Iraq in news), model architecture, loss functions, optimizers, and deployment methods. Even unbiased models can be used in biased ways, like biased survey questions."},{"id":"0e1b5bc51ddb","q":"How can you use pretrained transformers for fine-tuning?","a":"Load models using classes like TFAutoModelForSequenceClassification and AutoTokenizer. The models output logits, so use SparseCategoricalCrossentropy(from_logits=True) loss. During training, use the .data attribute of tokenizer outputs to get regular dictionaries instead of BatchEncoding objects."},{"id":"e548648c70a8","q":"What is the significance of multimodal models like CLIP and DALL-E?","a":"Multimodal models can understand and generate across different modalities (text, images, audio). CLIP learns to match text descriptions with images, enabling zero-shot image classification. DALL-E generates images from text descriptions, showing powerful cross-modal capabilities."},{"id":"2edc65647a2b","q":"What makes attention mechanisms interpretable?","a":"Attention mechanisms show which parts of the input the model focuses on when producing outputs. This provides explainability - you can see what the model was 'looking at' when making decisions, helping debug mistakes and understand model behavior."},{"id":"5323585feab0","q":"Why can't convolutional layers handle masking in sequence models?","a":"Convolutional layers don't support masking because it's not obvious how they would handle variable-length sequences with padding. The convolution operation expects regular, dense input patterns, unlike recurrent layers that can simply skip or ignore masked time steps."},{"id":"7e70a95f6630","q":"What is the key insight behind treating attention as a differentiable memory retrieval mechanism?","a":"Attention works like a dictionary lookup where queries don't exactly match keys, so similarity scores and softmax create weights for a weighted average of values. This allows soft, differentiable retrieval from memory based on similarity rather than exact matches."},{"id":"2157df98e505","q":"What computational complexity challenge do transformers face with long sequences?","a":"Self-attention requires computing an M×M attention matrix where M is sequence length, making complexity quadratic in sequence length. This limits transformers to relatively short sequences unless architectural modifications (like Perceiver) address this bottleneck."},{"id":"369e44cf6803","q":"How do you implement causal masking in transformer decoders?","a":"Create a lower triangular matrix using tf.linalg.band_part() where position (i,j) is 1 if j≤i and 0 otherwise. This ensures that when processing token i, the model can only attend to tokens 1 through i, preventing it from seeing future tokens."},{"id":"5887910dba2f","q":"What role do skip connections and layer normalization play in transformers?","a":"Skip connections (residual connections) help gradients flow through deep networks and prevent degradation. Layer normalization stabilizes training by normalizing activations. Together, they enable training very deep transformer networks effectively."},{"id":"3818dfeb1245","q":"What is the T5 model's key innovation in framing NLP tasks?","a":"T5 frames all NLP tasks as text-to-text problems. Translation becomes 'translate English to Spanish: I like soccer' → 'me gusta el fútbol'. Classification becomes 'classify: [text]' → class name. This unified approach simplifies training and enables pretraining on diverse tasks."}]},{"id":"b2c16","title":"Autoencoders, GANs, and Diffusion Models","summary":"Learn autoencoders, latent spaces, VAEs, GANs, denoising systems, and generative AI architectures.","cards":[{"id":"89a8d0f59a89","q":"What are autoencoders and what are they designed to do?","a":"Autoencoders are artificial neural networks capable of learning dense representations of input data, called latent representations or codings, without any supervision. They are designed to copy their inputs to their outputs, but various constraints force them to learn efficient data representations."},{"id":"1adc959686b9","q":"What are the two main parts of an autoencoder and what do they do?","a":"An autoencoder consists of an encoder (or recognition network) that converts inputs to a latent representation, and a decoder (or generative network) that converts the internal representation back to outputs that should resemble the inputs."},{"id":"1588be1f7d5d","q":"What is an undercomplete autoencoder and why is this constraint important?","a":"An undercomplete autoencoder has an internal representation with lower dimensionality than the input data. This constraint prevents the autoencoder from trivially copying inputs to outputs, forcing it to learn the most important features in the input data and drop unimportant ones."},{"id":"0545853a716c","q":"What happens when an autoencoder uses only linear activations and MSE loss?","a":"When an autoencoder uses only linear activations and the mean squared error (MSE) cost function, it ends up performing principal component analysis (PCA)."},{"id":"08b69a986980","q":"What are stacked autoencoders and what advantage do they provide?","a":"Stacked autoencoders (or deep autoencoders) have multiple hidden layers. Adding more layers helps the autoencoder learn more complex codings, but care must be taken not to make the autoencoder too powerful or it might learn trivial mappings."},{"id":"e0106bbfd249","q":"What is the typical architecture pattern for stacked autoencoders?","a":"Stacked autoencoders typically have a symmetrical architecture with regard to the central hidden layer (coding layer). It looks like a sandwich, for example: 784 inputs → 100 neurons → 30 neurons (coding layer) → 100 neurons → 784 outputs."},{"id":"10a42f118f86","q":"How can autoencoders be used for unsupervised pretraining?","a":"If you have a large dataset but most is unlabeled, you can first train a stacked autoencoder using all the data, then reuse the lower layers to create a neural network for your actual task and train it using the labeled data. This helps when you don't have much labeled training data."},{"id":"35f3161f498b","q":"What is weight tying in autoencoders and what are its benefits?","a":"Weight tying is when decoder layer weights are tied to encoder layer weights (specifically WL = WN–L+1⊺). This halves the number of weights in the model, speeds up training, and limits the risk of overfitting."},{"id":"48616798458f","q":"What are convolutional autoencoders and when should they be used?","a":"Convolutional autoencoders use convolutional layers instead of dense layers and are much better suited for working with images. The encoder is a regular CNN that reduces spatial dimensions while increasing depth, and the decoder reverses this process using transpose convolutional layers."},{"id":"4c42c2cc76c4","q":"What are denoising autoencoders and how do they work?","a":"Denoising autoencoders add noise to their inputs during training and learn to recover the original, noise-free inputs. The noise can be Gaussian noise or randomly switched-off inputs (like dropout). This forces the autoencoder to learn useful features and can be used to remove noise from images."},{"id":"dd02630d8f7f","q":"What are sparse autoencoders and how do they encourage sparsity?","a":"Sparse autoencoders add a sparsity constraint to the cost function that pushes the autoencoder to reduce the number of active neurons in the coding layer. This can be achieved using L1 regularization or by measuring actual sparsity and penalizing deviations from target sparsity using KL divergence."},{"id":"9783f81dad6d","q":"What is the KL divergence formula for sparse autoencoders?","a":"For sparse autoencoders, the KL divergence between target sparsity p and actual sparsity q is: DKL(p ∥ q) = p log(p/q) + (1-p) log((1-p)/(1-q)). This provides stronger gradients than mean squared error for sparsity control."},{"id":"ff4cd09e1182","q":"What makes variational autoencoders (VAEs) different from other autoencoders?","a":"VAEs are probabilistic and generative autoencoders. Instead of directly producing a coding, the encoder produces a mean μ and standard deviation σ, then the actual coding is sampled from a Gaussian distribution. They can generate new instances that look like training data."},{"id":"83076ef40e14","q":"What are the two components of the VAE cost function?","a":"The VAE cost function has two parts: 1) reconstruction loss that pushes the autoencoder to reproduce its inputs (like MSE), and 2) latent loss that pushes the codings to look like they were sampled from a simple Gaussian distribution (using KL divergence)."},{"id":"147490721e01","q":"What is the latent loss formula for variational autoencoders?","a":"The latent loss is: ℒ = -½ Σ(1 + log(σi²) - σi² - μi²) where n is the coding dimensionality, and μi and σi are the mean and standard deviation of the ith component of the codings."},{"id":"391f05ba51e2","q":"What is semantic interpolation in VAEs?","a":"Semantic interpolation in VAEs means interpolating between images at the codings level rather than the pixel level. This creates smooth transitions between different concepts, like gradually transforming pants into sweaters in the latent space."},{"id":"6a47e9654c51","q":"What are the two neural networks in a GAN and what do they do?","a":"A GAN consists of: 1) Generator - takes random input (typically Gaussian) and outputs data (like images), trying to produce realistic fake data, and 2) Discriminator - takes real or fake data as input and tries to distinguish between real and fake data."},{"id":"8854ec7efb85","q":"How does GAN training work with its two-phase process?","a":"Phase 1: Train discriminator with batch of real images (labeled 1) and fake images from generator (labeled 0). Phase 2: Train generator by creating fake images and setting all labels to 1 (real), forcing generator to fool discriminator. Discriminator weights are frozen in phase 2."},{"id":"be966a310591","q":"What is mode collapse in GANs?","a":"Mode collapse is when the generator's outputs gradually become less diverse. For example, if the generator gets better at producing shoes, it may focus increasingly on shoes and forget how to produce other classes, cycling through a few classes without mastering any."},{"id":"be0c1ef2ef5e","q":"What is a Nash equilibrium in the context of GANs?","a":"A Nash equilibrium in GANs is the theoretical optimal state where no player would be better off changing their strategy. For GANs, this occurs when the generator produces perfectly realistic images and the discriminator is forced to guess randomly (50% real, 50% fake)."},{"id":"6ad3c5e28e7f","q":"What are the main guidelines for building Deep Convolutional GANs (DCGANs)?","a":"DCGAN guidelines: 1) Replace pooling with strided convolutions (discriminator) and transposed convolutions (generator), 2) Use batch normalization except in generator output and discriminator input layers, 3) Remove fully connected hidden layers, 4) Use ReLU in generator (tanh for output), 5) Use leaky ReLU in discriminator."},{"id":"0fa057d14e21","q":"What is progressive growing of GANs?","a":"Progressive growing is a technique where you start by generating small images (4×4) at the beginning of training, then gradually add convolutional layers to both generator and discriminator to produce larger images (8×8, 16×16, ..., up to 1024×1024), with fade-in/fade-out transitions."},{"id":"fb6ca08096e0","q":"What is the mini-batch standard deviation layer in progressive GANs?","a":"This layer computes the standard deviation across all channels and instances in the batch for each position, then adds an extra feature map filled with this value to each instance. It helps the discriminator detect when the generator produces images with little variety, encouraging more diverse outputs."},{"id":"b59212a4f9be","q":"What is equalized learning rate in progressive GANs?","a":"Instead of using He initialization, all weights are initialized from N(0,1) and scaled down at runtime by the He factor (divided by √n_inputs). This ensures all parameters have the same dynamic range throughout training, so they learn at the same speed, speeding up and stabilizing training."},{"id":"935e35373721","q":"What are the two networks in a StyleGAN generator?","a":"StyleGAN generator has: 1) Mapping network - an 8-layer MLP that maps latent representations z to style vectors w through multiple affine transformations, controlling different style levels, and 2) Synthesis network - generates images using constant learned input, with noise injection and adaptive instance normalization (AdaIN) layers."},{"id":"f703e4e37a08","q":"Why does StyleGAN add noise independently from the codings?","a":"Adding independent noise prevents the generator from wasting representational power storing random details like freckle positions in the codings. It avoids the need for noise to flow through the entire network and prevents visual artifacts from using the same noise at different levels."},{"id":"4736220346ec","q":"What is the core idea behind diffusion models?","a":"Diffusion models are trained to learn the reverse of a diffusion process. The forward process gradually adds Gaussian noise to images until they become pure noise. The model learns to reverse this by removing tiny amounts of noise at each step, eventually generating new images from random noise."},{"id":"4c6de274f397","q":"What is the forward diffusion process in DDPMs?","a":"The forward process starts with a clean image x0 and at each time step t adds Gaussian noise with variance βt while scaling by √(1-βt). This continues for T steps (typically 1000-4000) until the image becomes pure Gaussian noise. The variance schedule βt controls how quickly the signal fades."},{"id":"a65a991bedce","q":"What is the shortcut formula for the forward diffusion process?","a":"Instead of computing x1, x2, ..., xt-1 sequentially, you can directly sample xt from x0 using: q(xt|x0) = N(√α̅t x0, (1-α̅t)I), where α̅t is the cumulative product of (1-βt) terms up to time t."},{"id":"8451c1e2691c","q":"What does a DDPM model predict and why not predict the original image directly?","a":"DDPM models predict the noise that should be subtracted from the input image to get closer to the original image. The authors found that predicting noise works better than directly predicting the original image."},{"id":"a500e8710b86","q":"What is the reverse diffusion process equation?","a":"The reverse process equation is: xt-1 = (1/√αt)(xt - βt/√(1-α̅t) * εθ(xt,t)) + √(1-αt) * z, where εθ(xt,t) is the noise predicted by the model and z is additional Gaussian noise (except for the final step)."},{"id":"daac5b04a2c1","q":"What architecture do DDPMs typically use?","a":"DDPMs typically use a modified U-Net architecture that gradually downsamples input images then upsamples them with skip connections. Time steps are encoded using positional encodings like in transformers and fed to the network at every level, often with multi-head attention layers."},{"id":"66c25a6c5bc6","q":"What is the main advantage and disadvantage of diffusion models compared to GANs?","a":"Advantages: DDPMs are much easier to train than GANs and generate more diverse, higher-quality images. Disadvantage: They are much slower to generate images since the model must be called thousands of times (once for each reverse step)."},{"id":"9fdfe59f8286","q":"What are latent diffusion models and what advantages do they provide?","a":"Latent diffusion models perform the diffusion process in a compressed latent space rather than pixel space, using an autoencoder to compress/decompress. This considerably speeds up image generation, reduces training time and costs, while maintaining outstanding image quality."},{"id":"203c44fddcb3","q":"What is Stable Diffusion and why is it significant?","a":"Stable Diffusion is a powerful pretrained latent diffusion model open-sourced in August 2022. It was ported to TensorFlow and included in KerasCV, allowing anyone to generate high-quality images from text prompts for free, even on regular laptops."},{"id":"fb967d23958e","q":"What applications do conditioning techniques enable in diffusion models?","a":"Conditioning techniques allow guidance using text prompts, images, or other inputs to control the generation process. This enables applications like text-to-image generation, outpainting (extending images beyond borders), and inpainting (filling holes in images)."},{"id":"8e8fabc189c1","q":"How can autoencoders be used for dimensionality reduction and visualization?","a":"Autoencoders can reduce dataset dimensionality by using the encoder to compress data, then apply other dimensionality reduction algorithms like t-SNE for final visualization. This strategy works well for large datasets with many instances and features."},{"id":"fc8fdbd28dfc","q":"What is the chess memory experiment analogy for autoencoders?","a":"Chess experts can memorize realistic game positions quickly because they recognize patterns, but struggle with random positions. Similarly, autoencoders are constrained to find patterns in data - they can't just memorize everything, so they must learn efficient representations by recognizing important patterns."},{"id":"3bcfb18aa815","q":"What is mixing regularization in StyleGAN?","a":"Mixing regularization (or style mixing) generates a percentage of images using two different codings c1 and c2. The synthesis network uses styles w1 for early levels and w2 for later levels, with a random cutoff. This prevents the network from assuming adjacent styles are correlated and encourages locality."},{"id":"5bb1cfe89bb3","q":"What was the key breakthrough that made diffusion models competitive with GANs?","a":"In 2020-2021, researchers showed that DDPMs could generate more diverse and higher-quality images than GANs while being much easier to train. The main innovation was the denoising approach and proper variance scheduling, though they remain slower for generation."},{"id":"7d6e6230cbb0","q":"What are the main uses of autoencoders mentioned in the chapter?","a":"Main uses include: 1) Dimensionality reduction for visualization, 2) Feature detection and extraction, 3) Unsupervised pretraining of deep neural networks, 4) Generative modeling (creating new data similar to training data), and 5) Denoising (removing noise from images)."},{"id":"f41cbf564b93","q":"What is experience replay in GAN training?","a":"Experience replay stores images produced by the generator at each iteration in a replay buffer (gradually dropping older images) and trains the discriminator using real images plus fake images from this buffer rather than just current generator outputs. This reduces overfitting to the latest generator outputs."}]},{"id":"b2c17","title":"Reinforcement Learning","summary":"Learn reinforcement learning, policies, rewards, Q-learning, Bellman equations, policy gradients, and autonomous AI agents.","cards":[{"id":"43341276e385","q":"What was the revolutionary breakthrough that DeepMind achieved in 2013 in reinforcement learning?","a":"DeepMind demonstrated a system that could learn to play just about any Atari game from scratch, eventually outperforming humans in most of them, using only raw pixels as inputs and without any prior knowledge of the game rules. This was achieved by applying deep learning to reinforcement learning."},{"id":"1250621f940b","q":"What is reinforcement learning and how does it work?","a":"Reinforcement learning is where a software agent makes observations and takes actions within an environment, receiving rewards in return. Its objective is to learn to act in a way that maximizes expected rewards over time through trial and error."},{"id":"34571f8e7080","q":"What is a policy in reinforcement learning?","a":"A policy is the algorithm a software agent uses to determine its actions. It could be a neural network taking observations as inputs and outputting actions to take, or any other algorithm that maps states to actions."},{"id":"327d9d873a47","q":"What are two main approaches to policy search mentioned in the chapter?","a":"1) Brute-force approach: trying many different parameter va
