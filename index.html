lues and picking the combination that performs best. 2) Genetic algorithms: creating generations of policies, killing the worst performers, and having survivors produce offspring with random variations."},{"id":"dcea446e156d","q":"What is policy gradients and how does it work?","a":"Policy gradients use optimization techniques by evaluating gradients of rewards with regard to policy parameters, then tweaking these parameters by following gradients toward higher rewards (gradient ascent)."},{"id":"247207077e60","q":"What is OpenAI Gym and why is it useful?","a":"OpenAI Gym is a toolkit that provides a wide variety of simulated environments (Atari games, board games, 2D and 3D physical simulations) that can be used to train agents, compare them, or develop new RL algorithms."},{"id":"9816ba3406ef","q":"Describe the CartPole environment used as an example in the chapter.","a":"CartPole is a 2D simulation where a cart can be accelerated left or right to balance a pole placed on top of it. Observations are a 1D array with cart position, velocity, pole angle, and angular velocity. Actions are discrete: 0 (left) or 1 (right)."},{"id":"9f49612b11e0","q":"What are the five values returned by the env.step() method in OpenAI Gym?","a":"1) obs: new observation, 2) reward: reward received, 3) done: whether episode is over, 4) truncated: whether episode was interrupted early, 5) info: environment-specific dictionary with extra information."},{"id":"13fcb798e0f1","q":"Why do neural network policies use random action selection based on probabilities rather than always choosing the highest-scoring action?","a":"This approach lets the agent find the right balance between exploring new actions and exploiting actions known to work well. It addresses the exploration/exploitation dilemma that is central to reinforcement learning."},{"id":"b9e86e14c10f","q":"What is the credit assignment problem in reinforcement learning?","a":"When an agent gets a reward, it's hard to know which actions should get credited or blamed for it. Since rewards are typically sparse and delayed, it's difficult to determine which of many actions contributed to the final outcome."},{"id":"273c10e63f93","q":"What is an action's return and how is it calculated?","a":"An action's return is the sum of all discounted future rewards that come after it. It's calculated as the immediate reward plus gamma times the next reward plus gamma squared times the reward after that, etc., where gamma is the discount factor."},{"id":"6c63ed1d7a78","q":"What is action advantage and how is it computed?","a":"Action advantage estimates how much better or worse an action is compared to other possible actions on average. It's computed by running many episodes, normalizing all action returns by subtracting the mean and dividing by standard deviation."},{"id":"499c36c1e44f","q":"Describe the four steps of the REINFORCE policy gradient algorithm.","a":"1) Let the neural network play several times, computing gradients to make chosen actions more likely. 2) Compute each action's advantage. 3) If advantage is positive, apply gradients to make action more likely; if negative, apply opposite gradients. 4) Compute mean of all gradient vectors and perform gradient descent step."},{"id":"b3a6f1ff15de","q":"What is a Markov chain?","a":"A Markov chain is a stochastic process with no memory. It has a fixed number of states and randomly evolves from one state to another at each step, where transition probabilities depend only on the current state pair (s, s'), not on past states."},{"id":"b4b00d8283a1","q":"How do Markov Decision Processes (MDPs) differ from Markov chains?","a":"MDPs are like Markov chains but with a twist: at each step, an agent can choose one of several possible actions, transition probabilities depend on the chosen action, some state transitions return rewards, and the agent's goal is to find a policy that maximizes reward over time."},{"id":"00679986becb","q":"What is the Bellman optimality equation?","a":"V*(s) = max_a Σ_s' T(s,a,s')[R(s,a,s') + γ·V*(s')] for all s. This recursive equation says that if the agent acts optimally, the optimal value of the current state equals the expected reward plus expected optimal value of next states."},{"id":"cb2632db8f52","q":"What is the value iteration algorithm?","a":"An algorithm that iteratively updates state value estimates using: V_k+1(s) ← max_a Σ_s' T(s,a,s')[R(s,a,s') + γ·V_k(s')]. Starting with zero estimates, this converges to optimal state values given enough time."},{"id":"ee7eb7952d71","q":"What are Q-values and how do they differ from state values?","a":"Q-values (quality values) are the optimal state-action values Q*(s,a), representing the sum of discounted future rewards expected after reaching state s, choosing action a, but before seeing the outcome, assuming optimal play afterward. Unlike state values, they include the action choice."},{"id":"9c6904595ba2","q":"What is the Q-value iteration algorithm?","a":"Q_k+1(s,a) ← Σ_s' T(s,a,s')[R(s,a,s') + γ·max_a' Q_k(s',a')] for all s,a. Once you have optimal Q-values, the optimal policy is simply choosing the action with highest Q-value for each state."},{"id":"6066e9a116fa","q":"What is temporal difference (TD) learning?","a":"TD learning is similar to Q-value iteration but adapted for when the agent has only partial knowledge of the MDP. It updates state value estimates based on actually observed transitions and rewards: V_k+1(s) ← (1-α)V_k(s) + α(r + γ·V_k(s'))."},{"id":"82652445a5a3","q":"What is Q-learning?","a":"Q-learning is an adaptation of Q-value iteration for situations where transition probabilities and rewards are initially unknown. It works by watching an agent play and gradually improving Q-value estimates using: Q(s,a) ← α(r + γ·max_a' Q(s',a'))."},{"id":"cf9cd11f53d4","q":"What is the difference between off-policy and on-policy algorithms?","a":"Off-policy algorithms (like Q-learning) train a policy different from the one used during exploration - the exploration policy can be completely random while training an optimal policy. On-policy algorithms (like policy gradients) explore using the policy being trained."},{"id":"8c41ecdc2e18","q":"What is an ε-greedy policy?","a":"An ε-greedy policy acts randomly with probability ε, or greedily with probability 1-ε (choosing the action with highest Q-value). This balances exploration of unknown regions with exploitation of promising areas as Q-values improve."},{"id":"95e1c476f0bc","q":"Why is approximate Q-learning necessary for complex environments?","a":"Q-learning doesn't scale to large MDPs. For example, Ms. Pac-Man has more than 2^150 ≈ 10^45 possible states (considering pellet combinations), making it impossible to keep track of every Q-value estimate."},{"id":"e7057d2cff7b","q":"What is deep Q-learning (DQN)?","a":"Deep Q-learning uses a deep neural network (DQN) to approximate Q-values Q_θ(s,a) for any state-action pair using a manageable number of parameters. The DQN is trained to minimize the squared error between estimated and target Q-values."},{"id":"9dba938a87ff","q":"What is the target Q-value formula in deep Q-learning?","a":"y(s,a) = r + γ·max_a' Q_θ(s',a'). The target combines the observed reward r with the discounted maximum Q-value for the next state s', assuming optimal play from then on."},{"id":"539c979cfb7a","q":"What is a replay buffer and why is it important?","a":"A replay buffer stores all experiences (state, action, reward, next_state, done, truncated) and samples random training batches from it. This reduces correlations between experiences in training batches, which tremendously helps training."},{"id":"d9dc9145e7d3","q":"What is catastrophic forgetting in reinforcement learning?","a":"Catastrophic forgetting occurs when an agent's performance suddenly drops after previously reaching high performance. As the agent explores and updates its policy, what it learns in one part of the environment may break what it learned earlier in other parts."},{"id":"720126b18d60","q":"What is the fixed Q-value targets technique?","a":"Instead of using one DQN for both predictions and targets (which can be unstable like a dog chasing its tail), use two DQNs: an online model for learning and moving the agent, and a target model only for defining targets. The target model is updated less frequently."},{"id":"2ea09820fe89","q":"What is double DQN and what problem does it solve?","a":"Double DQN addresses overestimation of Q-values by the target network. It uses the online model to select the best actions for next states, and the target model only to estimate Q-values for those selected actions, reducing overestimation bias."},{"id":"fdf73a8be3d6","q":"What is prioritized experience replay (PER)?","a":"PER samples important experiences more frequently from the replay buffer instead of uniform sampling. Experience importance is measured by TD error magnitude |δ| = |r + γ·V(s') - V(s)|. Large TD errors indicate surprising transitions worth learning from."},{"id":"05a009790caa","q":"What is dueling DQN?","a":"Dueling DQN expresses Q-values as Q(s,a) = V(s) + A(s,a), where V(s) is state value and A(s,a) is action advantage. The model estimates both, then subtracts the maximum predicted advantage from all advantages, since the best action should have zero advantage."},{"id":"464d44ab8601","q":"What is AlphaGo and how does it work?","a":"AlphaGo uses Monte Carlo tree search (MCTS) based on deep neural networks to play Go. It selects moves using a policy network trained with policy gradients, running simulations and spending more time on promising branches, rather than playing randomly like traditional MCTS."},{"id":"8c1c0f2e14a1","q":"What are actor-critic algorithms?","a":"Actor-critic algorithms combine policy gradients with deep Q-networks. They contain two neural networks: a policy net (actor) and a DQN (critic). The DQN learns from experiences while the policy net learns faster by relying on action values estimated by the DQN."},{"id":"9ddab45ca563","q":"What is A3C (Asynchronous Advantage Actor-Critic)?","a":"A3C is an actor-critic variant where multiple agents learn in parallel, exploring different copies of the environment. They asynchronously push weight updates to and pull from a master network. The DQN estimates advantages rather than Q-values, which stabilizes training."},{"id":"276c737d7550","q":"What is soft actor-critic (SAC)?","a":"SAC learns not only to maximize rewards but also to maximize the entropy of its actions - trying to be as unpredictable as possible while still getting rewards. This encourages exploration, speeds up training, and reduces repetitive actions when DQN estimates are imperfect."},{"id":"0ab0487976f4","q":"What is proximal policy optimization (PPO)?","a":"PPO is based on A2C but clips the loss function to avoid excessively large weight updates that often lead to training instabilities. It's a simplification of trust region policy optimization (TRPO) and was used in OpenAI Five that defeated world champions at Dota 2."},{"id":"415400dd0a5d","q":"What is curiosity-based exploration?","a":"Instead of relying on sparse environmental rewards, make the agent curious to explore by giving it intrinsic rewards. The agent tries to predict action outcomes and seeks situations where outcomes don't match predictions - it wants to be surprised rather than bored."},{"id":"c4283a65111b","q":"What is open-ended learning (OEL)?","a":"OEL trains agents capable of endlessly learning new and interesting tasks, typically generated procedurally. Examples include POET algorithm that generates 2D environments with obstacles and trains agents to walk, gradually increasing difficulty through curriculum learning."},{"id":"94acec52c1eb","q":"Why is reinforcement learning considered notoriously difficult?","a":"RL is difficult due to training instabilities, huge sensitivity to hyperparameter values and random seeds, correlated experiences, and constantly changing learning environments. As researcher Andrej Karpathy said, supervised learning 'wants to work' but 'RL must be forced to work.'"},{"id":"7d4b5b5aeac9","q":"Why shouldn't you plot loss as a performance indicator in RL?","a":"Loss is a poor indicator of RL model performance. Loss might decrease while agent performs worse (e.g., overfitting one region), or loss might increase while agent performs better (e.g., when correcting underestimated Q-values). It's better to plot rewards."},{"id":"fd127e7eb1ad","q":"What is the exploration function approach to Q-learning?","a":"Instead of ε-greedy exploration, add a bonus to Q-value estimates to encourage trying actions not tried much before: Q(s,a) ← α(r + γ·max_a' f(Q(s',a'), N(s',a'))), where N counts action frequency and f(Q,N) = Q + κ/(1+N) with curiosity hyperparameter κ."},{"id":"3b8f85ec4f98","q":"What practical advice does the chapter give about injecting prior knowledge into RL agents?","a":"Unless writing a research paper, don't hesitate to inject prior knowledge into agents as it speeds up training dramatically. For example, add negative rewards proportional to pole angle in CartPole since you know vertical is better. Also consider imitating existing good policies before using RL to improve them."}]},{"id":"b2c18","title":"Training and Deploying TensorFlow Models at Scale","summary":"Learn model deployment, TensorFlow Serving, Vertex AI, inference optimization, TensorFlow Lite, scalable serving systems, and production AI deployment.","cards":[{"id":"79ea80c64268","q":"What is an A/B experiment in machine learning deployment?","a":"An A/B experiment consists of testing two different versions of your product on different subsets of users to check which version works best and get other insights."},{"id":"f41ed42949cd","q":"What is Google Vertex AI and how was it formed?","a":"Google Vertex AI is a platform that merged Google AI Platform (formerly Google ML Engine) and Google AutoML in 2021. It provides AI-related tools and services for training, deploying, and managing ML models."},{"id":"b8251fcedd7f","q":"Why might you want to wrap your ML model in a web service instead of using it directly in Python?","a":"Wrapping a model in a web service decouples it from the rest of the infrastructure, making it possible to easily switch model versions, scale the service independently, perform A/B experiments, and ensure all software components rely on the same model versions."},{"id":"88585675c804","q":"What is TensorFlow Serving (TF Serving) and what are its main benefits?","a":"TF Serving is a very efficient, battle-tested model server written in C++. It can sustain high loads, serve multiple versions of models, watch a model repository to automatically deploy the latest versions, and handle graceful model transitions."},{"id":"9a6c4f4e06bb","q":"What format must you use to export a Keras model for TF Serving?","a":"You must export the model to the SavedModel format using model.save(). To version the model, create subdirectories for each model version (e.g., my_mnist_model/0001, my_mnist_model/0002)."},{"id":"999c3f2c27d4","q":"Why should you include preprocessing layers in your exported model?","a":"Including preprocessing layers allows the model to ingest data in its natural form in production, avoids separate preprocessing in the application, simplifies updates, and limits the risk of mismatch between the model and required preprocessing steps."},{"id":"db5d2f6fdd88","q":"What is a SavedModel and what components does it contain?","a":"A SavedModel contains one or more metagraphs. Each metagraph is a computation graph plus function signature definitions (including input/output names, types, and shapes), identified by a set of tags like 'serve' for serving or 'train' for training."},{"id":"da9eb37ad4e5","q":"What command can you use to inspect a SavedModel?","a":"Use the saved_model_cli command: 'saved_model_cli show --dir model_path' to see tag sets, and 'saved_model_cli show --dir model_path --tag_set serve --signature_def serving_default' to see detailed signature information."},{"id":"1ee6b17242c5","q":"How do you start TF Serving and what ports does it use by default?","a":"Start with: tensorflow_model_server --port=8500 --rest_api_port=8501 --model_name=model_name --model_base_path=path. It uses port 8500 for gRPC API and port 8501 for REST API."},{"id":"5f8a8689bcd9","q":"What are the advantages and disadvantages of the REST API vs gRPC API for TF Serving?","a":"REST API: Simple, works with any client, but inefficient for large data (JSON text-based, verbose). gRPC API: Compact binary format, efficient HTTP/2 communication, much better for large amounts of data or when latency is important."},{"id":"bedeb0347945","q":"How does TF Serving handle model version updates?","a":"TF Serving automatically checks for new model versions at regular intervals. When found, it handles graceful transitions: answers pending requests with the previous version while handling new requests with the new version, then unloads the old version once all pending requests are complete."},{"id":"e7c0e97e64c6","q":"What is model warmup in TF Serving?","a":"Model warmup runs the new model on example instances (stored in the assets/extra directory) before starting to serve requests. This ensures everything is properly loaded and avoids long response times for the first requests."},{"id":"554e686c1b0c","q":"What is automatic batching in TF Serving and how do you enable it?","a":"Automatic batching combines multiple requests received within a short period into a batch before using the model. Enable with --enable_batching option. This provides significant performance boosts by leveraging GPU power, trading some latency for greater throughput."},{"id":"6e09cbad5fdc","q":"What are the main steps to create a prediction service on Vertex AI?","a":"1. Create a GCP account and project 2. Enable required APIs (Cloud Storage, Vertex AI) 3. Create a GCS bucket 4. Upload your SavedModel 5. Create a Vertex AI model 6. Create an endpoint 7. Deploy the model to the endpoint with specified machine and GPU types."},{"id":"d93738f2578f","q":"What authentication method should you use in Colab for GCP services?","a":"In Colab, use: from google.colab import auth; auth.authenticate_user(). This uses OAuth 2.0 authentication where you confirm access to your Google credentials and GCP resources."},{"id":"e259ad9e82e5","q":"What is the difference between user authentication and service account authentication in GCP?","a":"User authentication (OAuth 2.0) is for applications accessing user's personal data. Service account authentication is for applications accessing GCP services on their own behalf, not on behalf of users. Service accounts are preferred for production applications."},{"id":"b8d008caaefd","q":"How do you run batch predictions on Vertex AI?","a":"Create a JSON Lines file with input instances, upload to GCS, then call model.batch_predict() specifying the input file path, output directory, and machine specifications. Results are saved as JSON Lines files in GCS."},{"id":"39c9c3147a89","q":"What are the main objectives of TensorFlow Lite (TFLite)?","a":"1. Reduce model size to shorten download time and reduce RAM usage 2. Reduce computations needed for each prediction to reduce latency, battery usage, and heating 3. Adapt the model to device-specific constraints."},{"id":"3dcdea63d80e","q":"How does TFLite's model converter optimize models?","a":"It compresses models to FlatBuffer format, prunes unnecessary operations (like training ops), optimizes computations (e.g., 3×a + 4×a + 5×a → 12×a), and fuses operations when possible (e.g., folding batch normalization into previous layer operations)."},{"id":"fdc638441f76","q":"What is post-training quantization in TFLite?","a":"Post-training quantization converts 32-bit float weights to 8-bit integers using symmetrical quantization. It finds the maximum absolute weight value (m) and maps the range -m to +m to -127 to +127, reducing model size by 4x."},{"id":"341ae5bb9dc9","q":"What is quantization-aware training and when do you need it?","a":"Quantization-aware training adds fake quantization operations during training so the model learns to ignore quantization noise. It's needed when post-training quantization causes too much accuracy loss, making the final weights more robust to quantization."},{"id":"0ed2d3f71c4b","q":"What scenarios benefit from running ML models in web browsers using TensorFlow.js?","a":"1. Intermittent/slow connectivity situations 2. Need for fastest possible response times 3. Privacy protection by keeping private data on client side. TensorFlow.js can load TFLite models and supports more GPU cards than regular TensorFlow through WebGL."},{"id":"4f1dc2411428","q":"What is a Progressive Web App (PWA) and how does it relate to ML deployment?","a":"A PWA is a website that meets criteria allowing it to be viewed in any browser and installed as a standalone app on mobile devices. It can work offline using service workers and allows managing a single code base for web and mobile ML applications."},{"id":"0146ada7acfb","q":"How does TensorFlow automatically detect and use GPUs?","a":"TensorFlow automatically detects available GPUs and places operations there by default. You can check with tf.config.list_physical_devices('GPU'). Variables/operations without GPU kernels fall back to CPU."},{"id":"234a2630660d","q":"What GPU software components are needed for TensorFlow?","a":"1. CUDA Toolkit - allows using CUDA-enabled GPUs for general computations 2. cuDNN - GPU-accelerated library for common DNN operations like convolutions and pooling. TensorFlow uses these to control GPU cards and accelerate computations."},{"id":"095ade31c7df","q":"What are the main approaches to managing GPU RAM in TensorFlow?","a":"1. Split GPUs between processes using CUDA_VISIBLE_DEVICES 2. Set specific memory limits with tf.config.set_logical_device_configuration() 3. Enable memory growth with tf.config.experimental.set_memory_growth() 4. Split one GPU into multiple logical devices."},{"id":"b6750a89fa98","q":"How does TensorFlow decide device placement for operations and variables?","a":"By default, all variables and operations go to the first GPU (/gpu:0), except those without GPU kernels which go to CPU (/cpu:0). You can manually place operations using tf.device('/cpu:0') context."},{"id":"a6fa870b1674","q":"How does TensorFlow execute operations across multiple devices in parallel?","a":"TensorFlow analyzes the computation graph, finds operations with zero dependencies, adds them to device evaluation queues, and decrements dependency counters as operations complete. Operations run in parallel across devices with CPU using inter-op and intra-op thread pools."},{"id":"1eb59c619973","q":"What is the difference between model parallelism and data parallelism?","a":"Model parallelism: The model is split across devices (challenging, limited effectiveness for most architectures). Data parallelism: The model is replicated across devices, each trained on different data subsets, then gradients are averaged (generally recommended)."},{"id":"ed088e22094c","q":"What is the mirrored strategy in data parallelism?","a":"The mirrored strategy completely mirrors all model parameters across all GPUs and applies identical parameter updates on every GPU, keeping all replicas perfectly identical. It's efficient especially on single machines and uses AllReduce algorithms for gradient averaging."},{"id":"f711f7f8b5ea","q":"What are the pros and cons of synchronous vs asynchronous parameter updates?","a":"Synchronous: All workers wait for slowest worker, but consistent updates. Asynchronous: No waiting, better bandwidth usage, but can have stale gradients that slow convergence or cause wobble effects. Synchronous with spare replicas often works better."},{"id":"cd47ccba8fb0","q":"What are stale gradients and how can you reduce their effects?","a":"Stale gradients occur when parameters have been updated several times by other replicas before current gradients are applied. Solutions: reduce learning rate, drop/scale stale gradients, adjust mini-batch size, use warmup phase with single replica initially."},{"id":"ec777d9e8d58","q":"How do you use the Distribution Strategies API for multi-GPU training?","a":"Create strategy = tf.distribute.MirroredStrategy(), then use 'with strategy.scope():' to wrap model creation and compilation. Call model.fit() normally - Keras automatically handles distribution, splitting batches across replicas."},{"id":"23a59cf93f96","q":"What is a TensorFlow cluster and what are the different task types?","a":"A TensorFlow cluster is a group of TF processes running in parallel. Task types: 'worker' (performs computations), 'chief' (worker + extra duties like logging), 'ps' (parameter server for variables), 'evaluator' (handles evaluation)."},{"id":"55b02193e92c","q":"How do you configure and start a TensorFlow cluster?","a":"Define cluster specification with task addresses, set TF_CONFIG environment variable with cluster spec and current task info (type/index), then run the same training script on all workers using MultiWorkerMirroredStrategy."},{"id":"553bc1b4eea8","q":"What are the key considerations for training large models on Vertex AI?","a":"Save models/checkpoints/logs to GCS using AIP_MODEL_DIR, AIP_CHECKPOINT_DIR, AIP_TENSORBOARD_LOG_DIR environment variables. Identify chief using resolved.task_type == 'chief'. Ensure training data is accessible from VMs (GCS, BigQuery, web)."},{"id":"23dba7569196","q":"How do you create and run a custom training job on Vertex AI?","a":"Create CustomTrainingJob specifying script path, Docker images for training/serving, Python requirements, and staging bucket. Then call run() with machine type, replica count, and accelerator specifications."},{"id":"730a6eb4db2e","q":"How does Vertex AI's hyperparameter tuning service work?","a":"Uses Bayesian optimization to find optimal hyperparameter combinations. Your script accepts hyperparameters as command-line arguments, reports performance using the hypertune library, and Vertex AI runs multiple trials with different values based on previous results."},{"id":"bd2654d06179","q":"What are the main components needed for hyperparameter tuning on Vertex AI?","a":"1. Training script that accepts hyperparameters as arguments 2. Performance reporting using hypertune.report_hyperparameter_tuning_metric() 3. CustomJob template defining machine specs 4. HyperparameterTuningJob defining search space and trial limits."},{"id":"35116a4c0290","q":"How can you use Keras Tuner for distributed hyperparameter search?","a":"Set three environment variables on each machine: KERASTUNER_TUNER_ID (chief/worker ID), KERASTUNER_ORACLE_IP (chief's IP), KERASTUNER_ORACLE_PORT (communication port). Run the same Keras Tuner script on all machines."},{"id":"483582ebe60b","q":"What causes bandwidth saturation in distributed training?","a":"Communicating model parameters and gradients between devices/servers. Time spent moving data can outweigh computation speedup. More severe for large dense models, less severe for sparse models where gradients are mostly zeros."},{"id":"b60319e528c4","q":"What is pipeline parallelism and how does PipeDream work?","a":"Pipeline parallelism combines model and data parallelism by splitting the model into consecutive stages on different machines. Each stage alternates forward propagation and backpropagation in an asynchronous pipeline, achieving over 90% reduction in network communications."},{"id":"4ae717c65230","q":"What is weight stashing in PipeDream?","a":"Weight stashing involves each stage saving weights during forward propagation and restoring them during backpropagation. This ensures the same weights are used for both forward and backward passes, mitigating issues with stale gradients across pipeline stages."},{"id":"8dc5a791c8a3","q":"What are some general strategies to reduce bandwidth saturation in distributed training?","a":"Use few powerful GPUs rather than many weak ones, group GPUs on well-interconnected servers, reduce precision from 32-bit to 16-bit floats, shard parameters across multiple parameter servers, and prefer sparse models over dense ones when possible."}]}]}]}</script>
<script>
(function () {
  "use strict";

  const DATA = JSON.parse(document.getElementById("flashcard-data").textContent);
  const STORAGE_KEY = "flashcard-progress-v1";
  const app = document.getElementById("app");

  // ---------- progress (localStorage) ----------
  function loadProgress() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : {};
    } catch (_) { return {}; }
  }
  function saveProgress(p) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); } catch (_) {}
  }
  let progress = loadProgress();

  function isDone(cardId) { return progress[cardId] === true; }
  function setDone(cardId, done) {
    if (done) progress[cardId] = true;
    else delete progress[cardId];
    saveProgress(progress);
  }
  function chapterStats(ch) {
    let done = 0;
    for (const c of ch.cards) if (isDone(c.id)) done++;
    return { total: ch.cards.length, done };
  }
  function bookStats(b) {
    let total = 0, done = 0;
    for (const ch of b.chapters) {
      const s = chapterStats(ch);
      total += s.total; done += s.done;
    }
    return { total, done };
  }

  // ---------- view state ----------
  const state = { view: "books", bookIdx: 0, chapterIdx: 0, cardIdx: 0, flipped: false, justFinished: false };

  function go(view, opts) {
    state.view = view;
    if (opts) Object.assign(state, opts);
    state.flipped = false;
    state.justFinished = false;
    render();
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  // ---------- helpers ----------
  function el(tag, attrs, children) {
    const e = document.createElement(tag);
    if (attrs) {
      for (const k in attrs) {
        const v = attrs[k];
        if (v == null) continue;
        if (k === "class") e.className = v;
        else if (k === "onclick") e.addEventListener("click", v);
        else if (k === "html") e.innerHTML = v;
        else e.setAttribute(k, v);
      }
    }
    if (children) {
      for (const c of children) {
        if (c == null) continue;
        e.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
      }
    }
    return e;
  }
  function pct(done, total) { return total === 0 ? 0 : Math.round((done / total) * 100); }

  function progressBlock(done, total) {
    const p = pct(done, total);
    return el("div", null, [
      el("div", { class: "meta-row" }, [
        el("span", { class: "label" }, ["Cards"]),
        el("span", null, [String(total)]),
      ]),
      el("div", { class: "meta-row" }, [
        el("span", { class: "label" }, ["Done"]),
        el("span", { class: "done" }, [String(done)]),
      ]),
      el("div", { class: "progress-track" }, [
        el("div", { class: "progress-bar", style: "width:" + p + "%" }),
      ]),
      el("div", { class: "progress-pct" }, [p + "% complete"]),
    ]);
  }

  // ---------- views ----------
  function renderBooks() {
    const grid = el("div", { class: "grid" });
    DATA.books.forEach(function (b, i) {
      const s = bookStats(b);
      const tile = el("div", { class: "card-tile", onclick: function () { go("chapters", { bookIdx: i }); } }, [
        el("h3", null, [b.title]),
        el("p", { class: "desc" }, [b.description]),
        progressBlock(s.done, s.total),
      ]);
      grid.appendChild(tile);
    });
    return el("div", null, [
      el("div", { class: "crumb-bar" }, [
        el("div", null, [
          el("h2", null, ["Choose a book"]),
          el("p", null, [DATA.books.length + " books — pick one to start"]),
        ]),
      ]),
      grid,
    ]);
  }

  function renderChapters() {
    const book = DATA.books[state.bookIdx];
    const grid = el("div", { class: "grid" });
    book.chapters.forEach(function (ch, i) {
      const s = chapterStats(ch);
      const headerKids = [ch.title];
      if (s.total > 0 && s.done === s.total) headerKids.push(el("span", { class: "completed-dot", title: "Completed" }));
      const tile = el("div", { class: "card-tile", onclick: function () { go("cards", { chapterIdx: i, cardIdx: 0 }); } }, [
        el("h3", null, headerKids),
        ch.summary ? el("p", { class: "tile-summary" }, [ch.summary]) : null,
        progressBlock(s.done, s.total),
      ]);
      grid.appendChild(tile);
    });
    return el("div", null, [
      el("div", { class: "crumb-bar" }, [
        el("div", null, [
          el("h2", null, [book.title]),
          el("p", null, ["Choose a chapter"]),
        ]),
        el("button", { class: "btn", onclick: function () { go("books"); } }, ["← Books"]),
      ]),
      grid,
    ]);
  }

  function renderCards() {
    const book = DATA.books[state.bookIdx];
    const ch = book.chapters[state.chapterIdx];
    if (!ch.cards.length) {
      return el("div", { class: "crumb-bar" }, [el("p", null, ["This chapter has no cards yet."])]);
    }
    const idx = state.cardIdx;
    const card = ch.cards[idx];
    const total = ch.cards.length;
    const stats = chapterStats(ch);

    const flashcard = el("div", { class: "flashcard" + (state.flipped ? " flipped" : "") }, [
      el("div", { class: "face face-front" }, [
        el("div", { class: "pill" }, ["?"]),
        el("div", { class: "label-tag" }, ["Question"]),
        el("p", { class: "body-text" }, [card.q]),
        el("p", { class: "hint" }, ["Click to reveal answer"]),
      ]),
      el("div", { class: "face face-back" }, [
        el("div", { class: "pill" }, ["✓"]),
        el("div", { class: "label-tag" }, ["Answer"]),
        el("p", { class: "body-text" }, [card.a]),
        el("p", { class: "hint" }, ["Click to flip back"]),
      ]),
    ]);
    flashcard.addEventListener("click", function () {
      state.flipped = !state.flipped;
      flashcard.classList.toggle("flipped");
    });

    function next() {
      // Auto-mark current card as complete and advance.
      setDone(card.id, true);
      if (idx < total - 1) {
        state.cardIdx = idx + 1; state.flipped = false; state.justFinished = false;
      } else {
        state.justFinished = true;
      }
      render();
    }
    function prev() {
      if (idx > 0) {
        state.cardIdx = idx - 1; state.flipped = false; state.justFinished = false;
        render();
      }
    }
    function resetChapter() {
      if (!confirm("Reset progress for this chapter?")) return;
      for (const c of ch.cards) setDone(c.id, false);
      state.cardIdx = 0; state.flipped = false; state.justFinished = false;
      render();
    }

    const isLast = idx === total - 1;
    const allDone = stats.done === total;
    const cardDone = isDone(card.id);

    const controls = el("div", { class: "deck-controls" }, [
      el("button", { class: "btn", onclick: function () { go("chapters"); } }, ["← Chapters"]),
      el("button", { class: "btn", onclick: prev, disabled: idx === 0 ? "" : null }, ["← Previous"]),
      el("button", { class: "btn", onclick: resetChapter }, ["↻ Reset"]),
      el("button", { class: "btn btn-green", onclick: next }, [isLast ? "✓ Finish" : "✓ Got it →"]),
    ]);

    const completion = (state.justFinished && allDone)
      ? el("div", { class: "completion" }, [
          el("div", { class: "emoji" }, ["🎉"]),
          el("h3", null, ["Chapter complete!"]),
          el("p", null, ["You've marked every card in this chapter."]),
          el("button", { class: "btn", onclick: function () { go("chapters"); } }, ["Back to chapters"]),
        ])
      : null;

    const learnPanel = ch.summary
      ? el("details", { class: "learn-panel", open: "" }, [
          el("summary", null, ["📖 About this chapter"]),
          el("p", { class: "panel-summary" }, [ch.summary]),
        ])
      : null;

    const p = pct(stats.done, total);
    return el("div", null, [
      el("div", { class: "crumb-bar" }, [
        el("div", null, [
          el("h2", null, [ch.title]),
          el("p", null, [book.title]),
        ]),
        el("button", { class: "btn", onclick: function () { go("chapters"); } }, ["← Chapters"]),
      ]),
      learnPanel,
      el("div", { class: "deck-progress" }, [
        el("div", { class: "deck-progress-head" }, [
          el("span", null, ["Card " + (idx + 1) + " of " + total + (cardDone ? " ✓" : "")]),
          el("span", { class: "right" }, [stats.done + " / " + total + " completed (" + p + "%)"]),
        ]),
        el("div", { class: "progress-track" }, [
          el("div", { class: "progress-bar", style: "width:" + p + "%" }),
        ]),
      ]),
      el("div", { class: "flashcard-wrap" }, [
        el("div", {
          class: "card-status-dot" + (cardDone ? " done" : ""),
          title: cardDone ? "Marked complete" : "Not yet marked",
        }),
        flashcard,
      ]),
      controls,
      completion,
    ]);
  }

  function render() {
    app.innerHTML = "";
    let view;
    if (state.view === "books") view = renderBooks();
    else if (state.view === "chapters") view = renderChapters();
    else view = renderCards();
    app.appendChild(view);
  }

  // ---------- keyboard nav ----------
  document.addEventListener("keydown", function (e) {
    if (state.view !== "cards") return;
    if (e.target && (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA")) return;
    const book = DATA.books[state.bookIdx];
    const ch = book.chapters[state.chapterIdx];
    const card = ch.cards[state.cardIdx];
    if (e.key === "ArrowRight") {
      // Auto-mark complete and advance (matches Next button).
      setDone(card.id, true);
      if (state.cardIdx < ch.cards.length - 1) {
        state.cardIdx++; state.flipped = false; state.justFinished = false;
      } else {
        state.justFinished = true;
      }
      render();
    } else if (e.key === "ArrowLeft") {
      if (state.cardIdx > 0) {
        state.cardIdx--; state.flipped = false; state.justFinished = false;
        render();
      }
    } else if (e.key === " " || e.key === "Enter") {
      e.preventDefault();
      state.flipped = !state.flipped;
      render();
    }
  });

  render();
})();
</script>
</body>
</html>
