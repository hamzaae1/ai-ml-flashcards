y vote. In regression, each leaf node predicts a continuous value that is the average of target values of training instances in that node."},{"id":"8967247fa045","q":"Why might entropy and Gini impurity produce different trees?","a":"Gini impurity tends to isolate the most frequent class in its own branch, while entropy tends to produce slightly more balanced trees."}]},{"id":"b2c6","title":"Ensemble Learning and Random Forests","summary":"Learn bagging, boosting, random forests, AdaBoost, gradient boosting, ensemble systems, and variance reduction techniques.","cards":[{"id":"cf3de0ed77cc","q":"What is the wisdom of the crowd and how does it relate to ensemble learning?","a":"The wisdom of the crowd is the phenomenon where aggregating answers from thousands of random people often produces better results than an expert's answer. Similarly, if you aggregate predictions of a group of predictors (classifiers or regressors), you often get better predictions than with the best individual predictor. A group of predictors is called an ensemble, and this technique is called ensemble learning."},{"id":"7b63eb789384","q":"What is a random forest and how does it work?","a":"A random forest is an ensemble of decision trees, where you train a group of decision tree classifiers each on a different random subset of the training set. You then obtain predictions of all individual trees, and the class that gets the most votes is the ensemble's prediction. Despite its simplicity, this is one of the most powerful machine learning algorithms available today."},{"id":"1aff8c4ead48","q":"What is a hard voting classifier?","a":"A hard voting classifier is a majority-vote classifier that aggregates the predictions of each classifier in an ensemble. The class that gets the most votes becomes the ensemble's prediction. This simple approach can often achieve higher accuracy than the best individual classifier in the ensemble."},{"id":"81ee87702b67","q":"Under what conditions can ensemble methods work effectively?","a":"Ensemble methods work effectively when predictors are as independent from one another as possible. Even if each classifier is a weak learner (doing only slightly better than random guessing), the ensemble can still be a strong learner (achieving high accuracy), provided there are sufficient numbers of weak learners and they are sufficiently diverse."},{"id":"bf77f528fb2b","q":"What is the law of large numbers analogy for ensemble learning?","a":"The law of large numbers analogy uses a biased coin with 51% chance of heads. If you toss it 1,000 times, you'll generally get about 510 heads and 490 tails (majority heads) with about 75% probability. Similarly, with 1,000 classifiers that are individually 51% accurate, you can hope for up to 75% ensemble accuracy through majority voting."},{"id":"0de763a56d92","q":"What is soft voting and when is it used?","a":"Soft voting predicts the class with the highest class probability, averaged over all individual classifiers. It's used when all classifiers can estimate class probabilities (have a predict_proba() method). Soft voting often achieves higher performance than hard voting because it gives more weight to highly confident votes."},{"id":"c9bbc1a3dce7","q":"What is the difference between bagging and pasting?","a":"Both bagging and pasting train multiple predictors on different random subsets of the training set. The difference is in sampling: bagging performs sampling with replacement (bootstrap aggregating), while pasting performs sampling without replacement. Only bagging allows training instances to be sampled several times for the same predictor."},{"id":"4e2f5b4f4acb","q":"How do bagging and pasting affect bias and variance?","a":"Each individual predictor has higher bias than if trained on the original training set, but aggregation reduces both bias and variance. Generally, the ensemble has similar bias but lower variance than a single predictor trained on the original training set. Bagging introduces more diversity, resulting in slightly higher bias but lower variance compared to pasting."},{"id":"7a5cb72b685f","q":"What is out-of-bag (OOB) evaluation?","a":"With bagging, about 63% of training instances are sampled on average for each predictor, leaving 37% as out-of-bag instances. A bagging ensemble can be evaluated using these OOB instances without needing a separate validation set. Each instance becomes an OOB instance for several estimators, allowing fair ensemble predictions for evaluation."},{"id":"b4beed09b54e","q":"What are random patches and random subspaces methods?","a":"Random patches method samples both training instances and features for each predictor. Random subspaces method keeps all training instances but samples features (by setting bootstrap=False, max_samples=1.0, but bootstrap_features=True and/or max_features<1.0). Both techniques are useful for high-dimensional inputs and increase predictor diversity."},{"id":"f412f0b9fe79","q":"How does RandomForestClassifier differ from using BaggingClassifier with decision trees?","a":"RandomForestClassifier is more convenient and optimized for decision trees. It introduces extra randomness by searching for the best feature among a random subset of features when splitting nodes (by default √n features), rather than searching among all features. This increases tree diversity, trading higher bias for lower variance."},{"id":"2f0a2462615e","q":"What are extra-trees (extremely randomized trees)?","a":"Extra-trees use random thresholds for each feature rather than searching for the best possible thresholds. You create them by setting splitter='random' in DecisionTreeClassifier. This trades more bias for lower variance and makes training much faster since finding optimal thresholds is time-consuming."},{"id":"4787b174e491","q":"How do random forests measure feature importance?","a":"Random forests measure feature importance by looking at how much tree nodes using each feature reduce impurity on average across all trees. It's a weighted average where each node's weight equals the number of training samples associated with it. Scikit-Learn scales results so all importances sum to 1."},{"id":"3c3d6bd627d8","q":"What is boosting and how does it work?","a":"Boosting refers to ensemble methods that combine several weak learners into a strong learner. The general idea is to train predictors sequentially, with each trying to correct its predecessor. The most popular methods are AdaBoost (adaptive boosting) and gradient boosting."},{"id":"43f1a219ee63","q":"How does AdaBoost work?","a":"AdaBoost trains a base classifier and increases the relative weight of misclassified training instances. It then trains a second classifier using updated weights, makes predictions, updates weights again, and repeats. Each predictor focuses more on the hard cases that previous predictors got wrong."},{"id":"e94295a4995b","q":"What are the key equations in AdaBoost?","a":"Weighted error rate: rⱼ = Σ w⁽ⁱ⁾ for instances where ŷⱼ⁽ⁱ⁾ ≠ y⁽ⁱ⁾, divided by m. Predictor weight: αⱼ = η log((1-rⱼ)/rⱼ). Weight update: multiply w⁽ⁱ⁾ by exp(αⱼ) for misclassified instances. Final prediction uses weighted majority vote of all predictors."},{"id":"935024b622c8","q":"What is the main drawback of AdaBoost compared to bagging?","a":"AdaBoost cannot be parallelized since each predictor can only be trained after the previous predictor has been trained and evaluated. This sequential learning technique doesn't scale as well as bagging or pasting, which can train predictors in parallel."},{"id":"5c79bdb608c7","q":"How does gradient boosting differ from AdaBoost?","a":"Instead of tweaking instance weights at every iteration like AdaBoost, gradient boosting tries to fit new predictors to the residual errors made by the previous predictor. Each new predictor is trained on the errors of the ensemble so far."},{"id":"7f8f98303e3d","q":"What is the gradient boosting training process?","a":"1) Train first predictor on original dataset 2) Train second predictor on residual errors from first predictor 3) Train third predictor on residual errors from second predictor 4) Continue this process 5) Make predictions by adding up predictions from all predictors in the ensemble."},{"id":"84bd16b1ec50","q":"What is the learning_rate hyperparameter in gradient boosting?","a":"The learning_rate hyperparameter scales the contribution of each tree. Setting it to a low value (like 0.05) requires more trees but predictions usually generalize better. This is a regularization technique called shrinkage that helps prevent overfitting."},{"id":"2ed22ca8368b","q":"What is early stopping in gradient boosting?","a":"Early stopping automatically stops adding trees when the last n trees (set by n_iter_no_change) didn't improve performance. The method splits training data into training and validation sets to evaluate performance after each tree. This prevents overfitting and reduces training time."},{"id":"b19055e16223","q":"What is histogram-based gradient boosting (HGB)?","a":"HGB is optimized for large datasets by binning input features and replacing them with integers (max 255 bins). This reduces possible thresholds to evaluate, uses faster integer operations, and eliminates need for sorting features. Computational complexity becomes O(b×m) instead of O(n×m×log(m))."},{"id":"b08f2b984976","q":"What are the key differences of HGB classes from regular gradient boosting?","a":"1) Early stopping automatically activated for >10,000 instances 2) No subsampling support 3) n_estimators renamed to max_iter 4) Only max_leaf_nodes, min_samples_leaf, max_depth can be tweaked 5) Support for categorical features and missing values 6) Much faster training on large datasets."},{"id":"8717ffd41080","q":"What is stacking and how does it work?","a":"Stacking (stacked generalization) trains a model to perform aggregation instead of using trivial functions like hard voting. A blender (meta learner) takes predictions from base predictors as inputs and makes the final prediction. The blender is trained using cross-validation predictions from base predictors."},{"id":"42de0f42435d","q":"How do you train a blender in stacking?","a":"1) Use cross_val_predict() on each predictor to get out-of-sample predictions for the training set 2) Use these predictions as input features for the blending training set 3) Copy targets from original training set 4) Train the blender on this blending set 5) Retrain base predictors on full original training set."},{"id":"f562c4fe8284","q":"What does StackingClassifier do by default for predictions?","a":"For each predictor, StackingClassifier calls predict_proba() if available; if not, it falls back to decision_function(), or as last resort calls predict(). If no final estimator is provided, it uses LogisticRegression for classification and RidgeCV for regression."},{"id":"fc40112aa10b","q":"How does the VotingClassifier work with different estimator types?","a":"VotingClassifier clones every estimator and fits the clones. Original estimators are in the estimators attribute, fitted clones in estimators_. For hard voting, it performs majority vote. For soft voting (voting='soft'), it averages class probabilities if all estimators have predict_proba() method."},{"id":"a2e08d3246b5","q":"What is the computational advantage of bagging and pasting?","a":"Predictors can all be trained in parallel via different CPU cores or servers. Similarly, predictions can be made in parallel. This scalability is one of the main reasons bagging and pasting are popular methods - they scale very well with available computing resources."},{"id":"72ac6feec1ed","q":"What hyperparameters control BaggingClassifier behavior?","a":"n_estimators (number of predictors), max_samples (instances per predictor), bootstrap (True for bagging, False for pasting), n_jobs (CPU cores to use, -1 for all), max_features and bootstrap_features (for feature sampling), and oob_score (for out-of-bag evaluation)."},{"id":"84b73da718b0","q":"When does BaggingClassifier automatically perform soft voting?","a":"BaggingClassifier automatically performs soft voting instead of hard voting if the base classifier can estimate class probabilities (i.e., if it has a predict_proba() method). This is the case with decision tree classifiers."},{"id":"1322706f77e0","q":"What is a decision stump in AdaBoost?","a":"A decision stump is a decision tree with max_depth=1 - a tree composed of a single decision node plus two leaf nodes. This is the default base estimator for the AdaBoostClassifier class, providing simple weak learners that can be combined into a strong ensemble."},{"id":"39037d7af02a","q":"What is stochastic gradient boosting?","a":"Stochastic gradient boosting uses the subsample hyperparameter to specify the fraction of training instances for each tree. For example, subsample=0.25 means each tree trains on 25% of instances selected randomly. This trades higher bias for lower variance and speeds up training considerably."},{"id":"f21e8bc71abd","q":"How do you prevent overfitting in AdaBoost?","a":"If AdaBoost ensemble is overfitting, you can try reducing the number of estimators (n_estimators) or more strongly regularizing the base estimator (e.g., increasing max_depth, min_samples_split, or other regularization parameters of the base classifier)."},{"id":"3e2f664273b8","q":"How do you handle overfitting vs underfitting in gradient boosting?","a":"If gradient boosting overfits, decrease the learning rate (requires more trees but better generalization). If it underfits, you can increase learning rate, add more estimators, or reduce regularization. The learning rate and number of estimators typically need to be balanced."},{"id":"ffb29c51028b","q":"What are the advantages and disadvantages of ensemble methods?","a":"Advantages: Often achieve better performance than individual predictors, can turn weak learners into strong learners, reduce overfitting through variance reduction. Disadvantages: More complex, longer training time (especially for sequential methods like boosting), require more computational resources, less interpretable than single models."},{"id":"91797690d494","q":"What makes ensemble methods particularly effective for tabular data?","a":"Ensemble methods like random forests, AdaBoost, and gradient boosting require very little preprocessing and are particularly effective with heterogeneous tabular data. They're great for getting prototypes running quickly since they handle mixed data types well and don't require extensive feature engineering."},{"id":"dffa59d6c285","q":"What is SAMME in scikit-learn's AdaBoost implementation?","a":"SAMME (Stagewise Additive Modeling using a Multiclass Exponential loss function) is scikit-learn's multiclass version of AdaBoost. When there are just two classes, SAMME is equivalent to AdaBoost. SAMME.R is a variant that relies on class probabilities rather than predictions and generally performs better."},{"id":"c8661fb6dbe2","q":"Can you create multilayer stacking ensembles?","a":"Yes, you can train several different blenders (e.g., one using linear regression, another using random forest) to get a whole layer of blenders, then add another blender on top to produce the final prediction. This may squeeze out more performance but costs training time and system complexity."},{"id":"6a67785cdc2b","q":"What is the key principle for successful ensemble learning?","a":"The key principle is diversity among predictors. Ensemble methods work best when predictors are as independent as possible, making different types of errors. One way to achieve this is training them using very different algorithms, which increases the chance they'll make different types of errors."},{"id":"dbd49668c00e","q":"How do you determine the optimal number of trees in gradient boosting?","a":"You can use cross-validation with GridSearchCV or RandomizedSearchCV, or use early stopping by setting n_iter_no_change to stop when the last n trees don't improve performance. Early stopping automatically splits training data into train/validation sets to monitor performance."},{"id":"2bfbb7a99a30","q":"What alternative gradient boosting libraries are mentioned?","a":"XGBoost, CatBoost, and LightGBM are mentioned as specialized gradient boosting libraries with APIs similar to scikit-learn. They provide additional features including GPU acceleration. TensorFlow Random Forests library also provides optimized implementations of various random forest algorithms including GBRT."}]},{"id":"b2c7","title":"Dimensionality Reduction","summary":"Learn PCA, manifold learning, t-SNE, feature compression, latent spaces, and visualization of high-dimensional data.","cards":[{"id":"8a713f67b11f","q":"What is the curse of dimensionality and why is it a problem in machine learning?","a":"The curse of dimensionality refers to the problems that arise when dealing with thousands or millions of features. It makes training extremely slow and harder to find good solutions. High-dimensional datasets are at risk of being very sparse - most training instances are likely to be far away from each other, making predictions less reliable since they're based on larger extrapolations."},{"id":"1f7c74c347a4","q":"What happens to the probability of a random point being near the border as dimensions increase?","a":"In a unit square (2D), a random point has only about 0.4% chance of being within 0.001 of a border. But in a 10,000-dimensional unit hypercube, this probability is greater than 99.999999%. Most points in high-dimensional space are very close to the border."},{"id":"66b9eed0ce24","q":"How does distance between random points change with dimensionality?","a":"In a unit square, the average distance between two random points is roughly 0.52. In a 3D unit cube, it's roughly 0.66. But in a 1,000,000-dimensional unit hypercube, the average distance is about 408.25 (roughly √1,000,000/6). This counterintuitive result shows there's plenty of space in high dimensions."},{"id":"6265d142cbb6","q":"What are the two main approaches to dimensionality reduction?","a":"The two main approaches are: 1) Projection - projecting training instances onto a lower-dimensional subspace, and 2) Manifold learning - modeling the manifold on which training instances lie, which can handle twisted and curved subspaces that simple projection cannot."},{"id":"1929cd9376d8","q":"What is the manifold assumption (manifold hypothesis)?","a":"The manifold assumption holds that most real-world high-dimensional datasets lie close to a much lower-dimensional manifold. This assumption is often empirically observed and is accompanied by the assumption that tasks will be simpler when expressed in the lower-dimensional space of the manifold."},{"id":"f8c0b459dcd0","q":"What is Principal Component Analysis (PCA) and how does it work?","a":"PCA is the most popular dimensionality reduction algorithm. It identifies the hyperplane that lies closest to the data, then projects the data onto it. It works by finding axes that account for the largest amounts of variance in the training set, called principal components."},{"id":"4d5f496df9e0","q":"How does PCA determine principal components?","a":"PCA uses singular value decomposition (SVD) to decompose the training set matrix X into U Σ V^T, where V contains the unit vectors that define all principal components. The first principal component accounts for the largest variance, the second for the largest remaining variance, and so on."},{"id":"1c490c5f889e","q":"What is the explained variance ratio in PCA?","a":"The explained variance ratio indicates the proportion of the dataset's variance that lies along each principal component. It's available via the explained_variance_ratio_ attribute and helps determine how many components to keep - typically you want to preserve 95% of the variance."},{"id":"06ff56e1860c","q":"How can you choose the right number of dimensions for PCA?","a":"Instead of arbitrarily choosing dimensions, you can: 1) Set n_components to a float between 0.0 and 1.0 (e.g., 0.95 for 95% variance), 2) Plot explained variance vs. dimensions and look for an elbow, or 3) Use hyperparameter tuning to find the optimal number for your specific task."},{"id":"7acd34159a0f","q":"What is the difference between regular PCA, randomized PCA, and incremental PCA?","a":"Regular PCA uses full SVD with O(m × n²) + O(n³) complexity. Randomized PCA uses a stochastic algorithm with O(m × d²) + O(d³) complexity, much faster when d << n. Incremental PCA processes data in mini-batches, useful for large datasets that don't fit in memory."},{"id":"b6501603614e","q":"How does PCA compression work and what is reconstruction error?","a":"After reducing dimensions, you can decompress using inverse_transform(). This won't give back original data since some information is lost (in the dropped variance), but will be close. The mean squared distance between original and reconstructed data is called the reconstruction error."},{"id":"6f072dd4b80c","q":"What is random projection and when is it useful?","a":"Random projection projects data to lower-dimensional space using a random linear projection. It's useful for very high-dimensional datasets (tens of thousands of features) where PCA becomes too slow. It preserves distances fairly well according to the Johnson-Lindenstrauss lemma."},{"id":"5387bb2db1a9","q":"What is the Johnson-Lindenstrauss lemma and its practical application?","a":"The lemma provides an equation to determine minimum dimensions needed to preserve distances within a tolerance ε: d ≥ 4 log(m) / (½ ε² - ⅓ ε³). For example, with m=5,000 instances and ε=10%, you need at least 7,300 dimensions. Scikit-learn implements this in johnson_lindenstrauss_min_dim()."},{"id":"86e489c7db33","q":"What are the advantages of SparseRandomProjection over GaussianRandomProjection?","a":"SparseRandomProjection uses much less memory (about 25 MB vs 1.2 GB in examples), is faster to generate and transform (~50% faster), keeps sparse input sparse, but maintains the same distance-preserving properties and comparable quality. It's usually preferable for large or sparse datasets."},{"id":"1dd388fd5f7d","q":"What is Locally Linear Embedding (LLE) and how does it work?","a":"LLE is a nonlinear dimensionality reduction technique that works by: 1) Measuring how each instance linearly relates to its k-nearest neighbors, 2) Finding weights that reconstruct each instance from its neighbors, then 3) Finding a low-dimensional representation that preserves these local relationships."},{"id":"80a841781d1c","q":"What are the two optimization steps in LLE?","a":"Step 1: Find weights w_i,j that minimize the squared distance between each instance x^(i) and its linear reconstruction from k-nearest neighbors, with constraints that weights sum to 1 and are 0 for non-neighbors. Step 2: Find low-dimensional positions z^(i) that minimize reconstruction error using the fixed weights from step 1."},{"id":"c88891062f24","q":"What is the computational complexity of LLE?","a":"LLE has complexity O(m log(m)n log(k)) for finding k-nearest neighbors, O(mnk³) for optimizing weights, and O(dm²) for constructing low-dimensional representations. The m² term makes it scale poorly to very large datasets."},{"id":"60a70907b12e","q":"What are the key differences between projection techniques and manifold learning?","a":"Projection techniques like PCA work by finding linear subspaces and projecting data onto them. Manifold learning techniques like LLE can handle nonlinear, twisted manifolds by preserving local relationships rather than global linear structure. This makes manifold learning better for complex curved data structures."},{"id":"eeb42596eb9c","q":"What is Multidimensional Scaling (MDS)?","a":"MDS reduces dimensionality while trying to preserve the distances between instances. It works well for low-dimensional data but doesn't work as well as random projection for high-dimensional data. It can preserve global structure better than some other techniques."},{"id":"aaf4cf2c02ad","q":"What is Isomap and how does it differ from other techniques?","a":"Isomap creates a graph by connecting each instance to its nearest neighbors, then reduces dimensionality while trying to preserve geodesic distances (shortest path distances through the graph). This allows it to better handle curved manifolds than linear techniques."},{"id":"9116616cdcde","q":"What is t-SNE and what is it primarily used for?","a":"t-distributed Stochastic Neighbor Embedding (t-SNE) reduces dimensionality while trying to keep similar instances close and dissimilar instances apart. It's mostly used for visualization, particularly to visualize clusters of instances in high-dimensional space."},{"id":"9b5c16772e01","q":"What is Linear Discriminant Analysis (LDA) in the context of dimensionality reduction?","a":"LDA is a linear classification algorithm that learns the most discriminative axes between classes during training. These axes define a hyperplane for projection that keeps classes as far apart as possible. It's good for reducing dimensionality before running another classification algorithm."},{"id":"ebeea24f2d0d","q":"When should you use dimensionality reduction as preprocessing?","a":"You should first try training with original data before using dimensionality reduction. Use it when: 1) Training is extremely slow due to high dimensions, 2) You need data visualization (reduce to 2-3D), 3) Storage/memory is limited, or 4) You're dealing with the curse of dimensionality (sparse, noisy high-dimensional data)."},{"id":"8eacc8abc8bd","q":"What are the main benefits and drawbacks of dimensionality reduction?","a":"Benefits: Speeds up training, enables data visualization, reduces storage space, can filter noise. Drawbacks: Causes information loss, adds pipeline complexity, makes systems harder to maintain, may slightly reduce performance, and can lose interpretability of original features."},{"id":"5261d74c4891","q":"How do you evaluate dimensionality reduction performance?","a":"You can: 1) Use reconstruction error for techniques like PCA, 2) Measure performance of downstream tasks (classification/regression) on reduced data, 3) Use cross-validation to tune the number of components, 4) Visualize results for 2D/3D reductions, or 5) Measure preservation of distances/relationships."},{"id":"fc14fcbae397","q":"Why might the manifold assumption not always hold?","a":"Sometimes the decision boundary may be simpler in the original high-dimensional space than in the reduced manifold space. For example, a decision boundary that's a simple vertical plane in 3D might become a complex collection of line segments when the Swiss roll is unrolled to 2D."},{"id":"bcdee3210c72","q":"What practical considerations should you keep in mind when using PCA?","a":"PCA assumes data is centered around the origin (Scikit-learn handles this automatically). The direction of principal component vectors is not stable - they may flip with slight data changes. For very high-dimensional data, even randomized PCA can be slow, so consider random projection instead."},{"id":"fee2effe9b02","q":"How does incremental PCA handle large datasets?","a":"Incremental PCA splits the training set into mini-batches and processes them one at a time using partial_fit(). You can also use NumPy's memmap to manipulate large arrays stored on disk as if they were in memory, loading only needed data chunks."},{"id":"1cf5795f64ec","q":"What determines when Scikit-learn automatically uses randomized PCA?","a":"By default, Scikit-learn uses randomized PCA when max(m,n) > 500 and n_components is an integer smaller than 80% of min(m,n). Otherwise it uses full SVD. You can force full SVD by setting svd_solver='full' or randomized by setting svd_solver='randomized'."},{"id":"85970fb6662d","q":"How do you create and use a random projection matrix?","a":"Generate a random matrix P of shape [d, n] where each item is sampled from a Gaussian distribution with mean 0 and variance 1/d. Then project data using X_reduced = X @ P.T. Scikit-learn's GaussianRandomProjection automates this process."},{"id":"3dbc3c10050b","q":"What is the density parameter in SparseRandomProjection?","a":"Density is the ratio of nonzero items in the sparse random matrix, defaulting to 1/√n. Each cell has probability r of being nonzero, and nonzero values are either -v or +v (equally likely), where v = 1/√(dr). With 20,000 features, only about 1 in 141 cells are nonzero."},{"id":"2c6cd523fa62","q":"How do you perform inverse transformation with random projection?","a":"First compute the pseudo-inverse of the components matrix using SciPy's pinv() function, then multiply the reduced data by the transpose of the pseudo-inverse: X_recovered = X_reduced @ components_pinv.T. Note that computing pseudo-inverse can be very time-consuming for large matrices."},{"id":"6adb2b027525","q":"Why is LLE particularly good for certain types of data?","a":"LLE is particularly good at unrolling twisted manifolds like the Swiss roll because it preserves local linear relationships rather than trying to find global linear projections. This makes it effective when there's not too much noise and the data has a clear underlying manifold structure."},{"id":"d14b566c813c","q":"What is the relationship between the number of training instances needed and dimensionality?","a":"The number of training instances required to reach a given density grows exponentially with dimensions. With just 100 features ranging 0-1, you'd need more training instances than atoms in the observable universe for instances to be within 0.1 of each other on average."},{"id":"d8c383c5ecd5","q":"How does the Swiss roll example illustrate the difference between projection and manifold learning?","a":"Simple projection (like dropping the x3 coordinate) squashes different layers together and loses the intrinsic 2D structure. Manifold learning techniques like LLE can 'unroll' the Swiss roll, preserving the natural 2D structure while mapping it to a flat 2D space."},{"id":"06bed4d93e2b","q":"What practical advice does the chapter give about using dimensionality reduction?","a":"Try training with original data first before considering dimensionality reduction. It will speed up training but may make your system perform slightly worse and make pipelines more complex. Only use it when the benefits (speed, visualization, storage) outweigh the costs (complexity, information loss)."},{"id":"cc469f070d80","q":"How can you combine PCA with other machine learning algorithms effectively?","a":"Create pipelines that first apply PCA, then your main algorithm (like RandomForestClassifier). Use hyperparameter tuning to find optimal n_components along with other hyperparameters. The optimal number of components depends on your model - powerful models like random forests may need fewer components than linear models."},{"id":"d2a113cadb18","q":"What makes random projection particularly suitable for certain applications?","a":"Random projection is simple, fast, memory-efficient, requires no training (only needs dataset shape), and surprisingly powerful. It's especially good for very high-dimensional datasets where PCA becomes too slow. It's also used in applications like locality sensitive hashing for document similarity."},{"id":"b00cd5d1785a","q":"Does the order of applying different dimensionality reduction techniques matter?","a":"Yes, it can make sense to chain different techniques. For example, you might use random projection first to quickly reduce very high dimensions, then apply PCA or LLE for further reduction. The order and combination depend on your data characteristics and computational constraints."}]},{"id":"b2c8","title":"Unsupervised Learning Techniques","summary":"Learn clustering, anomaly detection, Gaussian mixture models, DBSCAN, expectation-maximization, and unsupervised pattern discovery.","cards":[{"id":"ecaa4b8bd7c1","q":"What is unsupervised learning and why is it important according to Yann LeCun's analogy?","a":"Unsupervised learning works with unlabeled data (input features X without labels y). Yann LeCun said 'if intelligence was a cake, unsupervised learning would be the cake, supervised learning would be the icing on the cake, and reinforcement learning would be the cherry on the cake' - meaning unsupervised learning has huge untapped potential."},{"id":"031e70d3c0b6","q":"What are the three main unsupervised learning tasks covered in this chapter?","a":"1. Clustering - grouping similar instances together into clusters\n2. Anomaly detection (outlier detection) - learning what 'normal' data looks like to detect abnormal instances\n3. Density estimation - estimating the probability density function of the dataset"},{"id":"b708e214c332","q":"How does clustering differ from classification?","a":"In classification, each instance gets assigned to a group and you have labeled data with known classes. In clustering, instances are also assigned to groups, but it's unsupervised - you don't have labels and the algorithm must identify similar instances and group them automatically."},{"id":"9d875762c928","q":"What are the main applications of clustering algorithms?","a":"Customer segmentation, data analysis, dimensionality reduction (using cluster affinities), feature engineering, anomaly detection, semi-supervised learning, search engines (image similarity), and image segmentation."},{"id":"cfcb63d9dab2","q":"How does the k-means algorithm work?","a":"1. Start by placing k centroids randomly\n2. Label instances by assigning each to the closest centroid\n3. Update centroids by computing the mean of instances in each cluster\n4. Repeat steps 2-3 until centroids stop moving\nThe algorithm minimizes the mean squared distance between instances and their closest centroids."},{"id":"557f855dfbbe","q":"What is the computational complexity of k-means?","a":"Generally linear with respect to the number of instances m, clusters k, and dimensions n: O(mkn). However, in worst-case scenarios without clustering structure, complexity can increase exponentially with the number of instances."},{"id":"4deb2f673a25","q":"What is the difference between hard clustering and soft clustering?","a":"Hard clustering assigns each instance to a single cluster (like k-means predict()). Soft clustering gives each instance a score/probability for each cluster (like k-means transform() method which returns distances to all centroids)."},{"id":"c5b607a0f03c","q":"What is inertia in k-means and why can't it be used alone to choose the number of clusters?","a":"Inertia is the sum of squared distances between instances and their closest centroids. It can't be used alone because it keeps getting lower as k increases - more clusters mean instances are closer to centroids, but this leads to overfitting."},{"id":"272c44ea375f","q":"What is the elbow method for selecting the number of clusters?","a":"Plot inertia as a function of k. The curve often contains an inflection point called the 'elbow' where inertia drops quickly up to a point, then decreases much more slowly. The elbow point suggests a good choice for k."},{"id":"ac736695f1a6","q":"What is the silhouette coefficient and how is it calculated?","a":"The silhouette coefficient = (b - a) / max(a, b), where:\na = mean distance to other instances in the same cluster (intra-cluster distance)\nb = mean distance to instances of the next closest cluster (nearest-cluster distance)\nIt ranges from -1 to +1, with +1 being ideal."},{"id":"18a4484a5458","q":"What is k-means++ and why is it better than random initialization?","a":"k-means++ is a smarter initialization method that selects centroids that are distant from one another:\n1. Choose first centroid randomly\n2. Choose subsequent centroids with probability proportional to squared distance from nearest chosen centroid\n3. Repeat until k centroids are chosen\nThis reduces the likelihood of converging to suboptimal solutions."},{"id":"8dc2a156410a","q":"What are the limitations of k-means?","a":"1. Must specify number of clusters k in advance\n2. Sensitive to initialization (needs multiple runs)\n3. Doesn't work well with clusters of varying sizes, densities, or non-spherical shapes\n4. Assumes clusters are roughly spherical\n5. Can be affected by outliers"},{"id":"f47ef2ce5401","q":"How does mini-batch k-means differ from regular k-means?","a":"Mini-batch k-means uses small random batches of data at each iteration instead of the full dataset, moving centroids slightly at each step. This makes it 3-4x faster and allows handling of huge datasets that don't fit in memory, though with slightly higher inertia."},{"id":"623ed2275b2c","q":"What is DBSCAN and how does it define clusters?","a":"DBSCAN (Density-Based Spatial Clustering of Applications with Noise) defines clusters as continuous regions of high density. It uses two parameters: ε (epsilon) for neighborhood radius and min_samples for minimum instances in a neighborhood to be considered a core instance."},{"id":"fa7f53aa0c63","q":"How does DBSCAN classify different types of instances?","a":"1. Core instances: have at least min_samples instances in their ε-neighborhood\n2. Border instances: not core instances but have a core instance in their neighborhood\n3. Anomalies: instances that are neither core nor border (labeled as -1)"},{"id":"736c864a87fe","q":"Why doesn't DBSCAN have a predict() method?","a":"DBSCAN doesn't have a predict() method because different classification algorithms can be better for different tasks. The authors let users choose which classifier to use. You can train a separate classifier (like KNeighborsClassifier) on the core instances to predict cluster membership for new instances."},{"id":"c6205507c57d","q":"What are the advantages and disadvantages of DBSCAN?","a":"Advantages: Can find any number of clusters of any shape, robust to outliers, only two hyperparameters\nDisadvantages: Struggles when density varies significantly across clusters, computational complexity O(m²n), doesn't scale well to large datasets"},{"id":"5dbb3289560e","q":"What is a Gaussian Mixture Model (GMM)?","a":"A GMM is a probabilistic model that assumes instances were generated from a mixture of several Gaussian distributions with unknown parameters. Each Gaussian distribution represents a cluster that typically looks like an ellipsoid with different shapes, sizes, densities, and orientations."},{"id":"77bc597d7e40","q":"How does the Expectation-Maximization (EM) algorithm work in GMMs?","a":"EM is like a generalization of k-means:\n1. Initialize cluster parameters randomly\n2. Expectation step: estimate probability that each instance belongs to each cluster\n3. Maximization step: update clusters using all instances, weighted by their estimated probabilities\n4. Repeat until convergence\nUnlike k-means, EM uses soft assignments based on probabilities."},{"id":"ae13457c94d4","q":"What parameters does a Gaussian Mixture Model estimate?","a":"1. Weights ϕ(j) - probability of choosing each cluster\n2. Means μ(j) - center of each Gaussian distribution\n3. Covariance matrices Σ(j) - shape, size, and orientation of each cluster\nThese define the location, size, shape, orientation, and relative weight of each cluster."},{"id":"ce7118f6ce8d","q":"What are the different covariance_type constraints in GMMs?","a":"1. 'full' (default): each cluster can have any shape, size, orientation\n2. 'spherical': all clusters must be spherical but can have different diameters\n3. 'diag': clusters can be ellipsoidal but axes must be parallel to coordinate axes\n4. 'tied': all clusters must have the same ellipsoidal shape, size, and orientation"},{"id":"54a4d451c403","q":"How can Gaussian Mixture Models be used for anomaly detection?","a":"Any instance located in a low-density region can be considered an anomaly. You define a density threshold (e.g., the 4th percentile lowest density) and flag instances below this threshold as anomalies. The threshold can be adjusted based on the known ratio of defective products or desired precision/recall trade-off."},{"id":"f2a6a9090c7e","q":"What are the Bayesian Information Criterion (BIC) and Akaike Information Criterion (AIC)?","a":"BIC = log(m)p - 2log(ℒ)\nAIC = 2p - 2log(ℒ)\nWhere m = number of instances, p = number of parameters, ℒ = maximized likelihood value\nBoth penalize models with more parameters and reward models that fit data well. BIC tends to select simpler models than AIC."},{"id":"c609aad779ac","q":"What is the difference between probability and likelihood in statistics?","a":"Probability describes how plausible a future outcome x is (given known parameters θ). Likelihood describes how plausible particular parameter values θ are after observing outcome x. PDF is a function of x with θ fixed; likelihood function is a function of θ with x fixed."},{"id":"bd38a96900ca","q":"What is Bayesian Gaussian Mixture and how does it automatically select the number of clusters?","a":"BayesianGaussianMixture can automatically determine the optimal number of clusters by giving weights close to zero to unnecessary clusters. You set n_components to a value larger than expected optimal clusters, and the algorithm eliminates unnecessary clusters automatically."},{"id":"dbacc3f9385d","q":"How is k-means used for image segmentation?","a":"1. Reshape image array to get a list of RGB colors for each pixel\n2. Cluster these colors using k-means\n3. Replace each pixel's color with its cluster's mean color (centroid)\n4. Reshape back to original image dimensions\nThis reduces the number of colors and segments the image based on color similarity."},{"id":"cf60388964d5","q":"How can clustering be used for semi-supervised learning?","a":"1. Cluster the training data\n2. Label representative instances (e.g., those closest to centroids) manually\n3. Propagate these labels to all instances in the same cluster\n4. Optionally remove outliers (instances farthest from cluster centers)\n5. Train a supervised model on this expanded labeled dataset"},{"id":"1daedac50862","q":"What is active learning and how does uncertainty sampling work?","a":"Active learning involves human experts providing labels for specific instances when the algorithm requests them. Uncertainty sampling works as follows:\n1. Train model on labeled instances\n2. Make predictions on unlabeled instances\n3. Give instances with lowest estimated probability to expert for labeling\n4. Iterate until performance improvement stops being worthwhile"},{"id":"eb7555a59612","q":"What are the main applications of image segmentation?","a":"1. Color segmentation - pixels with similar colors assigned to same segment\n2. Semantic segmentation - pixels of same object type assigned to same segment (e.g., all pedestrians)\n3. Instance segmentation - pixels of same individual object assigned to same segment (e.g., each pedestrian separately)"},{"id":"462a3ba0725d","q":"What is agglomerative clustering?","a":"A hierarchy of clusters built from bottom up. Starts with individual instances and gradually connects nearest pairs of clusters until there's one big group. It can capture clusters of various shapes, produces a flexible cluster tree, and can use any pairwise distance. Scales well with connectivity matrix but not without one."},{"id":"c488b3f0cf0b","q":"What is BIRCH clustering?","a":"Balanced Iterative Reducing and Clustering using Hierarchies algorithm designed for very large datasets. It can be faster than batch k-means with similar results (for <20 features). It builds a tree structure with just enough information to quickly assign new instances without storing all instances."},{"id":"ce805addb342","q":"How does mean-shift clustering work?","a":"1. Place a circle centered on each instance\n2. Compute mean of all instances within each circle\n3. Shift circles to be centered on the mean\n4. Repeat until circles stop moving\n5. Instances whose circles settled in same place are assigned to same cluster\nIt shifts circles toward higher density regions until finding local density maxima."},{"id":"54c9f27188fa","q":"What is affinity propagation clustering?","a":"Instances repeatedly exchange messages until every instance elects another instance (or itself) to represent it. Elected instances are called exemplars. Each exemplar and instances that elected it form one cluster. Like voting in politics - you choose someone similar to you but also popular enough to win."},{"id":"ed6667e0e727","q":"What is spectral clustering?","a":"Takes a similarity matrix between instances, creates a low-dimensional embedding from it, then uses another clustering algorithm (like k-means) in the low-dimensional space. Can capture complex cluster structures and cut graphs (e.g., friend clusters in social networks). Doesn't scale well or handle very different cluster sizes well."},{"id":"3ae272d5c3ee","q":"What is isolation forest anomaly detection?","a":"Builds a random forest where each decision tree is grown randomly - at each node, picks a random feature and random threshold to split data. Anomalies are usually far from other instances, so they tend to get isolated in fewer steps than normal instances across all trees."},{"id":"6bb5e10711ab","q":"What is Local Outlier Factor (LOF)?","a":"Compares the density of instances around a given instance to the density around its neighbors. An anomaly is often more isolated than its k-nearest neighbors. Good for outlier detection by comparing local densities."},{"id":"107acfef355a","q":"What is one-class SVM for novelty detection?","a":"Instead of separating two classes, one-class SVM tries to separate instances from the origin in high-dimensional space. In original space, this finds a small region encompassing all instances. New instances outside this region are anomalies. Works great with high-dimensional data but doesn't scale to large datasets."},{"id":"2b4accf0bc39","q":"What is Fast-MCD (Elliptic Envelope)?","a":"Minimum Covariance Determinant algorithm assumes normal instances are generated from a single Gaussian distribution contaminated with outliers. When estimating the Gaussian distribution parameters, it carefully ignores instances most likely to be outliers, giving better estimation of the elliptic envelope around inliers."},{"id":"8bb40a80d18a","q":"How can PCA be used for anomaly detection?","a":"Compare reconstruction error of instances - anomalies usually have much larger reconstruction errors than normal instances. After reducing dimensionality with PCA and reconstructing, anomalies will have poor reconstruction because PCA tries to reconstruct normal patterns."},{"id":"a5ed44bc1d5a","q":"What is the computational complexity of GMM training?","a":"Depends on instances m, dimensions n, clusters k, and covariance constraints:\n- 'spherical' or 'diag': O(kmn)\n- 'tied' or 'full': O(kmn² + kn³)\nThe more complex covariance types don't scale well to large numbers of features."},{"id":"952e9c0c9ad2","q":"What is the difference between anomaly detection and novelty detection?","a":"Novelty detection assumes the algorithm is trained on a 'clean' dataset uncontaminated by outliers, whereas anomaly detection makes no such assumption. Anomaly detection is often used to clean up datasets, while novelty detection detects new patterns in clean data."},{"id":"1e613aefb1ec","q":"Why is it important to scale features before applying k-means?","a":"Without scaling, clusters may be very stretched and k-means will perform poorly because it uses Euclidean distance. Features with larger scales will dominate the distance calculations. Scaling doesn't guarantee spherical clusters but generally helps k-means performance."},{"id":"1439bc1f86f1","q":"What is label propagation in clustering?","a":"After clustering and manually labeling representative instances (like centroids), you propagate these labels to all other instances in the same clusters. This expands your labeled dataset from a few representative examples to many more instances for supervised learning."}]},{"id":"b2c9","title":"Introduction to Artificial Neural Networks with Keras","summary":"Learn perceptrons, multilayer neural networks, activation functions, backpropagation, Keras APIs, and deep learning foundations.","cards":[{"id":"b446fd6f106c","q":"What is the main inspiration behind artificial neural networks (ANNs)?","a":"ANNs are machine learning models inspired by the networks of biological neurons found in our brains. However, like planes inspired by birds that don't flap wings, ANNs have gradually become quite different from their biological cousins."},{"id":"57760cc8e218","q":"Who first introduced artificial neural networks and when?","a":"ANNs were first introduced in 1943 by neurophysiologist Warren McCulloch and mathematician Walter Pitts in their paper 'A Logical Calculus of Ideas Immanent in Nervous Activity.'"},{"id":"76972781f7ae","q":"What are the key components of a biological neuron?","a":"A biological neuron consists of a cell body containing the nucleus, many branching extensions called dendrites, one long extension called the axon, and synaptic terminals at the tip of axon branches that connect to other neurons."},{"id":"ce75ed3dec21","q":"How do biological neurons communicate?","a":"Biological neurons produce electrical impulses called action potentials that travel along axons and make synapses release chemical signals called neurotransmitters. When a neuron receives sufficient neurotransmitters within milliseconds, it fires its own electrical impulse."},{"id":"0da001b09765","q":"What is a perceptron and who invented it?","a":"The perceptron is one of the simplest ANN architectures, invented in 1957 by Frank Rosenblatt. It's based on a threshold logic unit (TLU) that computes a linear function of its inputs and applies a step function to the result."},{"id":"2a5a9893f8f6","q":"What is the mathematical formula for a TLU (Threshold Logic Unit)?","a":"A TLU computes z = w₁x₁ + w₂x₂ + ... + wₙxₙ + b = wᵀx + b, then applies a step function: hw(x) = step(z). It's similar to logistic regression but uses a step function instead of the logistic function."},{"id":"16b62ebf622b","q":"What are the two most common step functions used in perceptrons?","a":"The Heaviside step function (outputs 0 if z < 0, 1 if z ≥ 0) and the sign function (outputs -1 if z < 0, 0 if z = 0, +1 if z > 0)."},{"id":"84f25b8555ae","q":"What is the perceptron learning rule?","a":"The perceptron learning rule updates weights as: wi,j(next step) = wi,j + η(yj - ŷj)xi, where η is the learning rate, yj is the target output, ŷj is the actual output, and xi is the input value."},{"id":"61e3bf83a649","q":"What major limitation did Minsky and Papert highlight about perceptrons?","a":"In their 1969 monograph, Minsky and Papert showed that perceptrons are incapable of solving some trivial problems like the exclusive OR (XOR) classification problem, since they can only learn linearly separable patterns."},{"id":"5d929452123f","q":"How can the XOR problem be solved with neural networks?","a":"The XOR problem can be solved by stacking multiple perceptrons to create a multilayer perceptron (MLP). An MLP can learn non-linear patterns that single perceptrons cannot."},{"id":"495d2a2119f3","q":"What is backpropagation and who developed the key techniques?","a":"Backpropagation combines reverse-mode automatic differentiation (introduced by Seppo Linnainmaa in 1970) with gradient descent. It was popularized by Rumelhart, Hinton, and Williams in 1985 for training neural networks."},{"id":"d34809ca2ea1","q":"Why was the sigmoid function crucial for backpropagation?","a":"The step function contains only flat segments with no gradient, making gradient descent impossible. The sigmoid function σ(z) = 1/(1 + exp(-z)) has a well-defined nonzero derivative everywhere, allowing gradient descent to make progress at every step."},{"id":"ffd8b2834ce4","q":"What are the three popular activation functions mentioned in the chapter?","a":"1) Sigmoid function: σ(z) = 1/(1 + exp(-z)), 2) Hyperbolic tangent: tanh(z) = 2σ(2z) - 1, and 3) ReLU function: ReLU(z) = max(0, z)."},{"id":"522050fdddba","q":"Why is ReLU often preferred over sigmoid activation functions?","a":"ReLU is fast to compute, doesn't have a maximum output value (which helps reduce gradient descent issues), and generally works better in practice than sigmoid functions, despite not being differentiable at z = 0."},{"id":"c0fbb2b8fd0f","q":"Why do neural networks need nonlinear activation functions?","a":"Without nonlinearity between layers, chaining several linear transformations only results in another linear transformation. Nonlinear activations allow deep networks to solve complex problems that single layers cannot."},{"id":"ca665db41029","q":"How does backpropagation work in detail?","a":"Backpropagation processes mini-batches through epochs: 1) Forward pass computes outputs, 2) Measures network error using loss function, 3) Backward pass uses chain rule to compute error gradients for all weights, 4) Gradient descent step updates all weights."},{"id":"ad271305c7f6","q":"Why is random weight initialization important in neural networks?","a":"If all weights and biases are initialized to zero, all neurons in a layer remain identical and are affected identically by backpropagation. Random initialization breaks this symmetry, allowing backpropagation to train diverse neurons."},{"id":"989c16ea95fc","q":"What is the typical architecture for regression MLPs?","a":"For regression: 1-5 hidden layers, 10-100 neurons per layer, 1 output neuron per prediction dimension, ReLU activation in hidden layers, no activation (or ReLU/softplus for positive outputs) in output layer, MSE loss."},{"id":"70ee3c5df655","q":"What is the typical architecture for classification MLPs?","a":"For binary classification: sigmoid activation in output layer. For multiclass: one output neuron per class with softmax activation. For multilabel: one output neuron per label with sigmoid activation. Cross-entropy loss for all cases."},{"id":"4a6d715e7b56","q":"What is Keras and how does it relate to TensorFlow?","a":"Keras is TensorFlow's high-level deep learning API that allows you to build, train, evaluate, and execute neural networks. Originally standalone, Keras became TensorFlow's official high-level API in TensorFlow 2."},{"id":"6f5e0af6f577","q":"What are the three main APIs for building Keras models?","a":"1) Sequential API: for simple stacks of layers connected sequentially, 2) Functional API: for complex topologies with multiple inputs/outputs, 3) Subclassing API: for dynamic models with custom logic in the call() method."},{"id":"cffe60df93b0","q":"What does the Flatten layer do in Keras?","a":"The Flatten layer converts input data into a 1D array. For example, if it receives input with shape [32, 28, 28], it reshapes it to [32, 784]. It has no parameters and just does preprocessing."},{"id":"9a098487f331","q":"What is the difference between 'sparse_categorical_crossentropy' and 'categorical_crossentropy' loss?","a":"'sparse_categorical_crossentropy' is used when labels are class indices (e.g., 0, 1, 2), while 'categorical_crossentropy' is used when labels are one-hot vectors (e.g., [0, 0, 1])."},{"id":"711d7e4fd7a4","q":"What does the model.fit() method return and what information does it contain?","a":"model.fit() returns a History object containing training parameters (history.params), list of epochs (history.epoch), and a dictionary (history.history) with loss and metrics measured during training and validation."},{"id":"e23689110f82","q":"What is a Wide & Deep neural network?","a":"A Wide & Deep network connects all or part of the inputs directly to the output layer while also using a deep path. This allows the network to learn both deep patterns (via deep path) and simple rules (via wide path)."},{"id":"5c2baa153b7a","q":"How do you handle multiple inputs in Keras functional API?","a":"Create separate Input layers for each input, process them through different paths, then concatenate them using a Concatenate layer. When creating the model, specify inputs=[input1, input2] and pass tuples of data during training."},{"id":"197e92eda93d","q":"What are three use cases for multiple outputs in neural networks?","a":"1) Task demands it (e.g., object location + classification), 2) Multiple independent tasks on same data (multitask learning), 3) Regularization technique using auxiliary outputs to ensure underlying layers learn useful features."},{"id":"ed2ed72c8df4","q":"When should you use the Subclassing API instead of Sequential or Functional APIs?","a":"Use Subclassing API for models with loops, varying shapes, conditional branching, and dynamic behaviors, or when you prefer imperative programming style. However, it's harder to debug and inspect than declarative APIs."},{"id":"849e492fd4ff","q":"What are the two main formats for saving Keras models?","a":"1) SavedModel format (save_format='tf'): directory with saved_model.pb, keras_metadata.pb, variables/, and assets/, 2) HDF5 format (save_format='h5'): single file, but most deployment tools require SavedModel format."},{"id":"0f25f711cf40","q":"What is the purpose of callbacks in Keras training?","a":"Callbacks are objects that Keras calls before/after training, epochs, and batches. Examples include ModelCheckpoint (saves model during training), EarlyStopping (stops training when no progress), and TensorBoard (logs data for visualization)."},{"id":"4fec163f5ba5","q":"How does the EarlyStopping callback work?","a":"EarlyStopping monitors validation metrics and stops training when no improvement is seen for a specified number of epochs (patience). With restore_best_weights=True, it rolls back to the best model at the end."},{"id":"6b24ba872ad2","q":"What is TensorBoard and what can you visualize with it?","a":"TensorBoard is an interactive visualization tool for viewing learning curves, comparing runs, visualizing computation graphs, analyzing training statistics, viewing generated images/audio, and profiling network performance."},{"id":"970ac012df6b","q":"What is Keras Tuner and what tuning strategies does it offer?","a":"Keras Tuner is a hyperparameter tuning library for Keras with strategies like RandomSearch (random sampling), Hyperband (successive halving), and BayesianOptimization (Gaussian process-guided search)."},{"id":"99f0bf11ef33","q":"How does the Hyperband tuner work?","a":"Hyperband starts by training many models for few epochs, eliminates the worst models keeping only the top 1/factor models (e.g., top third), and repeats this selection process until one model remains. It's more efficient than pure random search."},{"id":"181be4423fc9","q":"What are the recommended ranges for hidden layers and neurons in MLPs?","a":"For hidden layers: start with 1-2, can go up to 5+ for complex problems. For neurons per hidden layer: typically 10-100, often same size across layers works well. Deep networks are more parameter-efficient than wide shallow ones."},{"id":"17ff6af8df91","q":"What is the 'stretch pants' approach to neural network sizing?","a":"Build a model with slightly more layers and neurons than needed, then use early stopping and regularization to prevent overfitting. This avoids bottleneck layers that could lose important information permanently."},{"id":"eedd7c629b98","q":"How do you find a good learning rate?","a":"Train for a few hundred iterations starting with very low learning rate (10⁻⁵), gradually increasing to large value (10). Plot loss vs learning rate (log scale). Optimal rate is about 10x lower than where loss starts climbing."},{"id":"7dc6653cc05b","q":"What is the current debate about batch sizes in neural network training?","a":"Large batches (up to 8,192) can be efficient with techniques like learning rate warmup, but small batches (2-32) often lead to better generalization. Strategy: try large batch with warmup first, fall back to small batch if training is unstable."},{"id":"656b3057d883","q":"Why is ReLU generally recommended as the default activation function for hidden layers?","a":"ReLU is fast to compute, doesn't suffer from vanishing gradients as much as sigmoid/tanh, and generally works well in practice. For output layers, the choice depends on the specific task requirements."},{"id":"ccbceb4b764f","q":"What is transfer learning in the context of neural networks?","a":"Transfer learning involves reusing lower layers from a pre-trained model when training a new model for a related task. The new model doesn't learn low-level features from scratch but only needs to learn higher-level structures specific to the new task."},{"id":"103c83603c48","q":"How do deep networks achieve better parameter efficiency than shallow ones?","a":"Deep networks can model complex functions using exponentially fewer neurons than shallow networks. Lower layers model low-level structures, intermediate layers combine these into intermediate structures, and higher layers model high-level structures hierarchically."},{"id":"d659b20ebd97","q":"What is the vanishing gradients problem mentioned in the TensorFlow playground exercise?","a":"In deep networks, gradients can become very small as they propagate backward through layers, causing lower layers to train very slowly. This can be alleviated with better weight initialization, optimizers like Adam, or batch normalization."}]},{"id":"b2c10","title":"Training Deep Neural Networks","summary":"Learn advanced deep learning training techniques including transfer learning, gradient stabilization, initialization strategies, normalization, and optimization tricks.","cards":[{"id":"4c624424c985","q":"What are the main problems encountered when training deep neural networks?","a":"1) Vanishing/exploding gradients making lower layers hard to train, 2) Not enough training data or expensive labeling, 3) Extremely slow training, 4) Overfitting risk with millions of parameters"},{"id":"9b491fe5f191","q":"What is the vanishing gradients problem?","a":"Gradients get smaller and smaller as the backpropagation algorithm progresses down to lower layers, leaving connection weights virtually unchanged and preventing convergence to a good solution"},{"id":"adddf710b246","q":"What is the exploding gradients problem?","a":"Gradients grow bigger and bigger until layers get insanely large weight updates and the algorithm diverges. This surfaces most often in recurrent neural networks"},{"id":"5593ebc670c5","q":"What causes unstable gradients according to Glorot and Bengio's 2010 paper?","a":"The combination of sigmoid activation function and normal distribution weight initialization (mean=0, std=1) causes variance to increase after each layer until activation functions saturate at top layers"},{"id":"5e68fff5f5cb","q":"What is Glorot/Xavier initialization?","a":"A weight initialization strategy where connection weights are initialized randomly with variance σ² = 1/fanavg, where fanavg = (fanin + fanout)/2. This helps signal flow properly in both forward and backward directions"},{"id":"4e327322f236","q":"When should you use He initialization instead of Glorot initialization?","a":"Use He initialization with ReLU and its variants (Leaky ReLU, ELU, GELU, Swish, Mish). It uses variance σ² = 2/fanin instead of 1/fanavg"},{"id":"fbf85fe97198","q":"When should you use LeCun initialization?","a":"Use LeCun initialization (σ² = 1/fanin) with SELU activation function, preferably with a normal distribution"},{"id":"915b5edafe5a","q":"What is the main advantage of ReLU over sigmoid activation functions?","a":"ReLU doesn't saturate for positive values and is very fast to compute, making it behave much better in deep neural networks than sigmoid functions"},{"id":"2f4a498bda4c","q":"What is the 'dying ReLUs' problem?","a":"Some neurons effectively 'die' during training, meaning they stop outputting anything other than 0. This happens when weights get tweaked so the ReLU input is negative for all training instances"},{"id":"837b4f74dfdb","q":"How does Leaky ReLU solve the dying ReLUs problem?","a":"Leaky ReLU is defined as LeakyReLUα(z) = max(αz, z), where α defines the slope for z < 0. Having a slope for negative values ensures neurons never completely die"},{"id":"3e2a315840df","q":"What is the ELU activation function and its advantages?","a":"ELU(z) = α(exp(z) - 1) if z < 0, else z. Advantages: takes negative values (helping vanishing gradients), has nonzero gradient for z < 0 (avoiding dead neurons), and is smooth everywhere when α = 1"},{"id":"ce2d899f41ea","q":"What makes SELU special compared to other activation functions?","a":"SELU enables self-normalization: if you build an MLP using only SELU activation functions, the network will self-normalize with outputs maintaining mean=0 and std=1 during training, solving vanishing/exploding gradients"},{"id":"f667213434df","q":"What are the conditions required for SELU self-normalization to work?","a":"1) Input features must be standardized (mean=0, std=1), 2) Use LeCun normal initialization, 3) Network must be plain MLP (no recurrent/skip connections), 4) Cannot use ℓ1/ℓ2 regularization, max-norm, batch-norm, or regular dropout"},{"id":"5f501e566682","q":"What is GELU and why is it effective?","a":"GELU(z) = z⋅Φ(z) where Φ is standard Gaussian CDF. It's a smooth, non-convex, non-monotonic variant of ReLU that often outperforms other activation functions, especially for complex tasks"},{"id":"f20cd49a60d0","q":"What is the main idea behind batch normalization?","a":"Add an operation before/after each hidden layer's activation that zero-centers and normalizes inputs, then scales and shifts using learnable parameters γ and β. This helps stabilize gradients during training"},{"id":"9a1fe13a1c31","q":"How does batch normalization work during training vs. testing?","a":"Training: Uses current mini-batch statistics (mean μB, std σB) to normalize. Testing: Uses moving averages of training statistics (final μ and σ) since we may not have batches or they may be unreliable"},{"id":"559c44a75add","q":"What are the four parameters learned in each batch normalization layer?","a":"γ (output scale vector) and β (output offset vector) learned via backpropagation; μ (final input mean) and σ (final input std) estimated using exponential moving averages during training"},{"id":"49078df12bb7","q":"What is gradient clipping and when is it used?","a":"A technique to mitigate exploding gradients by clipping gradients during backpropagation so they never exceed a threshold. Generally used in recurrent neural networks where batch normalization is tricky"},{"id":"917c3c7c5de0","q":"What is the difference between clipvalue and clipnorm in gradient clipping?","a":"clipvalue clips each gradient component to a range (e.g., -1.0 to 1.0) but may change gradient direction. clipnorm clips the whole gradient if its ℓ2 norm exceeds threshold, preserving direction"},{"id":"e39b4fbbe7dd","q":"What is transfer learning and when should you use it?","a":"Reusing parts of a pretrained neural network (except top layers) for a similar task. Use when you have limited training data and can find a model trained on a similar task with similar low-level features"},{"id":"a7afe73af2fc","q":"What is the general strategy for transfer learning?","a":"1) Find a pretrained model for similar task, 2) Replace output layer, 3) Freeze reused layers initially, 4) Train with new data, 5) Unfreeze some top layers and fine-tune with reduced learning rate"},{"id":"994590602ddb","q":"When should you freeze vs. unfreeze layers in transfer learning?","a":"Freeze more layers when tasks are very different or you have little data. Unfreeze more layers when tasks are similar and you have more training data. More similar tasks → reuse more layers"},{"id":"2a7745481587","q":"What is unsupervised pretraining?","a":"When you can't find a similar pretrained model, train an unsupervised model (autoencoder/GAN) on unlabeled data, then reuse lower layers and add output layer for your supervised task"},{"id":"1e8085a103d6","q":"What is pretraining on an auxiliary task?","a":"Train a neural network on an auxiliary task where you can easily obtain labeled data, then reuse lower layers for your actual task. Example: train on 'same person detection' to learn face features for face classification"},{"id":"27576bf1964a","q":"What is momentum optimization and why does it work?","a":"At each iteration, subtract local gradient from momentum vector m (multiplied by learning rate), then update weights by adding momentum vector. Works like a bowling ball gaining speed - helps escape plateaus and go faster in consistent directions"},{"id":"2fcacf6011bc","q":"What is the momentum algorithm mathematically?","a":"1) m ← βm - η∇θJ(θ), 2) θ ← θ + m. The momentum β is typically 0.9, creating a terminal velocity of η⋅gradient⋅1/(1-β) when gradients are constant"},{"id":"8dcab82c44f7","q":"How does Nesterov Accelerated Gradient (NAG) improve on momentum?","a":"Instead of computing gradient at current position θ, NAG computes it slightly ahead at θ + βm. This gives more accurate gradients since momentum vector generally points toward optimum"},{"id":"8e1008f07d8e","q":"What is AdaGrad and what problem does it solve?","a":"AdaGrad scales down gradients by accumulated squared gradients: it adapts learning rate per parameter, reducing it more for steep dimensions. Helps with elongated bowl problems but often stops too early"},{"id":"29386f98dffe","q":"How does RMSProp improve on AdaGrad?","a":"Instead of accumulating all past squared gradients, RMSProp uses exponential decay: s ← ρs + (1-ρ)∇θJ(θ)⊗∇θJ(θ). This prevents learning rate from decreasing too quickly"},{"id":"5e1e3c10aea3","q":"What is Adam optimization and why is it popular?","a":"Adam combines momentum and RMSProp: tracks exponentially decaying averages of both past gradients (first moment) and past squared gradients (second moment). Often works well with default hyperparameters"},{"id":"b5dd56957147","q":"What are the key hyperparameters in Adam?","a":"β1 (momentum decay, typically 0.9), β2 (scaling decay, typically 0.999), η (learning rate, typically 0.001), and ε (smoothing term, typically 10⁻⁷)"},{"id":"6210c44d8395","q":"What is AdamW and why is it better than Adam with ℓ2 regularization?","a":"AdamW properly combines Adam with weight decay. Unlike Adam + ℓ2 regularization, AdamW maintains the mathematical equivalence between weight decay and ℓ2 regularization that exists with SGD"},{"id":"fa843ef1be73","q":"What is learning rate scheduling and why is it beneficial?","a":"Changing the learning rate during training - typically starting high then reducing. Can reach better solutions faster than constant learning rate by making fast initial progress then fine-tuning"},{"id":"2e86b9419863","q":"What is 1cycle scheduling?","a":"Start with low learning rate η0, increase linearly to η1 halfway through training, then decrease back to η0, finishing with several orders of magnitude lower. Often achieves 'super-convergence' - better results in fewer epochs"},{"id":"02f246f742a9","q":"What is dropout regularization and how does it work?","a":"At each training step, every neuron (except output) has probability p of being 'dropped out' (ignored). Forces neurons to be useful independently and not co-adapt, creating a more robust network that generalizes better"},{"id":"a0777565aacd","q":"What is the technical detail about dropout scaling?","a":"During training, remaining inputs must be divided by keep probability (1-p) to compensate for the fact that fewer neurons are active. After training, all neurons are active so no scaling is needed"},{"id":"03a24301b921","q":"What is Monte Carlo (MC) Dropout?","a":"Make multiple predictions with dropout enabled during inference, then average the results. Provides more reliable probability estimates and uncertainty measures without retraining the model"},{"id":"9adf7f76b90a","q":"What is max-norm regularization?","a":"Constrains weights w of incoming connections to each neuron such that ∥w∥2 ≤ r. Implemented by rescaling weights after each training step if needed: w ← w⋅r/∥w∥2"},{"id":"4a8d916e3834","q":"What is the recommended default configuration for most deep neural networks?","a":"He initialization, ReLU (shallow) or Swish (deep) activation, batch normalization (if deep), early stopping + weight decay, Nesterov accelerated gradients or AdamW optimizer, performance scheduling or 1cycle"},{"id":"09422732ce8f","q":"What configuration should you use for self-normalizing networks?","a":"LeCun initialization, SELU activation, no normalization (self-normalizes), alpha dropout if needed, Nesterov accelerated gradients, performance scheduling or 1cycle"},{"id":"afbcf986bde9","q":"When should you use ℓ1 vs ℓ2 regularization in neural networks?","a":"Use ℓ1 regularization when you want sparse models (many weights = 0). Use ℓ2 with SGD/momentum but NOT with Adam variants - use AdamW instead for weight decay with Adam"},{"id":"d89001b2ffc2","q":"What are the typical dropout rates for different network types?","a":"20-30% for recurrent neural networks, 40-50% for convolutional neural networks. Many state-of-the-art architectures only use dropout after the last hidden layer"}]},{"id":"b2c11","title":"Custom Models and Training with TensorFlow","summary":"Learn TensorFlow internals, GradientTape, custom losses, custom metrics, custom layers, subclassing, autodiff, and custom training loops.","cards":[{"id":"717ecd60013f","q":"What is TensorFlow and what are its main features?","a":"TensorFlow is a powerful library for numerical computation, particularly well suited for large-scale machine learning. Main features: core similar to NumPy but with GPU support, distributed computing support, JIT compiler for optimization, portable computation graphs, reverse-mode autodiff, and excellent optimizers."},{"id":"fe17a61d4109","q":"What is the difference between tf.Tensor and tf.Variable?","a":"tf.Tensor values are immutable - you cannot modify them. tf.Variable acts like tf.Tensor but can be modified in place using assign(), assign_add(), assign_sub() methods, or scatter_update() methods. Variables are needed for model weights that must be updated during training."},{"id":"e78f01ce42a7","q":"How does TensorFlow handle type conversions?","a":"TensorFlow does not perform automatic type conversions to avoid performance issues. It raises exceptions for incompatible types (e.g., adding float and integer tensors). You must use tf.cast() to explicitly convert types when needed."},{"id":"bb88f85f23aa","q":"What precision does TensorFlow use by default and why?","a":"TensorFlow uses 32-bit precision by default, while NumPy uses 64-bit. This is because 32-bit precision is generally sufficient for neural networks, runs faster, and uses less RAM. When creating tensors from NumPy arrays, set dtype=tf.float32."},{"id":"b32bac0e5c2c","q":"How do you create a custom loss function in Keras?","a":"Create a function that takes labels (y_true) and predictions (y_pred) as arguments, uses TensorFlow operations to compute losses, and returns a tensor with individual sample losses. For better performance, use vectorized implementations with only TensorFlow operations."},{"id":"c55678a05821","q":"What is the difference between using a function vs subclassing tf.keras.losses.Loss for custom losses?","a":"Use a function for simple losses without hyperparameters. Subclass tf.keras.losses.Loss when you have hyperparameters that need to be saved with the model - implement __init__(), call(), and get_config() methods."},{"id":"c1f71ce90e21","q":"How do you save and load models with custom components?","a":"When loading, provide a custom_objects dictionary mapping function names to actual functions. Alternatively, decorate functions with @keras.utils.register_keras_serializable() to make them automatically available to load_model()."},{"id":"39d5e97db0d8","q":"What are the key differences between losses and metrics?","a":"Losses are used by gradient descent for training - must be differentiable with non-zero gradients, but don't need to be human-interpretable. Metrics evaluate models - must be interpretable by humans, can be non-differentiable or have zero gradients everywhere."},{"id":"438830c91fcb","q":"What is a streaming metric and why is it important?","a":"A streaming metric (stateful metric) is gradually updated batch after batch, maintaining state across batches. Important for metrics like precision where you can't just average batch results - need to track cumulative true/false positives across all batches."},{"id":"d976f77ffc31","q":"How do you create a custom streaming metric?","a":"Subclass tf.keras.metrics.Metric, implement: __init__() to create state variables with add_weight(), update_state() to update variables given labels/predictions, result() to compute final result, and get_config() for persistence."},{"id":"52800b73a1df","q":"When should you use tf.keras.layers.Lambda vs creating a custom layer class?","a":"Use Lambda for simple stateless layers (no weights) by wrapping a function. Create a custom layer class when you need weights/state by subclassing tf.keras.layers.Layer and implementing build() and call() methods."},{"id":"c963613e68cd","q":"What are the key methods to implement when creating a custom layer?","a":"Key methods: __init__() for hyperparameters, build() to create weights using add_weight(), call() for forward computation, and get_config() for saving hyperparameters. The build() method is called when input shape is known."},{"id":"4b9f49bad57a","q":"How do you create a layer that behaves differently during training vs testing?","a":"Add a training argument to the call() method and use it to decide behavior. For example: call(self, X, training=False). During training, the layer might add noise or apply dropout, while during testing it passes inputs unchanged."},{"id":"f46c559ea47a","q":"What is the difference between subclassing Layer vs Model?","a":"Layer: for internal components/reusable blocks. Model: for the complete trainable object with extra functionalities like compile(), fit(), evaluate(), predict(), get_layer(), and save() methods. Models are layers with additional capabilities."},{"id":"1d3f703c02da","q":"How do you add custom losses based on model internals?","a":"Compute the loss based on any part of the model (weights, activations), then pass the result to the add_loss() method. Similarly, use add_metric() for custom metrics. This is useful for regularization or monitoring internal aspects."},{"id":"426ec92deaed","q":"What is tf.GradientTape and how do you use it?","a":"tf.GradientTape automatically records operations involving variables for automatic differentiation. Usage: create variables, use 'with tf.GradientTape() as tape:', perform computations, then call tape.gradient(loss, variables) to get gradients."},{"id":"aac67cafdf96","q":"What are the key rules for using tf.GradientTape?","a":"Tape auto-erases after calling gradient(), so use persistent=True for multiple calls. Only tracks variables by default - use tape.watch() for tensors. Put minimal code inside the tape block to save memory, or use tape.stop_recording()."},{"id":"d6b64c37d46e","q":"When might you need to write a custom training loop?","a":"When fit() method isn't flexible enough - e.g., Wide & Deep paper using different optimizers for different paths, when you want full control over training process, or need to apply special transformations/constraints to gradients beyond clipping."},{"id":"0db932893d5a","q":"What are the main components of a custom training loop?","a":"Key components: nested loops (epochs/batches), sample batches, use GradientTape to compute gradients, apply optimizer with apply_gradients(), update metrics, display progress. Must handle loss computation including r
