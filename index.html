s the model is integrated with. The model can then retrieve and potentially execute these malicious instructions from external sources."},{"id":"d0457f98f0be","q":"What are the two approaches to indirect prompt injection?","a":"1) Passive phishing: leaving malicious payloads in public spaces (web pages, GitHub repos) waiting for models to find them, 2) Active injection: proactively sending threats to targets, like emails with malicious instructions that confuse AI assistants."},{"id":"ee955b32ec6c","q":"How can RAG systems be vulnerable to prompt injection?","a":"An attacker could sign up with a username like 'Bruce Remove All Data Lee.' When the model retrieves this username and generates a query, it could potentially interpret it as a command to delete all data, since LLMs can translate natural language into SQL queries."},{"id":"00e782ff8d3a","q":"What makes natural language prompt injection harder to defend against than traditional SQL injection?","a":"While databases can sanitize inputs to prevent SQL injection attacks, it's much harder to distinguish malicious content in natural languages from legitimate content, making traditional sanitization techniques less effective."},{"id":"4a5dc4fbbb12","q":"According to the chapter, how should teams approach proprietary prompts?","a":"Teams should write system prompts assuming they will one day become public. Well-crafted prompts are valuable, but proprietary prompts are more of a liability than competitive advantage because they require maintenance and updates when underlying models change."},{"id":"7ffc941282f8","q":"What is the key principle behind why prompt attacks work?","a":"Prompt attacks work because models are trained to follow instructions. As models get better at following instructions, they also get better at following malicious instructions. It's difficult for models to differentiate between system prompts and user prompts."},{"id":"7a4db35ccec5","q":"How does model robustness relate to prompt engineering effort?","a":"The amount of prompt engineering needed depends on how robust the model is to prompt perturbation. Less robust models require more fiddling when small changes (like '5' vs 'five') dramatically affect responses. Stronger models are generally more robust and require less prompt engineering."},{"id":"2314ab9f4268","q":"What did Microsoft's 2023 analysis reveal about few-shot vs zero-shot learning?","a":"For GPT-4 and other advanced models, few-shot learning showed only limited improvement compared to zero-shot learning, suggesting that as models become more powerful, they become better at understanding instructions with fewer examples."},{"id":"789c3712d624","q":"Why might the impact of few-shot examples be underestimated for domain-specific use cases?","a":"If a model doesn't see many examples of a specific domain (like the Ibis dataframe API) in its training data, including domain-specific examples in the prompt can still make a significant difference even for advanced models."},{"id":"deb38102b133","q":"What trade-offs should be considered with prompt decomposition?","a":"Benefits include better monitoring, debugging, parallelization, and easier prompt writing. Downsides include increased user-perceived latency (especially when intermediate outputs aren't shown) and potentially higher costs, though smaller prompts may actually reduce token costs."},{"id":"b26bcd5537f4","q":"What should you inspect when using prompt engineering tools?","a":"Always inspect the prompts produced by the tool to ensure they make sense, track how many API calls it generates to avoid unexpected costs, and understand how the tool works under the hood to avoid unnecessary headaches."}]},{"id":"b0c5","title":"RAG and Agents","summary":"Learn Retrieval-Augmented Generation (RAG), semantic retrieval, vector databases, chunking strategies, query rewriting, AI agents, tool usage, orchestration systems, and external memory architectures.","cards":[{"id":"790ad434ad27","q":"What is RAG and what problem does it solve?","a":"RAG (Retrieval-Augmented Generation) is a technique that enhances a model's generation by retrieving relevant information from external memory sources. It solves the problem of knowledge-intensive tasks where all available knowledge can't be input into the model directly, helping models generate more detailed responses while reducing hallucinations."},{"id":"5553e107d555","q":"What are the two dominating patterns for context construction mentioned in the chapter?","a":"The two dominating patterns are RAG (retrieval-augmented generation), which allows models to retrieve relevant information from external data sources, and the agentic pattern, which allows models to use tools such as web search and news APIs to gather information."},{"id":"b3c71610e99e","q":"When was the retrieve-then-generate pattern first introduced and by whom?","a":"The retrieve-then-generate pattern was first introduced in 'Reading Wikipedia to Answer Open-Domain Questions' by Chen et al. in 2017. The system would first retrieve five Wikipedia pages most relevant to a question, then a model would use this information to generate an answer."},{"id":"9446f2ab1209","q":"What are the two main components of a RAG system?","a":"A RAG system has two components: a retriever that retrieves information from external memory sources and a generator that generates a response based on the retrieved information."},{"id":"3c4a7d753ab0","q":"What are the two main functions of a retriever in RAG?","a":"A retriever has two main functions: indexing (processing data so it can be quickly retrieved later) and querying (sending a query to retrieve data relevant to it). How to index data depends on how you want to retrieve it later on."},{"id":"b7e4638ab4ad","q":"What are the two common retrieval mechanisms discussed in the chapter?","a":"The two common retrieval mechanisms are term-based retrieval (also called lexical retrieval, which finds documents based on keyword matches) and embedding-based retrieval (also called semantic retrieval, which ranks documents based on meaning alignment with the query)."},{"id":"7bf491864ce1","q":"What is TF-IDF and what do its components measure?","a":"TF-IDF combines Term Frequency (TF) - the number of times a term appears in a document - and Inverse Document Frequency (IDF) - a measure of how informative a term is based on how many documents contain it. The more documents contain a term, the less informative it is."},{"id":"61ef08237dc0","q":"What is BM25 and how does it improve upon TF-IDF?","a":"BM25 (Okapi BM25) is the 25th generation of the Best Matching algorithm developed by Robertson et al. in the 1980s. It's a modification of TF-IDF that normalizes term frequency scores by document length, addressing the issue that longer documents are more likely to contain terms and have higher frequency values."},{"id":"a1e50d2bf984","q":"What are the steps in embedding-based retrieval?","a":"Embedding-based retrieval involves: 1) Converting data chunks into embeddings using an embedding model and storing them in a vector database during indexing, 2) Converting the query into an embedding using the same model, and 3) Fetching k data chunks whose embeddings are closest to the query embedding."},{"id":"fccdb4018c47","q":"What is the difference between k-NN and ANN in vector search?","a":"k-NN (k-nearest neighbors) computes similarity between the query and all vectors, ranks them, and returns the k most similar - it's precise but slow. ANN (approximate nearest neighbor) uses algorithms to find approximate results faster, trading some accuracy for efficiency, which is necessary for large datasets."},{"id":"4d34b2691655","q":"What are the two metrics used to evaluate retrieval quality?","a":"Context precision (out of all documents retrieved, what percentage is relevant to the query?) and context recall (out of all documents that are relevant to the query, what percentage is retrieved?). These help assess how accurately and completely a retriever finds relevant information."},{"id":"4f27291fdfb9","q":"How do term-based and embedding-based retrieval compare in terms of speed, performance, and cost?","a":"Term-based retrieval is much faster and cheaper, with strong out-of-the-box performance but limited improvement potential. Embedding-based retrieval is slower and more expensive but can outperform term-based retrieval with fine-tuning and allows more natural queries focused on semantics rather than exact terms."},{"id":"d4b580076da2","q":"What is hybrid search and how does it work?","a":"Hybrid search combines term-based and embedding-based retrieval approaches. Different algorithms can be used in sequence (cheap retrieval followed by precise reranking) or in parallel (multiple retrievers fetch candidates, then rankings are combined using techniques like reciprocal rank fusion)."},{"id":"f4cd376a2f97","q":"What is reciprocal rank fusion (RRF)?","a":"RRF is an algorithm for combining rankings from different retrievers. It assigns each document a score based on its ranking (1st = score of 1, 2nd = score of 0.5, etc.). A document's final score is the sum of its scores across all retrievers, allowing combination of multiple retrieval approaches."},{"id":"399785972a64","q":"What are the main chunking strategies for documents in RAG?","a":"Main strategies include: equal length chunks (by characters, words, sentences, or paragraphs), recursive splitting (using increasingly smaller units until chunks fit size limits), and document-specific strategies (e.g., Q&A pairs for FAQ documents, language-specific splitting)."},{"id":"e4ca8f0da162","q":"What are the trade-offs with chunk size in RAG?","a":"Smaller chunks allow more diverse information and can fit more chunks in context, but may cause loss of important information and increase computational overhead (especially for embedding-based retrieval). Larger chunks preserve context better but limit the number that can be included."},{"id":"9ec48ae2b79b","q":"What is query rewriting and why is it important in RAG?","a":"Query rewriting (also called query reformulation) involves rewriting ambiguous queries to reflect what the user is actually asking. For example, 'How about Emily Doe?' in a conversation about purchases should be rewritten to 'When was the last time Emily Doe bought something from us?' to enable effective retrieval."},{"id":"cdbf12a0e690","q":"What is contextual retrieval and how does it improve RAG performance?","a":"Contextual retrieval augments each chunk with relevant context to make it easier to retrieve. This includes adding metadata, tags, keywords, questions the chunk can answer, or context from the original document. Anthropic's approach uses AI to generate 50-100 token contexts explaining each chunk's relationship to the original document."},{"id":"17e0e377a09b","q":"What is multimodal RAG?","a":"Multimodal RAG augments queries not only with text documents but also with images, videos, audio, etc. from external sources. Images can be retrieved using metadata or content-based approaches with multimodal embedding models like CLIP that can generate embeddings for both images and texts."},{"id":"2d4ed00b62e8","q":"How does RAG work with tabular data?","a":"RAG with tabular data involves: 1) Text-to-SQL conversion based on user query and table schemas, 2) SQL execution to retrieve data, and 3) Response generation based on SQL results and the original query. This requires the system to have SQL generation and execution capabilities."},{"id":"3435a54eaaa4","q":"How is an agent defined in the context of AI?","a":"An agent is anything that can perceive its environment and act upon that environment. An AI agent is characterized by the environment it operates in and the set of actions it can perform, which is augmented by the tools it has access to."},{"id":"692652daf703","q":"What is the relationship between an agent's environment and its tools?","a":"There's a strong dependency between an agent's environment and tools. The environment determines what tools an agent can potentially use (e.g., chess game limits actions to valid moves), while an agent's tool inventory restricts the environment it can operate in (e.g., a swimming-only robot is confined to water environments)."},{"id":"95557a53964b","q":"Why do agents typically require more powerful models than non-agent applications?","a":"Agents require more powerful models due to: 1) Compound mistakes - accuracy decreases with more steps (95% accuracy per step becomes 60% over 10 steps), and 2) Higher stakes - with access to tools, agents perform more impactful tasks where failures have severe consequences."},{"id":"2561335e579d","q":"What are the three categories of tools for agents mentioned in the chapter?","a":"The three categories are: 1) Knowledge augmentation tools (retrievers, APIs for context construction), 2) Capability extension tools (calculators, code interpreters, translators to address model limitations), and 3) Write action tools (enabling agents to make changes to data sources and act in the real world)."},{"id":"03f0f5a253eb","q":"What are the key components of the planning process in agents?","a":"Planning involves: 1) Plan generation (task decomposition into manageable actions), 2) Reflection and error correction (evaluating and improving plans), 3) Execution (taking actions outlined in the plan), and 4) Further reflection to determine if the goal is accomplished and correct mistakes."},{"id":"62a41545d05b","q":"Why should planning be decoupled from execution in agents?","a":"Planning should be decoupled from execution to avoid fruitless execution. Without oversight, an agent might run a 1,000-step plan for hours before realizing it doesn't accomplish the goal. Plans should be validated using heuristics or AI judges before execution."},{"id":"069c4fc91fa7","q":"What are the different control flows that plans can have?","a":"Plans can have: 1) Sequential (B after A completes), 2) Parallel (A and B simultaneously), 3) If statements (B or C depending on previous output), and 4) For loops (repeat A until condition is met). AI models determine these control flows, making non-sequential flows more difficult to generate and execute."},{"id":"cb44dfcc6966","q":"What is the ReAct framework and how does it work?","a":"ReAct (Reasoning and Acting) interleaves reasoning and action in agents. At each step, the agent explains its thinking (planning), takes actions, then analyzes observations (reflection) until the task is finished, typically following a 'Thought, Act, Observation' format until completion."},{"id":"37e87f9379f3","q":"What are the main planning failure modes in agents?","a":"Planning failures include: 1) Tool use failures (invalid tools, valid tools with invalid parameters, valid tools with incorrect parameter values), 2) Goal failures (plan doesn't solve task or ignores constraints), and 3) Reflection errors (agent incorrectly believes task is accomplished)."},{"id":"c4d04c13ef72","q":"What are the three main memory mechanisms for AI models?","a":"The three mechanisms are: 1) Internal knowledge (retained from training data, accessible in all queries), 2) Short-term memory (context from previous messages, fast but limited capacity), and 3) Long-term memory (external data sources accessed via retrieval, persistent across tasks)."},{"id":"90b68f0faeb3","q":"What are the benefits of augmenting AI models with memory systems?","a":"Memory systems help: 1) Manage information overflow within sessions, 2) Persist information between sessions for personalization, 3) Boost model consistency by referencing previous answers, and 4) Maintain data structural integrity by storing structured data properly."},{"id":"2e25bbcf5c55","q":"What is function calling in the context of agents?","a":"Function calling is how model providers implement tool use, effectively turning models into agents. It involves: 1) Creating a tool inventory with function descriptions and parameters, 2) Specifying which tools the agent can use per query, and 3) The model automatically generating which tools to use and their parameters."},{"id":"237043c6fdb1","q":"What is the difference between planning granularity levels?","a":"Planning granularity involves a trade-off: detailed plans (using exact function names) are harder to generate but easier to execute, while higher-level plans (using natural language descriptions) are easier to generate but harder to execute. Higher-level planning is more robust to tool API changes."},{"id":"7074f3bea971","q":"What are the key factors to consider when evaluating retrieval solutions?","a":"Key factors include: supported retrieval mechanisms and hybrid search capabilities, embedding models and vector search algorithms (for vector databases), scalability for data storage and query traffic, indexing time and bulk processing capabilities, query latency for different algorithms, and pricing structure."},{"id":"4d66ed52ab03","q":"How should tools be selected for agents?","a":"Tool selection requires experimentation and analysis: compare agent performance with different tool sets, conduct ablation studies to see impact of removing tools, analyze tools that cause frequent mistakes, and plot distribution of tool usage. Different models and tasks show different tool preferences."},{"id":"6f541abb9544","q":"What is tool transition and how can it improve agents?","a":"Tool transition studies how likely an agent is to call tool Y after tool X. If two tools are frequently used together, they can be combined into a bigger tool. Agents aware of this information can combine initial tools to continually build more complex tools, as proposed in the Chameleon framework."},{"id":"2c385f6d66dd","q":"What are the main types of agent failure modes?","a":"Agent failures include: 1) Planning failures (tool use errors, goal failures, reflection errors), 2) Tool failures (wrong outputs, translation errors, missing required tools), and 3) Efficiency issues (too many steps, high costs, slow actions)."},{"id":"a2e8e1069dd8","q":"What memory management strategies are discussed for handling context overflow?","a":"Strategies include: 1) FIFO (first in, first out) - simple but can lose important early information, 2) Redundancy removal through summarization and entity tracking, 3) Reflection-based approaches where agents determine what information to keep, merge, or replace, and 4) Handling contradictory information appropriately."},{"id":"88f5741aa1c8","q":"According to Anthropic's guidance, when might you not need RAG?","a":"Anthropic suggests that for Claude models, if your knowledge base is smaller than 200,000 tokens (about 500 pages of material), you can include the entire knowledge base in the prompt without needing RAG or similar methods."},{"id":"e7bf441c26e6","q":"What is the fundamental debate about foundation models as planners?","a":"There's debate whether foundation models can truly plan. Critics like Yann LeCun argue autoregressive LLMs cannot plan, and Kambhampati suggests they confuse planning knowledge with executable plans. However, others argue LLMs might be poor planners due to lacking proper tools rather than fundamental inability."},{"id":"4c45f47019fb","q":"How do Foundation Model (FM) agents differ from Reinforcement Learning (RL) agents?","a":"Both are characterized by environments and actions, but differ in planners: RL agents use planners trained by RL algorithms (requiring significant time/resources), while FM agents use the model itself as the planner (can be prompted or fine-tuned with generally fewer resources). They may eventually merge."},{"id":"9f2e6d8d7365","q":"What role does reflection play in agent performance?","a":"Reflection significantly boosts agent performance by evaluating plans and outcomes at multiple stages: after receiving queries, after initial plan generation, after each execution step, and after completion. It can be done through self-critique or separate evaluator components, though it increases latency and cost."},{"id":"660304971a9e","q":"Why is RAG still valuable despite increasing context lengths?","a":"RAG remains valuable because: 1) Applications will always require context longer than available limits as data continues growing, 2) Models don't necessarily use long contexts well (focusing on wrong parts), 3) Every extra token incurs cost and latency, and 4) RAG allows using only the most relevant information for each query."}]},{"id":"b0c6","title":"Finetuning","summary":"Learn how to adapt foundation models using supervised fine-tuning, preference tuning, LoRA, quantization-aware training, parameter-efficient finetuning, and transfer learning strategies.","cards":[{"id":"f7f139296ad4","q":"What is finetuning and how does it differ from prompt-based methods?","a":"Finetuning is the process of adapting a model to a specific task by further training the whole model or part of the model, adjusting its weights. This differs from prompt-based methods (Chapters 5 and 6) which adapt a model by giving it instructions, context, and tools without changing the model's weights."},{"id":"9f1487c8a106","q":"What is the main challenge that makes finetuning expensive and difficult at the scale of today's foundation models?","a":"Memory requirements. At the scale of today's foundation models, naive finetuning often requires more memory than what's available on a single GPU, making it expensive and challenging to do. This is why reducing memory requirements is a primary motivation for many finetuning techniques."},{"id":"583fc7f11120","q":"What is transfer learning and how does it relate to finetuning?","a":"Transfer learning is a concept introduced by Bozinovski and Fulgosi in 1976 that focuses on how to transfer knowledge gained from one task to accelerate learning for a new, related task. Finetuning is one way to do transfer learning - for LLMs, knowledge from pre-training on text completion is transferred to specialized tasks like legal question answering."},{"id":"6095e4af26a8","q":"What is sample efficiency and why is it important in finetuning?","a":"Sample efficiency means a model can learn the same behavior with fewer examples. Transfer learning improves sample efficiency - while training a model from scratch for legal question answering may need millions of examples, finetuning a good base model might only require a few hundred examples."},{"id":"286a98efe759","q":"What is continued pre-training and when is it used?","a":"Continued pre-training (also called self-supervised finetuning) is when you finetune a pre-trained model with self-supervision using cheap task-related data before finetuning with expensive task-specific data. For example, before finetuning on expensive annotated legal Q&A data, you first finetune on raw legal documents."},{"id":"cd95da973c3a","q":"What are the two main types of finetuning discussed in Chapter 2?","a":"Supervised finetuning and preference finetuning. Supervised finetuning uses high-quality annotated (input, output) pairs to refine the model to align with human usage. Preference finetuning uses reinforcement learning with comparative data in the format (instruction, winning response, losing response) to maximize human preference."},{"id":"3fde9a8d84f3","q":"When should you consider finetuning over prompt-based methods?","a":"Finetuning should be considered after extensive experiments with prompt-based methods have proven insufficient. It's generally attempted when prompt engineering cannot achieve the desired performance, especially for improving structured output formats, domain-specific capabilities, or when you need consistent behavior that prompting alone cannot provide."},{"id":"5f8e2f2d69a0","q":"What is the primary reason for finetuning?","a":"The primary reason for finetuning is to improve a model's quality, in terms of both general capabilities and task-specific capabilities. Finetuning is commonly used to improve a model's ability to generate outputs following specific structures, such as JSON or YAML formats."},{"id":"c2d961c45a1d","q":"What did the comparison between BloombergGPT and GPT-4-0314 demonstrate about domain-specific models?","a":"It demonstrated that general-purpose models can outperform domain-specific models in their own domains. GPT-4-0314 significantly outperformed BloombergGPT across various financial benchmarks, despite BloombergGPT being specifically trained for financial tasks at a cost of $1.3-2.6 million."},{"id":"e754dbf9b77f","q":"What is the key decision framework for choosing between finetuning and RAG?","a":"The answer depends on whether your model's failures are information-based or behavior-based. If the model fails because it lacks information (factually wrong or outdated outputs), use RAG. If the model has behavioral issues (correct but irrelevant outputs, wrong format), use finetuning. In short: finetuning is for form, RAG is for facts."},{"id":"a638c6e6bf10","q":"What did Ovadia et al. (2024) find about RAG vs finetuning for current events?","a":"For tasks requiring up-to-date information like current events, RAG outperformed finetuned models. Additionally, RAG with the base model outperformed RAG with finetuned models, indicating that finetuning can lead to performance decline in other areas."},{"id":"1a3e689bcc23","q":"What are the key contributors to a model's memory footprint during finetuning?","a":"The key contributors are: 1) The model's number of parameters, 2) The number of trainable parameters, and 3) The numerical representations (bits per parameter). The more trainable parameters, the higher the memory footprint, which is why reducing trainable parameters is the motivation for PEFT."},{"id":"a5d5e729b4b8","q":"What is the memory calculation formula for inference?","a":"For inference: N × M × 1.2, where N is the model's parameter count, M is memory per parameter, and 1.2 accounts for activation values and key-value vectors (assumed to be 20% of model weights). For example, a 13B-parameter model with 2 bytes per parameter needs 13B × 2 × 1.2 = 31.2 GB."},{"id":"a1d1a2286801","q":"How much additional memory does training require compared to inference?","a":"Training requires significantly more memory: model weights + activations + gradients + optimizer states. Each trainable parameter needs additional memory for gradients (1 value) and optimizer states (0-2 values depending on optimizer). For example, Adam optimizer needs 3 values per trainable parameter."},{"id":"672be88ce296","q":"What are the main numerical formats used in neural networks and their bit sizes?","a":"FP32 (32 bits/4 bytes) - single precision, FP64 (64 bits/8 bytes) - double precision, FP16 (16 bits/2 bytes) - half precision, BF16 (16 bits) - designed for TPUs, TF32 (19 bits) - designed for GPUs, and integer formats like INT8 (8 bits) and INT4 (4 bits)."},{"id":"f508927520d7","q":"What is quantization and how does it reduce memory footprint?","a":"Quantization is converting a model from a format with more bits to fewer bits. It's a straightforward way to reduce memory footprint - a 10B-parameter model in 32-bit format requires 40 GB, but the same model in 16-bit format requires only 20 GB. It can also improve computation speed."},{"id":"69cd8eec8963","q":"What is the difference between full finetuning and parameter-efficient finetuning (PEFT)?","a":"Full finetuning updates all model parameters (trainable parameters = total parameters), requiring massive memory. PEFT achieves performance close to full finetuning while using several orders of magnitude fewer trainable parameters, making finetuning accessible on limited hardware."},{"id":"d73664417f05","q":"What did Houlsby et al. (2019) discover about partial finetuning efficiency?","a":"They found that partial finetuning is parameter-inefficient - with BERT large, you'd need to update approximately 25% of parameters to achieve performance comparable to full finetuning. This led to the development of PEFT techniques that can achieve similar performance with much fewer trainable parameters."},{"id":"c19229582ab3","q":"What are the two main categories of PEFT techniques?","a":"1) Adapter-based methods: Add additional modules to the model weights (additive methods) like LoRA, BitFit, IA3. 2) Soft prompt-based methods: Modify how the model processes input by introducing special trainable tokens alongside input tokens, like prefix-tuning, P-Tuning, and prompt tuning."},{"id":"cbe43fdc167d","q":"How do soft prompts differ from hard prompts?","a":"Hard prompts are human-readable discrete tokens like 'write' and 'code', are static and not trainable. Soft prompts are continuous vectors (like embeddings), are not human-readable, and can be optimized through backpropagation during tuning, allowing them to be adjusted for specific tasks."},{"id":"6c0602bef81b","q":"What is LoRA and how does it work?","a":"LoRA (Low-Rank Adaptation) decomposes a weight matrix W into the product of two smaller matrices A and B, then updates only A and B during finetuning while keeping W intact. The new weight matrix is W' = W + (α/r)W_AB, where r is the LoRA rank and α determines the contribution."},{"id":"b61612267c15","q":"What is the key advantage of LoRA over earlier adapter methods?","a":"Unlike earlier adapter methods that add extra layers and increase inference latency, LoRA incorporates additional parameters in a way that doesn't incur extra inference latency. The LoRA modules can be merged back into the original layers, maintaining the same computational structure."},{"id":"b8f0e7f4eb8c","q":"Why does LoRA work despite using so few parameters?","a":"LoRA works because LLMs have very low intrinsic dimensions despite having many parameters. Pre-training implicitly minimizes the model's intrinsic dimension, and larger models tend to have lower intrinsic dimensions after pre-training. This suggests pre-training acts as a compression framework for downstream tasks."},{"id":"e75708559bd2","q":"What weight matrices in transformer models are commonly targeted for LoRA application?","a":"LoRA is most commonly applied to the four weight matrices in attention modules: query (Wq), key (Wk), value (Wv), and output projection (Wo) matrices. When finetuning GPT-3 175B, applying LoRA to all four matrices with rank=2 yielded the best performance."},{"id":"736b746c92d0","q":"What are the two ways to serve a LoRA-finetuned model?","a":"1) Merge LoRA weights A and B into the original model W to create W' before serving (no extra latency, better for single model). 2) Keep W, A, and B separate during serving, merging during inference (adds latency but better for multi-LoRA serving with shared base model)."},{"id":"b9fc9ccd7a1c","q":"What is QLoRA and how does it improve upon LoRA?","a":"QLoRA (Quantized LoRA) stores the model's weights in 4 bits using NF4 format but dequantizes them to BF16 for forward/backward passes. It uses paged optimizers for CPU-GPU memory transfer. This allows a 65B-parameter model to be finetuned on a single 48GB GPU while maintaining competitive performance."},{"id":"ffe1aeada6ea","q":"What is model merging and what value does it provide?","a":"Model merging combines multiple models to create a single model that provides more value than using constituent models separately. Value can come from improved performance (combining models good at different aspects) or reduced memory footprint (one model doing multiple tasks instead of separate models)."},{"id":"6c371ed8aaf4","q":"What are the three main approaches to model merging?","a":"1) Summing: Adding weight values together (linear combination, SLERP). 2) Layer stacking: Taking different layers from different models and stacking them (passthrough/frankenmerging). 3) Concatenation: Combining parameters where merged component has sum of all constituent parameters."},{"id":"594c1ca02f96","q":"What is task arithmetic and how does it work with task vectors?","a":"Task vectors capture the essence of a task by subtracting the base model from a finetuned model. Task arithmetic allows adding task vectors to combine capabilities or subtracting them to reduce specific capabilities (like removing biases or invasive capabilities like facial recognition)."},{"id":"7aa63da5d991","q":"What is SLERP and how does it differ from linear combination?","a":"SLERP (Spherical Linear Interpolation) treats each component as a point on a sphere and merges by finding points along the shortest path between them on the sphere's surface. Unlike linear combination which can merge multiple vectors simultaneously, SLERP can only merge two vectors at a time."},{"id":"605df53cd513","q":"What did TIES and DARE demonstrate about redundant parameters in model merging?","a":"They showed that many parameters adjusted during finetuning are redundant and don't significantly contribute to performance. TIES and DARE first prune these redundant parameters from task vectors before merging, which significantly improves the quality of final merged models, especially when merging many models."},{"id":"4d26a38305bb","q":"What is frankenmerging and what was the success story of Goliath-120B?","a":"Frankenmerging (layer stacking) takes different layers from different models and stacks them together. Goliath-120B was created by taking 72 out of 80 layers from each of two finetuned Llama 2-70B models (Xwin and Euryale) and merging them together, creating a successful merged model."},{"id":"6c27c19059bc","q":"How can layer stacking be used for model upscaling?","a":"Model upscaling creates larger models using fewer resources. SOLAR 10.7B was created from a 7B model by: 1) Making a copy of the original model, 2) Merging by summing 16 layers and stacking the rest (32×2-16=48 layers), 3) Further training the upscaled model toward target performance."},{"id":"80b1763e53d4","q":"What is the progression path for finetuning development according to OpenAI?","a":"1) Test finetuning code using cheapest/fastest model to ensure code works, 2) Test data by finetuning a middling model (if training loss doesn't decrease, something's wrong), 3) Run experiments with best model to push performance, 4) Train all models to map price/performance frontier and select optimal model."},{"id":"6397c5c2d7df","q":"What is the distillation path for finetuning?","a":"1) Start with small dataset and strongest affordable model to train the best possible model, 2) Use this finetuned model to generate more training data, 3) Use the new dataset to train a cheaper model. This leverages the strong base model's ability to learn from less data."},{"id":"c683a0513e7a","q":"What are the key considerations when choosing between LoRA and full finetuning?","a":"Consider data volume (full finetuning needs thousands+ examples, LoRA works with hundreds), performance requirements (full finetuning typically performs better), serving needs (LoRA enables efficient multi-model serving), and available compute resources (LoRA requires much less memory)."},{"id":"5066c33579bd","q":"What is gradient accumulation and why is it used in finetuning?","a":"Gradient accumulation addresses the problem of small batch sizes due to memory constraints. Instead of updating model weights after each batch, gradients are accumulated across several batches and weights are updated once enough reliable gradients are accumulated, leading to more stable training."},{"id":"2bd364a547a0","q":"What is prompt loss weight in instruction finetuning?","a":"Prompt loss weight determines how much prompts contribute to the model's loss compared to responses during training. Since models only need to generate responses during inference, response tokens should contribute more to the loss. Typically set to 10%, meaning the model learns some from prompts but mostly from responses."},{"id":"42194ddfc9da","q":"What are the key hyperparameters to consider when finetuning?","a":"Learning rate (determines speed of parameter changes, typically 1e-7 to 1e-3), batch size (number of examples per update step, affects stability and memory), number of epochs (passes over training data), and prompt loss weight (for instruction finetuning, how much prompts vs responses contribute to loss)."},{"id":"6a048ce4a113","q":"How can loss curves help determine appropriate learning rates?","a":"If the loss curve fluctuates a lot, the learning rate is likely too big. If the loss curve is stable but takes a long time to decrease, the learning rate is likely too small. The goal is to increase the learning rate as high as possible while keeping the loss curve stable."},{"id":"981c072e4192","q":"What are the signs of overfitting vs underfitting during finetuning?","a":"If both training loss and validation loss steadily decrease, the model can benefit from more epochs and data. If training loss decreases but validation loss increases, the model is overfitting to training data and you should reduce the number of epochs."},{"id":"06fa96f2e3f4","q":"What is the recommended workflow for adapting a model to a task?","a":"1) Define evaluation criteria and pipeline, 2) Try prompting alone with best practices, 3) Add more examples to prompt (1-50), 4) If missing information, connect to data sources (RAG), 5) For behavioral issues try finetuning, for information issues try advanced RAG, 6) Combine both RAG and finetuning."},{"id":"fe584f937e3c","q":"What makes finetuning more accessible today compared to early foundation model days?","a":"The proliferation of high-quality open source models of all sizes tailored for various domains, along with mature finetuning frameworks (LLaMA-Factory, unsloth, PEFT, Axolotl, LitGPT) that support various PEFT methods with sensible defaults, making finetuning much more viable and attractive."}]},{"id":"b0c7","title":"Dataset Engineering","summary":"Learn how datasets for AI systems are designed, cleaned, generated, augmented, annotated, and optimized for coverage, diversity, quality, and large-scale model training.","cards":[{"id":"19383f97fe58","q":"What demonstrates the increasing importance of data in AI development when comparing GPT-3 to GPT-4?","a":"Only 2 people were credited with data work for GPT-3, but 80 people were credited for data processes in GPT-4. Even for something as simple as ChatML format, 11 people were involved, many of them senior researchers."},{"id":"05901cf84055","q":"What is the goal of dataset engineering?","a":"To create a dataset that allows you to train the best model, ideally within your allocated budget."},{"id":"68767f880ea6","q":"How have data operations evolved in AI companies?","a":"They have evolved from side tasks handled when people have time to dedicated roles. Many AI companies now employ data labelers, dataset creators, and data quality engineers."},{"id":"a4059d9256c7","q":"What is the difference between model-centric AI and data-centric AI?","a":"Model-centric AI tries to improve performance by enhancing models (new architectures, larger sizes, new training techniques). Data-centric AI tries to improve performance by enhancing data (new processing techniques, high-quality datasets)."},{"id":"40fe1c881619","q":"What was Andrew Ng's 2021 data-centric AI competition about?","a":"Participants needed to improve upon the same base dataset by applying techniques such as fixing incorrect labels, adding edge case examples, and augmenting data."},{"id":"c1fc2defd3d0","q":"What was the goal of DataComp competition in 2023?","a":"To create the best dataset for training a CLIP model. A standardized script trains a CLIP model on each submitted dataset, and quality is evaluated based on performance on 38 downstream tasks."},{"id":"ce41733ab2dd","q":"What are the three high-level criteria for data curation?","a":"Data quality, data coverage, and data quantity."},{"id":"d13e22787f55","q":"Why is chain-of-thought (CoT) data more challenging to create?","a":"Generating multi-step responses is tedious and time-consuming. Explaining how to solve a problem step-by-step is much more challenging than simply giving the final answer."},{"id":"2748f7953814","q":"Why might human annotations not be ideal for AI tool use data?","a":"What's efficient for humans might not be efficient for AI. For example, a human might prefer a web interface while a model can use an API directly. Human explanations might also miss steps due to faulty memory."},{"id":"f3a3ab697895","q":"What is the difference between single-turn and multi-turn data?","a":"Single-turn data helps train a model to respond to individual instructions. Multi-turn data teaches the model how to solve tasks that involve back-and-forth interactions."},{"id":"d6d17e966928","q":"What are the six characteristics of high-quality data?","a":"Relevant, aligned with task requirements, consistent, correctly formatted, sufficiently unique, and compliant."},{"id":"4b875cf38c86","q":"What does 'aligned with task requirements' mean for data quality?","a":"The annotations should align with the task's requirements. If the task requires factual consistency, annotations should be factually correct. If it requires creativity, annotations should be creative."},{"id":"edaa38080c1c","q":"What is data coverage and why is it important?","a":"Data coverage means the training data should cover the range of problems you expect the model to solve. It requires sufficient data diversity to capture the diverse usage patterns of your application."},{"id":"c2edf93a8f98","q":"What did the Llama 3 team find about the percentage of math and code data in their training phases?","a":"During pre-training and supervised finetuning, math, reasoning, and code tokens accounted for almost half the training data, despite being far below 50% of internet data. This confirms that high-quality code and math data is more effective for boosting reasoning capabilities."},{"id":"bf238695caf5","q":"What did Zhou et al.'s experiment show about data quality versus diversity?","a":"A 7B-parameter model finetuned on a dataset that was both high-quality and diverse (3.83 score) outperformed models trained on datasets that were either diverse or high-quality alone (3.49 and 3.33 scores respectively)."},{"id":"35df4c64460f","q":"What three factors influence how much data you need for finetuning?","a":"1) Finetuning techniques (full finetuning requires more data than PEFT methods), 2) Task complexity (simple tasks need less data), 3) Base model's performance (better base models need fewer examples)."},{"id":"56540c4462b9","q":"What is ossification in the context of model training?","a":"A phenomenon where pre-training can ossify (freeze) the model weights so they don't adapt as well to finetuning data. It's more common in smaller models and can make finetuning worse than training from scratch."},{"id":"064d76c955b5","q":"What does OpenAI's finetuning guide show about model performance with different amounts of data?","a":"With 100 examples, more advanced models give much better finetuning performance. With 550,000 examples, all models give similar performance after finetuning."},{"id":"3d056fc5b345","q":"What is the most important source of data for applications?","a":"Data from your own application. If you can create a data flywheel that leverages user-generated data to continually improve your product, you gain a significant advantage because it's perfectly relevant and matches the distribution you care about."},{"id":"ec7ad10ba14a","q":"What are the main types of user-generated data?","a":"User content, system-generated data from user usage, and user feedback."},{"id":"b7ed08dbe4a9","q":"What is the difference between data augmentation and data synthesis?","a":"Data augmentation creates new data from existing real data (e.g., flipping an image). Data synthesis generates data to mimic properties of real data (e.g., simulating mouse movements). Augmented data is derived from real data, whereas synthetic data isn't real."},{"id":"2fe0dded38e5","q":"What are the five main reasons for data synthesis?","a":"1) To increase data quantity, 2) To increase data coverage, 3) To increase data quality, 4) To mitigate privacy concerns, 5) To distill models."},{"id":"29ed4088a1b7","q":"How can synthetic data increase data quality?","a":"Sometimes humans have fundamental limitations. For example, AI can generate more complex math problems than average human experts, and AI-generated preference ratings can be more consistent than human ratings which vary by mood and motivation."},{"id":"63770cd52a98","q":"What is rule-based data synthesis?","a":"The simplest way to generate data using predefined rules and templates. For example, creating a credit card transaction by starting with a transaction template and using random generators to populate each field."},{"id":"ed6bf86906f9","q":"How can perturbation be used for data augmentation?","a":"Adding noise to existing data to generate new data. Training models on perturbed data can both improve performance and make models more robust against attacks. For example, BERT authors replaced 1.5% of tokens with random words for a small performance boost."},{"id":"e58a0f951bf6","q":"What is simulation-based data synthesis?","a":"Running experiments virtually instead of in the real world where it can be expensive and dangerous. Examples include simulating self-driving car scenarios or robot movements in virtual environments."},{"id":"06a04995a9fb","q":"How did OpenAI use simulation for their Dota 2 bot?","a":"They used a simulator that enabled the bot to play approximately 180 years' worth of games every day. The bot learned through self-play, playing against itself to develop and refine strategies over time."},{"id":"a5cdef0c8853","q":"How can AI's paraphrasing abilities be used for data augmentation?","a":"Given a query like 'How to reset my password?', AI can paraphrase it to create new queries like 'I forgot my password', 'How can I change my password?', and 'Steps to reset passwords'."},{"id":"6ea1b97d9ebd","q":"What is back-translation and how is it used for quality verification?","a":"If the original English sentence is X and the translated sentence is Y, you use another model to translate Y back into English (X'). If X' and X are very different, the translation Y is likely bad."},{"id":"14940038d080","q":"What are the two main approaches for instruction data synthesis?","a":"1) Generate instructions and have humans write responses, or 2) Have humans write instructions and use AI to generate responses. You can also generate both instructions and responses using AI."},{"id":"a69b788f466a","q":"What is the reverse instruction approach?","a":"Take existing long-form, high-quality content like stories, books, and Wikipedia articles, and use AI to generate prompts that would elicit such content. This yields higher-quality instruction data by avoiding AI-generated hallucinations in responses."},{"id":"3d27a03cebeb","q":"How did the Llama 3 team ensure quality of their generated coding data?","a":"They used a rigorous pipeline: 1) Run code through parsers and linters for syntax errors, 2) Use AI-generated unit tests for runtime errors, 3) When solutions fail, prompt the model to revise with feedback from parsers, linters, and tests."},{"id":"c6bfe96f9e1e","q":"What are the main approaches for data verification?","a":"Functional correctness (for code and other verifiable outputs), AI judges/verifiers that assign scores or classify examples, factual consistency detection, and content detectors to distinguish real from synthetic data."},{"id":"2095aee6021f","q":"What are the four major limitations of AI-generated data?","a":"1) Quality control - AI data can be low quality, 2) Superficial imitation - may mimic style but struggle with accuracy, 3) Potential model collapse from recursive training, 4) Obscured data lineage creates risks."},{"id":"decbfe25263d","q":"What is model collapse?","a":"A phenomenon where recursively using AI-generated data in training causes irreversible defects in models, degrading performance over time. AI models generate probable events more often, so over iterations, probable events become over-represented while rare events are forgotten."},{"id":"d820d6e5b688","q":"How can model collapse potentially be avoided?","a":"Research suggests mixing synthetic data with real data can avoid model collapse, though there's no definitive recommendation for the proportion of synthetic to real data."},{"id":"59b08c849629","q":"What is model distillation?","a":"A method where a small model (student) is trained to mimic a larger model (teacher). The knowledge of the big model is distilled into the small model, traditionally to produce smaller, faster models for deployment."},{"id":"a9b6dcd824ac","q":"What did DistilBERT achieve compared to BERT?","a":"DistilBERT reduced BERT's size by 40% while retaining 97% of its language comprehension capabilities and being 60% faster."},{"id":"ef29c026fba3","q":"What are the main data processing steps mentioned in the chapter?","a":"Inspect data, deduplicate data, clean and filter data, and format data according to model requirements."},{"id":"9ea1b31a68d9","q":"Why is data deduplication important?","a":"Duplicated data can skew distribution, introduce biases, cause test set contamination, and waste time and compute. An Anthropic study showed repeating 0.1% of data 100 times can degrade an 800M parameter model's performance to that of a 400M model."},{"id":"9b4dcc50338c","q":"What are three approaches for data deduplication?","a":"1) Pairwise comparison using similarity scores, 2) Hashing examples into buckets and checking within buckets, 3) Dimensionality reduction followed by pairwise comparison."},{"id":"cd3deb83e19b","q":"What did Databricks find about removing formatting tokens?","a":"Removing extraneous Markdown and HTML tokens improved their model's accuracy by 20% while reducing input token lengths by 60%."},{"id":"b02ddeae6465","q":"How can finetuning help with prompt length and cost?","a":"During finetuning, instructions typically don't need task descriptions or examples since the model learns from training examples. This allows much shorter prompts at inference time, reducing input token costs."}]},{"id":"b0c8","title":"Inference Optimization","summary":"Learn how to optimize AI inference systems using quantization, batching, speculative decoding, KV cache optimization, FlashAttention, GPU optimization, and hardware-aware deployment strategies.","cards":[{"id":"e5f19147e4af","q":"What is the main focus of Chapter 9 on Inference Optimization?","a":"The chapter focuses on making AI models faster and cheaper during inference, discussing optimization techniques at the model, hardware, and service levels to reduce latency and cost."},{"id":"961538e2d860","q":"What are the two main computational bottlenecks in AI inference?","a":"Compute-bound (tasks limited by computation needed) and memory bandwidth-bound (tasks constrained by data transfer rate between memory and processors)."},{"id":"87dcd4251e21","q":"What is the difference between training and inference in AI models?","a":"Training refers to building a model (involves forward and backward passes), while inference refers to using a model to compute outputs for given inputs (involves only forward pass)."},{"id":"0b75f62a9743","q":"What are the two main steps in transformer-based language model inference?","a":"Prefill (processing input tokens in parallel, which is compute-bound) and Decode (generating output tokens one at a time, which is memory bandwidth-bound)."},{"id":"8c8eafa087a1","q":"What is the difference between online and batch inference APIs?","a":"Online APIs optimize for latency and process requests as they arrive, while batch APIs optimize for cost with higher latency tolerance, allowing broader optimization techniques and often 50% cost reduction."},{"id":"2bf055655fca","q":"What does TTFT stand for and what does it measure?","a":"Time to First Token - measures how quickly the first token is generated after users send a query, corresponding to the prefill step duration and depending on input length."},{"id":"53ec4d97189e","q":"What does TPOT stand for and what does it measure?","a":"Time Per Output Token - measures how quickly each output token is generated after the first token. For streaming mode, TPOT should be around 120 ms or 6-8 tokens/second for good user experience."},{"id":"f2efb7ee515f","q":"How is total latency calculated for autoregressive models?","a":"Total latency = TTFT + TPOT × (number of output tokens)"},{"id":"e1614a66332c","q":"What is goodput in the context of AI inference?","a":"Goodput measures the number of requests per second that satisfy the Service Level Objective (SLO), accounting for the latency/throughput trade-off by focusing on requests that meet performance requirements."},{"id":"335d4806d603","q":"What is MFU and how is it different from GPU utilization?","a":"Model FLOP/s Utilization (MFU) is the ratio of observed throughput to theoretical maximum throughput at peak FLOP/s. Unlike GPU utilization (percentage of time GPU is active), MFU measures actual computational efficiency."},{"id":"41884b3a6abb","q":"What is MBU and how is it calculated?","a":"Model Bandwidth Utilization (MBU) measures percentage of achievable memory bandwidth used. Calculated as: (parameter count × bytes/param × tokens/s) / (theoretical bandwidth)"},{"id":"7596ef73bf51","q":"What are the main differences between CPUs and GPUs for AI workloads?","a":"CPUs have few powerful cores (up to 64) for sequential tasks, while GPUs have thousands of smaller cores optimized for parallel processing like matrix multiplication, which constitutes over 90% of neural network operations."},{"id":"e57aa8453d82","q":"What are the three levels of memory in an AI accelerator system?","a":"CPU memory/DRAM (25-50 GB/s, large capacity), GPU high-bandwidth memory/HBM (256 GB/s to 1.5+ TB/s, 24-80 GB), and GPU on-chip SRAM (10+ TB/s, under 40 MB)."},{"id":"fb092cdb1cc5","q":"Why is electricity consumption a bottleneck for scaling AI compute?","a":"An NVIDIA H100 running at peak for a year consumes ~7,000 kWh (compared to 10,000 kWh for average US household), and data centers need massive electricity supply and cooling systems."},{"id":"b7d581441389","q":"What are the three main model compression techniques mentioned?","a":"Quantization (reducing model precision), distillation (training smaller models to mimic larger ones), and pruning (removing less important parameters or setting them to zero)."},{"id":"07f1f2c1a350","q":"What is speculative decoding and how does it work?","a":"A technique using a faster draft model to generate token sequences that are then verified in parallel by the target model. The target model accepts the longest subsequence it agrees with, then generates one additional token."},{"id":"68fcddeb9da5","q":"What is inference with reference?","a":"A technique that selects draft tokens from the input context instead of using a model, useful when responses significantly overlap with input text (like document analysis or code fixing)."},{"id":"839b8c93cc1c","q":"What is the KV cache and why is it important?","a":"A cache storing key and value vectors from previous tokens to avoid recomputation during autoregressive generation. Critical for efficiency but grows linearly with sequence length and can become very large."},{"id":"e463c57c04f4","q":"How is KV cache size calculated?","a":"2 × B × S × L × H × M, where B=batch size, S=sequence length, L=transformer layers, H=model dimension, M=memory per value. For Llama 2 13B example: ~54 GB without optimization."},{"id":"0e295875d0c8","q":"What are the three approaches to attention mechanism optimization?","a":"Redesigning the attention mechanism (like local windowed attention), optimizing KV cache management (like PagedAttention), and writing specialized kernels for attention computation (like FlashAttention)."},{"id":"a04b0d43f635","q":"What is multi-query attention?","a":"An attention mechanism variant that shares key-value vectors across query heads, reducing KV cache memory footprint compared to standard multi-head attention."},{"id":"26318f445371","q":"What is grouped-query attention?","a":"A generalization of multi-query attention that groups query heads and shares key-value pairs only within groups, allowing flexible balance between query heads and key-value pairs."},{"id":"99fc5dd1319c","q":"What are kernels in the context of AI optimization?","a":"Specialized pieces of code optimized for specific hardware accelerators (like GPUs) to perform computationally intensive operations like matrix multiplication, attention, and convolution more efficiently."},{"id":"5cf730f277b1","q":"What are four common techniques used in kernel optimization?","a":"Vectorization (processing multiple data elements simultaneously), parallelization (dividing work across cores/threads), loop tiling (optimizing data access patterns), and operator fusion (combining multiple operators)."},{"id":"b736f8b7a7c3","q":"What is static batching?","a":"A batching technique that groups a fixed number of requests together before processing. Like a bus that waits until every seat is filled before departing, which can cause delays for early requests."},{"id":"0a3e7f878d2d","q":"What is dynamic batching?","a":"A batching technique with a maximum time window - processes batches either when full or when time limit reached, whichever comes first. Keeps latency manageable but may waste compute on unfilled batches."},{"id":"212a13dbc3c5","q":"What is continuous batching (in-flight batching)?","a":"Allows completed responses in a batch to be returned immediately while adding new requests to replace them, maximizing occupancy. Like a bus that picks up new passengers after dropping others off."},{"id":"e27c0b1fcaa4","q":"Why is decoupling prefill and decode beneficial?","a":"Because prefill is compute-bound and decode is memory bandwidth-bound, using separate instances prevents them from competing for resources and significantly improves both TTFT and TPOT."},{"id":"49b860a71da4","q":"What is prompt caching and when is it useful?","a":"Storing overlapping text segments (like system prompts or long documents) for reuse across queries. Particularly valuable for applications with long system prompts or document-based queries."},{"id":"57b4baddee9f","q":"What cost and latency benefits does prompt caching provide?","a":"Up to 90% cost savings and 75% latency reduction for long cached contexts. Google offers 75% discount on cached tokens, while Anthropic promises up to 90% cost savings."},{"id":"00f16a342fab","q":"What is replica parallelism?","a":"Creating multiple replicas of the same model to handle more requests simultaneously. The most straightforward parallelization strategy, essentially scaling horizontally with more model copies."},{"id":"18d8c6240bd1","q":"What is tensor parallelism?","a":"Splitting tensors in operations (like matrix multiplication) across multiple devices to enable serving large models and reduce latency, though communication overhead may reduce benefits."},{"id":"b51a5ffc9696","q":"What is pipeline parallelism?","a":"Dividing model computation into stages assigned to different devices, enabling overlapping computations as data flows through stages. Increases total latency due to communication but enables large model serving."},{"id":"db6a69df152f","q":"What factors determine the prefill to decode instance ratio?","a":"Workload characteristics (input length requirements) and latency priorities. For long inputs prioritizing TTFT: 2:1 to 4:1 ratio. For short inputs prioritizing TPOT: 1:2 to 1:1 ratio."},{"id":"2f333e99f6ad","q":"What is the typical trade-off between latency and throughput in AI inference?","a":"Techniques like batching can improve throughput but increase latency. According to LinkedIn's experience, you can often double or triple throughput if willing to sacrifice TTFT and TPOT."},{"id":"c4199bdcf995","q":"Why are percentiles (p50, p90, p95, p99) more useful than average latency?","a":"Because latency is a distribution and averages can be misleading due to outliers. Percentiles tell you what percentage of requests experience certain latency levels and help identify performance issues."},{"id":"0e56a71a1292","q":"How do model-level and service-level optimizations differ?","a":"Model-level optimization often requires changing the model itself (potentially affecting behavior), while service-level optimization keeps the model intact and only changes how it's served."},{"id":"9d6045ab35a1","q":"What are the most impactful inference optimization techniques across various use cases?","a":"Quantization (works well across models), tensor parallelism (reduces latency and enables large models), replica parallelism (straightforward to implement), and attention mechanism optimization (accelerates transformers)."},{"id":"c3515fd76d27","q":"What key insight does the PyTorch optimization case study demonstrate?","a":"Combining multiple techniques can dramatically improve performance: torch.compile + INT8 quantization + INT4 quantization + speculative decoding achieved significant throughput improvements for Llama-7B."},{"id":"53aa2d7f3fdc","q":"What makes inference optimization an interdisciplinary field?","a":"It requires collaboration among model researchers, application developers, system engineers, compiler designers, hardware architects, and data center operators due to optimization opportunities at multiple levels."},{"id":"e1d39b1f9e75","q":"How does the autoregressive decoding bottleneck impact cost and latency?","a":"Each token generation requires transferring entire model parameters, making it bandwidth-heavy and computationally inefficient. Output tokens cost 2-4x input tokens, and a single output token can impact latency as much as 100 input tokens."}]},{"id":"b0c9","title":"AI Engineering Architecture and User Feedback","summary":"Learn how production AI systems are architected including routing systems, observability, monitoring, caching, guardrails, feedback loops, user analytics, and scalable AI infrastructure.","cards":[{"id":"a8a64703a177","q":"What is the main structure approach this chapter takes to building AI application architecture?","a":"The chapter takes a gradual approach, starting with the simplest architecture for a foundation model application, highlighting its challenges, and progressively adding components to address them."},{"id":"233874bf35c4","q":"What does the simplest AI application architecture consist of?","a":"The application receives a query, sends it to the model, the model generates a response, and returns it to the user. There is no context augmentation, no guardrails, and no optimization."},{"id":"659a5b497ae9","q":"What are the 5 main steps in building a complete AI application architecture?","a":"1. Enhance context input by giving the model access to external data sources and tools, 2. Put in guardrails to protect your system and users, 3. Add model router and gateway for complex pipelines and security, 4. Optimize for latency and costs with caching, 5. Add complex logic and write actions to maximize capabilities."},{"id":"ebc4f3b63d0e","q":"What is context construction and why is it important?","a":"Context construction is like feature engineering for foundation models - it gives the model the necessary information to produce an output. Due to its central role in a system's output quality, it is almost universally supported by model API providers."},{"id":"6d65b2002577","q":"What are the two main categories of guardrails?","a":"Input guardrails (protect against leaking private information to external APIs and executing bad prompts that compromise your system) and output guardrails (catch output failures and specify policies to handle different failure modes)."},{"id":"71304b28a6a7","q":"What are the two main types of risks that input guardrails protect against?","a":"1. Leaking private information to external APIs, and 2. Executing bad prompts that compromise your system through prompt attacks."},{"id":"518968165f7c","q":"What are some common types of sensitive data that input guardrails should detect?","a":"Personal information (ID numbers, phone numbers, bank accounts), human faces, and specific keywords and phrases associated with the company's intellectual property or privileged information."},{"id":"676280a2f731","q":"How does the PII masking and unmasking process work?","a":"Sensitive information is masked with placeholders (e.g., [PHONE NUMBER]) before sending to external APIs. If the generated response contains this placeholder, a PII reverse dictionary maps it back to the original information to unmask it."},{"id":"91b6b1fe9067","q":"What are the two main functions of output guardrails?","a":"1. Catch output failures, and 2. Specify the policy to handle different failure modes."},{"id":"f4ab884d75d8","q":"What are some examples of quality failures that output guardrails should catch?","a":"Malformatted responses that don't follow expected output format (like invalid JSON), factually inconsistent responses hallucinated by the model, and generally bad responses."},{"id":"d15bdbbe042e","q":"What are some examples of security failures that output guardrails should catch?","a":"Toxic responses containing racist/sexual content or illegal activities, responses with private/sensitive information, responses triggering remote tool/code execution, and brand-risk responses that mischaracterize your company or competitors."},{"id":"c6af13161778","q":"How can retry logic help mitigate AI model failures?","a":"Since AI models are probabilistic, trying a query again might yield a different response. You can retry X times until getting a non-empty or correctly formatted response. To reduce latency, you can make parallel calls and pick the better response."},{"id":"070f7d83aa2f","q":"What is the reliability versus latency trade-off with guardrails?","a":"While guardrails are important for safety, some teams prioritize latency and choose not to implement them because they can significantly increase application latency."},{"id":"f4b839609965","q":"What is a model router and what are its main benefits?","a":"A router uses different solutions for different types of queries, consisting of an intent classifier that predicts user intent. Benefits include: 1. Allows specialized models that perform better for specific queries, 2. Saves costs by routing simpler queries to cheaper models."},{"id":"18c2b9b741c2","q":"What is an intent classifier and how does it help an AI system?","a":"An intent classifier predicts what the user is trying to do and routes queries to appropriate solutions. It can prevent out-of-scope conversations, detect ambiguous queries to ask for clarification, and help decide next actions."},{"id":"0ed573e0e271","q":"What is a model gateway and what is its most basic functionality?","a":"A model gateway is an intermediate layer that allows your organization to interface with different models in a unified and secure manner. Its most basic functionality is providing a unified interface to different models, including self-hosted models and commercial APIs."},{"id":"949d12fe82f0","q":"What are the main benefits of using a model gateway?","a":"Unified interface maintenance (only update gateway when APIs change), access control and cost management (centralized controlled access instead of sharing tokens), fallback policies for rate limits/failures, and additional functionalities like load balancing, logging, and analytics."},{"id":"94f0bb2229fc","q":"What are the two major system caching mechanisms discussed?","a":"1. Exact caching - cached items are used only when these exact items are requested, 2. Semantic caching - cached items are used even if they are only semantically similar to the incoming query."},{"id":"5dd5fc971581","q":"How does exact caching work in AI applications?","a":"If a user asks to summarize a product, the system checks if a summary of this exact product exists in cache. If yes, fetch it; if not, summarize the product and cache the result. It's especially appealing for multi-step queries and time-consuming actions."},{"id":"56f4dac7f794","q":"What is the potential security risk with caching?","a":"Caching can cause data leaks when not properly handled. For example, if a system retrieves user-specific information for a seemingly generic query and caches it, later users asking the same question might receive the cached result containing another user's private information."},{"id":"0f3a7d097b1b","q":"How does semantic caching work and what are its challenges?","a":"It reuses cached results for semantically similar (not identical) queries using embedding similarity and vector search. Challenges include relying on high-quality embeddings, functional vector search, reliable similarity metrics, and setting appropriate similarity thresholds."},{"id":"ad41a1a018b8","q":"What are agentic patterns and how do they make applications more complex?","a":"Agentic patterns allow application flows with loops, parallel execution, and conditional branching. For example, after generating output, the system might determine it needs more information, perform another retrieval, and pass the response with new context back into the model, creating a loop."},{"id":"06c9595cf771","q":"What are write actions and what risks do they introduce?","a":"Write actions allow a system to make changes to its environment directly (composing emails, placing orders, bank transfers). They make systems vastly more capable but expose them to significantly more risks and should be implemented with utmost care."},{"id":"cc150937b3bc","q":"What are the three key metrics for evaluating system observability quality?","a":"MTTD (mean time to detection) - how long to detect something bad, MTTR (mean time to response) - how long to resolve after detection, and CFR (change failure rate) - percentage of changes/deployments resulting in failures requiring fixes or rollbacks."},{"id":"a06b85b0a096","q":"What is the difference between monitoring and observability?","a":"Monitoring makes no assumption about the relationship between internal state and outputs - you monitor external outputs to figure out when something goes wrong. Observability assumes a system's internal states can be inferred from external outputs, allowing you to figure out what went wrong by looking at logs and metrics."},{"id":"55e87d7795ed","q":"What should you consider when designing metrics for AI applications?","a":"Before listing metrics to track, understand what failure modes you want to catch and design metrics around these failures. Metrics design requires analytical thinking, statistical knowledge, and creativity, and should be highly application-specific."},{"id":"ef8d8921193a","q":"What are some examples of conversational signals that can be used as metrics?","a":"How often users stop generation halfway, average turns per conversation, average tokens per input/output, model's output token distribution over time, and how these metrics correlate to business north star metrics like DAU or session duration."},{"id":"89439eaa46f9","q":"What are the common latency metrics to track?","a":"Time to first token (TTFT) - time for first token generation, Time per output token (TPOT) - time to generate each output token, and Total latency - total time to complete a response."},{"id":"e42f8c7d3369","q":"What is the relationship between metrics and logs in debugging?","a":"A typical debugging process: 1. Metrics tell you something went wrong but not what happened, 2. You look at logs around that time to figure out what happened, 3. Correlate errors in logs to metrics to identify the right issue."},{"id":"316caf5a6528","q":"What is a trace in AI applications?","a":"A trace is the detailed recording of a request's execution path through various system components, showing the entire process from user query to final response, including actions taken, documents retrieved, final prompt sent to model, time for each step, and associated costs."},{"id":"df961a076ced","q":"What are the main types of changes that can cause drift in AI applications?","a":"System prompt changes (from template updates, typo fixes, etc.), user behavior changes (users adapting to get better results), and underlying model changes (API providers updating models without disclosure)."},{"id":"5a45786b7740","q":"What are the two main steps in AI pipeline orchestration?","a":"1. Components definition - tell the orchestrator what components your system uses (models, data sources, tools, evaluation/monitoring tools), 2. Chaining - combine different functions together, specifying steps from receiving user query to completing the task."},{"id":"68b79125e2b2","q":"Why might you want to start building an AI application without an orchestration tool initially?","a":"Any external tool brings additional complexity. An orchestrator can abstract away critical details of how your system works, making it hard to understand and debug your system. It's better to understand your needs first before adding orchestration complexity."},{"id":"85d020ebb2f3","q":"Why is user feedback more important for AI applications than traditional software?","a":"User feedback serves traditional roles (evaluating performance, informing development) plus an even more significant role as proprietary data for competitive advantage. It can be used to personalize models, train future iterations, and create the data flywheel as data becomes increasingly scarce."},{"id":"8eff23a6d96a","q":"What is the difference between explicit and implicit feedback in AI applications?","a":"Explicit feedback is information users provide in response to explicit requests (thumbs up/down, star ratings, yes/no answers). Implicit feedback is inferred from user actions and is highly application-dependent, with conversational interfaces enabling new genres of implicit feedback."},{"id":"07669be673dc","q":"What are some examples of natural language feedback signals?","a":"Early termination (stopping response generation, exiting app, leaving agent hanging), error correction (starting follow-ups with 'No...' or 'I meant...'), explicit confirmation requests ('Are you sure?', 'Check again'), and complaints about wrong/irrelevant/toxic responses."},{"id":"7c87fec17e49","q":"What does rephrasing attempts as feedback indicate?","a":"When users rephrase their requests after a model response, it typically indicates the model misunderstood the original intent. This can be detected using heuristics or ML models and is a strong signal that the initial response was off the mark."},{"id":"230e139e5340","q":"How can user edits serve as preference data?","a":"When users edit model responses (like correcting generated code), each edit creates a preference example with the original response as the 'losing response' and the edited version as the 'winning response', which can be used for preference finetuning."},{"id":"d97cb52df130","q":"What are some examples of other conversational feedback beyond natural language?","a":"Regeneration (requesting another response, though this might indicate dissatisfaction or desire for comparison), conversation organization (delete, rename, share, bookmark), conversation length, and dialogue diversity (measured by distinct token or topic count)."},{"id":"36c32568f0d9","q":"When are the key times to collect user feedback?","a":"In the beginning (for calibration, though should be optional to reduce friction), when something bad happens (hallucinations, blocks, compromising content), and when the model has low confidence (can show multiple options for user to choose)."},{"id":"adad27d73584","q":"What is the benefit of showing partial responses versus full responses in comparative evaluation?","a":"Full responses give users more information to make decisions but may not incentivize feedback once read. Partial responses (showing only beginnings) require users to click to expand their preferred choice, providing feedback about which response seems more promising, though it's unclear which approach gives more reliable feedback."},{"id":"3f2aaf963743","q":"How should feedback collection integrate into user workflow?","a":"Feedback should be seamless, easy to provide without extra work, not disrupt user experience, be easy to ignore, and include incentives for giving good feedback. The collection should be nonintrusive and not interfere with user workflow."},{"id":"26dedf95c3e6","q":"What are some examples of feedback biases to watch out for?","a":"Leniency bias (rating more positively to avoid conflict or extra work), randomness (users providing random feedback due to lack of motivation), position bias (users more likely to click first suggestions), and preference bias (favoring longer responses or recency bias)."},{"id":"2cec507a5231","q":"What is a degenerate feedback loop and why is it problematic?","a":"It occurs when predictions influence feedback, which influences the next model iteration, amplifying initial biases. For example, slightly higher-ranked content gets more exposure and clicks, reinforcing the system's belief it's better, creating popularity bias and filter bubbles that prevent new content from breaking through."},{"id":"5ba3a471867e","q":"How can user feedback potentially make conversational agents less accurate?","a":"Multiple studies show that training models on user feedback can teach them to give users what they think users want, even if it isn't most accurate or beneficial. This can lead to sycophancy, where AI models are more likely to present responses matching the user's existing views rather than providing objective information."},{"id":"ec59d131c5cb","q":"What is the main architectural principle for managing AI application complexity?","a":"Each additional component can make your system more capable, safer, or faster, but also increases complexity and exposes it to new failure modes. Components should be modular and maintainable, though separation is fluid with many ways components can overlap in functionalities."},{"id":"b353d8c6cbea","q":"How does AI engineering differ from traditional ML engineering regarding product involvement?","a":"AI engineering is moving closer to product due to the increasing importance of data flywheel and product experience as competitive advantages. User feedback design, traditionally seen as product responsibility, now involves more AI engineers to ensure they receive the data needed for continuous model improvement."}]}]},{"id":"b1","title":"Hands-On Large Language Models (Jay Alammar & Maarten Grootendorst, 2024)","description":"Written by two well-known educators in the AI community, this book offers a visual and hands-on journey into large language models. It blends intuitive explanations, diagrams, and Python code to show how LLMs work internally and how to apply them for classification, clustering, generation, retrieval, and fine-tuning. The book emphasizes accessibility and practical experimentation, making it a strong resource for both beginners and practitioners.","chapters":[{"id":"b1c0","title":"An Introduction to Large Language Models","summary":"Learn the evolution of NLP and LLMs including Transformers, attention mechanisms, transfer learning, encoder vs decoder architectures, and the foundations of modern language AI.","cards":[{"id":"f48fb052f063","q":"What marked the beginning of accelerated AI development, and what was the first AI system capable of writing human-like articles?","a":"Accelerated AI development began in 2012. The first AI system capable of writing articles indistinguishable from human-written ones was GPT-2 (Generative Pre-trained Transformer 2)."},{"id":"da0a34afb053","q":"How quickly did ChatGPT reach major user milestones when it was released?","a":"ChatGPT reached one million active users in five days and one hundred million active users in two months."}
